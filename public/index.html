<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чаты</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

/* === ЛЕВАЯ ПАНЕЛЬ (ТТ) === */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  width:70px;
  background:#0b1220;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:10px;
}

.tt{
  width:50px;
  height:50px;
  border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:8px 0;
  cursor:pointer;
  font-size:14px;
}

/* === СПИСОК ЧАТОВ === */
.chat-list{
  position:fixed;
  left:70px;
  top:0;
  bottom:0;
  width:230px;
  background:#16213e;
  overflow-y:auto;
}

.chat-item{
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;
}

/* === ОСНОВНОЙ ЧАТ === */
.main{
  margin-left:300px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  background:#1e2d4d;
  font-weight:bold;
}

.messages{
  flex:1;
  padding:10px;
  overflow-y:auto;
  padding-bottom:140px;
}

/* === ВВОД === */
.input{
  position:fixed;
  bottom:60px;
  left:300px;
  right:0;
  display:flex;
  padding:10px;
  background:#1e2d4d;
}

.input input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
}

.send{
  width:50px;
  height:50px;
  margin-left:10px;
  border:none;
  border-radius:50%;
  background:#7c3aed;
  color:#fff;
  cursor:pointer;
}

/* === НИЖНЕЕ МЕНЮ === */
.bottom{
  position:fixed;
  bottom:0;
  left:300px;
  right:0;
  height:60px;
  background:#1e2d4d;
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-size:22px;
}

/* === МОБИЛКА === */
@media(max-width:768px){

  .sidebar,
  .chat-list{
    display:none;
  }

  .main{
    margin-left:0;
  }

  .input{
    left:0;
  }

  .bottom{
    left:0;
  }
}
</style>
</head>

<body>

<!-- ТТ -->
<div class="sidebar">
  <div class="tt">В33</div>
  <div class="tt">Т22</div>
  <div class="tt">АО25</div>
  <div class="tt">Н18</div>
  <div class="tt">К12</div>
  <div class="tt">ОФ13</div>
  <div class="tt">Х27</div>
</div>

<!-- ЧАТЫ -->
<div class="chat-list">
  <div class="chat-item">Болталка</div>
  <div class="chat-item">Важно</div>
  <div class="chat-item">Новинки</div>
  <div class="chat-item">Заметки</div>
</div>

<!-- ОСНОВА -->
<div class="main">
  <div class="header">Чат</div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="text" placeholder="Сообщение...">
    <button class="send" onclick="send()">➤</button>
  </div>
</div>

<!-- НИЖНЕЕ МЕНЮ -->
<div class="bottom">
  <div>💬</div>
  <div>⭐</div>
  <div>⚠</div>
  <div>📊</div>
</div>

<script>
function send(){
  const input = document.getElementById("text");
  const messages = document.getElementById("messages");

  if(input.value.trim() === "") return;

  const msg = document.createElement("div");
  msg.style.margin = "10px 0";
  msg.innerText = input.value;

  messages.appendChild(msg);
  input.value = "";

  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
