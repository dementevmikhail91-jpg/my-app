<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WorkChat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif;}

body{
  background:#0f172a;
  color:#fff;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  padding:15px;
  font-size:20px;
  font-weight:700;
}

/* LIST */
.chat-list{
  flex:1;
  overflow-y:auto;
}

.chat-item{
  display:flex;
  align-items:center;
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;
}

.chat-item:hover{background:#1e293b;}

.avatar{
  width:45px;height:45px;border-radius:50%;
  background:#6d4aff;
  display:flex;align-items:center;justify-content:center;
  margin-right:10px;
}

.chat-name{font-weight:600;}
.chat-last{font-size:13px;opacity:0.6;}

/* CHAT */
.chat{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#0f172a;
  display:none;
  flex-direction:column;
}

.chat-header{
  padding:15px;
  background:#1e293b;
  display:flex;
  align-items:center;
  gap:10px;
}

.back{
  font-size:20px;
  cursor:pointer;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  max-width:70%;
}

.me{background:#6d4aff;margin-left:auto;}
.other{background:#1e293b;}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#1e293b;
}

.input input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

.send{
  margin-left:10px;
  padding:10px;
  background:#6d4aff;
  border:none;
  border-radius:10px;
  color:#fff;
}

/* BOTTOM MENU */
.bottom{
  height:60px;
  background:#111827;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom button{
  background:none;
  border:none;
  color:#aaa;
  font-size:12px;
}

.active{color:#6d4aff;}

/* PROFILE */
.profile{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#0f172a;
  display:none;
  flex-direction:column;
  padding:20px;
}

.profile input{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="header">Чаты</div>
<div class="chat-list" id="chatList"></div>

<!-- CHAT -->
<div class="chat" id="chat">
  <div class="chat-header">
    <div class="back" onclick="closeChat()">←</div>
    <div id="chatTitle"></div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="msgInput" placeholder="Сообщение...">
    <button class="send" onclick="send()">➤</button>
  </div>
</div>

<!-- PROFILE -->
<div class="profile" id="profile">
  <h2>Профиль</h2>
  <input id="name" placeholder="Имя">
  <button onclick="saveProfile()" style="margin-top:10px">Сохранить</button>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <button onclick="load('tt')" class="active">💬<br>ТТ</button>
  <button onclick="load('fin')">💰<br>Фин</button>
  <button onclick="load('info')">📢<br>Важно</button>
  <button onclick="load('move')">🚚<br>Товар</button>
  <button onclick="openProfile()">👤<br>Профиль</button>
</div>

<script>

/* ВСЕ ТОЧКИ */
let TT = [
"Науки 18","Культуры 12","Художников 27","Ольги Форш 14",
"Товарищеский 22к1","Ворошилова 33к1","Антонова Овсеенко 25к1"
];

let currentChat=null;
let currentSection="tt";

/* ЗАГРУЗКА */
function load(type){
  currentSection=type;
  let list=document.getElementById("chatList");
  list.innerHTML="";

  if(type==="tt"){
    TT.forEach(tt=>{
      ["Болталка","Уборка","Важно"].forEach(ch=>{
        addChat(`${tt} - ${ch}`);
      });
    });
  }

  if(type==="fin") addChat("Фин отчет");
  if(type==="info") addChat("Важная информация");
  if(type==="move") addChat("Перемещение товара");

  document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

/* СОЗДАНИЕ ЧАТА */
function addChat(name){
  let el=document.createElement("div");
  el.className="chat-item";

  el.innerHTML=`
    <div class="avatar">${name[0]}</div>
    <div>
      <div class="chat-name">${name}</div>
      <div class="chat-last">Сообщение...</div>
    </div>
  `;

  el.onclick=()=>openChat(name);
  document.getElementById("chatList").appendChild(el);
}

/* ОТКРЫТЬ */
function openChat(name){
  currentChat=name;
  document.getElementById("chatTitle").innerText=name;
  document.getElementById("chat").style.display="flex";
  loadMessages();
}

/* НАЗАД */
function closeChat(){
  document.getElementById("chat").style.display="none";
}

/* СООБЩЕНИЕ */
function send(){
  let input=document.getElementById("msgInput");
  let text=input.value.trim();
  if(!text)return;

  let msgs=JSON.parse(localStorage.getItem(currentChat)||"[]");

  msgs.push({
    text,
    user:localStorage.getItem("user")||"Сотрудник",
    me:true
  });

  localStorage.setItem(currentChat,JSON.stringify(msgs));
  input.value="";
  loadMessages();
}

/* ЗАГРУЗКА */
function loadMessages(){
  let box=document.getElementById("messages");
  box.innerHTML="";

  let msgs=JSON.parse(localStorage.getItem(currentChat)||"[]");

  msgs.forEach(m=>{
    if(!m.text)return;

    let el=document.createElement("div");
    el.className="msg "+(m.me?"me":"other");
    el.innerHTML=`<b>${m.user}</b><br>${m.text}`;

    box.appendChild(el);
  });

  box.scrollTop=box.scrollHeight;
}

/* ПРОФИЛЬ */
function openProfile(){
  document.getElementById("profile").style.display="flex";
}

function saveProfile(){
  let name=document.getElementById("name").value.trim();
  if(name)localStorage.setItem("user",name);
  document.getElementById("profile").style.display="none";
}

/* INIT */
load("tt");

</script>

</body>
</html>
