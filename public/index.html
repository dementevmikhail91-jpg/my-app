<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(160deg,#0b1730,#1a1f4d);
  color:white;
  height:100vh;
  overflow:hidden;
}

/* ОСНОВНОЙ КОНТЕЙНЕР */
.app{
  display:flex;
  height:100%;
}

/* ЛЕВАЯ КОЛОНКА ТТ */
.tt-bar{
  width:80px;
  background:#0c1226;
  overflow-y:auto;
}

.tt{
  padding:10px 5px;
  text-align:center;
  cursor:pointer;
}

.tt.active{
  background:rgba(255,255,255,0.05);
}

.tt-circle{
  width:50px;height:50px;
  border-radius:50%;
  background:linear-gradient(135deg,#7b4bff,#9c6bff);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

/* СПИСОК ЧАТОВ */
.chat-list{
  width:220px;
  background:rgba(0,0,0,0.2);
  overflow-y:auto;
}

.chat-item{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;
}

.chat-item.active{
  background:rgba(255,255,255,0.08);
}

.badge{
  float:right;
  background:#7b4bff;
  padding:2px 6px;
  border-radius:10px;
  font-size:12px;
}

/* ЧАТ */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  padding:15px;
  background:rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
}

/* СООБЩЕНИЯ */
.messages{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.msg{
  margin-bottom:10px;
}

.name{
  font-size:12px;
  color:#aaa;
}

.bubble{
  background:#1e2a5a;
  padding:10px;
  border-radius:12px;
  display:inline-block;
  max-width:70%;
}

.time{
  font-size:10px;
  color:#888;
  margin-left:5px;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  gap:10px;
}

.input input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
}

.send{
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#7b4bff,#9c6bff);
  color:white;
}

/* НИЖНЕЕ МЕНЮ */
.bottom{
  position:fixed;
  bottom:0;
  left:80px;
  right:0;
  height:70px;
  background:rgba(20,20,40,0.95);
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.chat{
  padding-bottom:70px;
}
</style>
</head>

<body>

<div class="app">

  <!-- ТТ -->
  <div class="tt-bar" id="ttBar"></div>

  <!-- ЧАТЫ -->
  <div class="chat-list" id="chatList"></div>

  <!-- ЧАТ -->
  <div class="chat">

    <div class="header">
      <div>← Назад</div>
      <div id="title">Чат</div>
      <div>Профиль</div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input">
      <input id="input" placeholder="Сообщение...">
      <button class="send" onclick="send()">➤</button>
    </div>

  </div>

</div>

<div class="bottom">
  <div>💬<br>Чаты</div>
  <div>💰<br>Фин</div>
  <div>⚠️<br>Важно</div>
  <div>🚚<br>Перемещение</div>
</div>

<script>

/* ДАННЫЕ */
const data = {
  "Науки 18":{
    "Списание":[{name:"Катя",text:"Списание сделала",time:"21:00"}],
    "Болталка":[{name:"Олег",text:"Привет",time:"22:10"}],
    "Важно":[{name:"Ася",text:"Проверка завтра",time:"20:00"}]
  },
  "Культуры 12":{
    "Списание":[{name:"Ира",text:"Готово",time:"19:00"}],
    "Болталка":[{name:"Ира",text:"Как дела?",time:"10:00"}]
  },
  "Художников 27":{
    "Списание":[{name:"Олег",text:"Ок",time:"12:00"}]
  }
};

let currentTT = Object.keys(data)[0];
let currentChat = null;

/* РЕНДЕР ТТ */
function renderTT(){
  const el = document.getElementById("ttBar");
  el.innerHTML="";

  Object.keys(data).forEach(tt=>{
    let div=document.createElement("div");
    div.className="tt";
    if(tt===currentTT) div.classList.add("active");

    div.innerHTML=`
      <div class="tt-circle">${tt[0]}</div>
      ${tt}
    `;

    div.onclick=()=>{
      currentTT=tt;
      currentChat=null;
      renderAll();
    };

    el.appendChild(div);
  });
}

/* РЕНДЕР ЧАТОВ */
function renderChats(){
  const el = document.getElementById("chatList");
  el.innerHTML="";

  Object.keys(data[currentTT]).forEach(chat=>{
    let div=document.createElement("div");
    div.className="chat-item";

    div.innerHTML=`
      ${chat}
      <span class="badge">${data[currentTT][chat].length}</span>
    `;

    div.onclick=()=>{
      currentChat=chat;
      renderMessages();
      document.getElementById("title").innerText = currentTT + " / " + chat;
    };

    el.appendChild(div);
  });
}

/* РЕНДЕР СООБЩЕНИЙ */
function renderMessages(){
  const el=document.getElementById("messages");
  el.innerHTML="";

  if(!currentChat) return;

  data[currentTT][currentChat].forEach(m=>{
    let div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <div class="name">${m.name}</div>
      <div class="bubble">${m.text} <span class="time">${m.time}</span></div>
    `;

    el.appendChild(div);
  });
}

/* ОТПРАВКА */
function send(){
  const input=document.getElementById("input");
  if(!input.value || !currentChat) return;

  data[currentTT][currentChat].push({
    name:"Вы",
    text:input.value,
    time:"сейчас"
  });

  input.value="";
  renderMessages();
}

/* ОБЩИЙ РЕНДЕР */
function renderAll(){
  renderTT();
  renderChats();
  renderMessages();
}

renderAll();

</script>

</body>
</html>
