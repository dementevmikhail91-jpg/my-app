<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

/* ФОН (ЖЁСТКО ФИКСИМ) */
body {
  background: linear-gradient(180deg, #0b132b, #1c2541);
  color: white;
}

/* ЛЕВАЯ ПАНЕЛЬ (ТТ) */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 70px;
  width: 80px;
  background: #0b132b;
  padding-top: 20px;
  overflow-y: auto;
}

.tt {
  text-align: center;
  margin-bottom: 20px;
  cursor: pointer;
}

.circle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7b2ff7, #9b4dff);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  font-weight: bold;
}

.tt-name {
  font-size: 10px;
  margin-top: 5px;
}

/* ОСНОВА */
.main {
  margin-left: 80px;
  padding-bottom: 90px;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: #1c2541;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
}

/* СПИСОК ПОДЧАТОВ */
.channels {
  padding: 10px;
}

.channel {
  padding: 12px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

.badge {
  background: #7b2ff7;
  border-radius: 10px;
  padding: 2px 8px;
  font-size: 12px;
}

/* ЧАТ */
.chat {
  display: none;
  padding: 10px;
}

.message {
  margin-bottom: 12px;
}

.name {
  font-size: 12px;
  color: #aaa;
}

.bubble {
  background: #2a2f5a;
  padding: 10px;
  border-radius: 10px;
  display: inline-block;
  max-width: 80%;
}

.time {
  font-size: 10px;
  color: #aaa;
}

/* ВВОД */
.input-area {
  position: fixed;
  bottom: 60px;
  left: 80px;
  right: 0;
  background: #1c2541;
  padding: 10px;
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.send {
  margin-left: 10px;
  background: #7b2ff7;
  border: none;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  color: white;
}

/* НИЖНЕЕ МЕНЮ */
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #0b132b;
  display: flex;
  justify-content: space-around;
  align-items: center;
}
</style>
</head>

<body>

<!-- ЛЕВАЯ ПАНЕЛЬ -->
<div class="sidebar" id="ttList"></div>

<!-- ОСНОВА -->
<div class="main">

  <div class="header">
    <div id="title">Чаты</div>
    <div>Профиль</div>
  </div>

  <!-- ПОДЧАТЫ -->
  <div class="channels" id="channels"></div>

  <!-- ЧАТ -->
  <div class="chat" id="chat"></div>

</div>

<!-- ВВОД -->
<div class="input-area">
  <input placeholder="Сообщение...">
  <button class="send">➤</button>
</div>

<!-- МЕНЮ -->
<div class="bottom">
  <div>💬</div>
  <div>💰</div>
  <div>⚠️</div>
  <div>🚚</div>
</div>

<script>

/* ДАННЫЕ */
const data = {
  "Науки 18": {},
  "Культуры 12": {},
  "Художников 27": {},
  "Ольги Форш 14": {},
  "Товарищеский 22": {},
  "Ворошилова 33": {},
  "Антонова 25": {}
};

const channelsList = [
  "Списание",
  "Болталка",
  "Колобокс",
  "График",
  "Важно",
  "Счётчики",
  "Инвентаризация",
  "Касса"
];

/* РЕНДЕР ТТ */
const ttList = document.getElementById("ttList");

Object.keys(data).forEach(name => {
  const el = document.createElement("div");
  el.className = "tt";
  el.innerHTML = `
    <div class="circle">${name[0]}</div>
    <div class="tt-name">${name}</div>
  `;
  el.onclick = () => openTT(name);
  ttList.appendChild(el);
});

/* ОТКРЫТЬ ТТ */
function openTT(name) {
  document.getElementById("title").innerText = name;

  const channels = document.getElementById("channels");
  channels.innerHTML = "";
  document.getElementById("chat").style.display = "none";
  channels.style.display = "block";

  channelsList.forEach(c => {
    const el = document.createElement("div");
    el.className = "channel";
    el.innerHTML = `${c} <span class="badge">1</span>`;
    el.onclick = () => openChat(name, c);
    channels.appendChild(el);
  });
}

/* ОТКРЫТЬ ЧАТ */
function openChat(tt, ch) {
  document.getElementById("title").innerText = tt + " / " + ch;

  const chat = document.getElementById("chat");
  chat.style.display = "block";
  document.getElementById("channels").style.display = "none";

  chat.innerHTML = `
    <div class="message">
      <div class="name">Катя</div>
      <div class="bubble">Списание сделала</div>
      <div class="time">21:00</div>
    </div>

    <div class="message">
      <div class="name">Олег</div>
      <div class="bubble">Принял</div>
      <div class="time">21:05</div>
    </div>
  `;
}

</script>

</body>
</html>
