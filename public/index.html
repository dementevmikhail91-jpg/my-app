<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ШРИФТЫ -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
@font-face{
  font-family: 'Moreno';
  src: local('Arial Black');
}
@font-face{
  font-family: 'Arrival';
  src: local('Inter');
}

:root{
  --bg:#0b1120;
  --card:#1e293b;
  --accent:#8b5cf6;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

body{
  margin:0;
  background: radial-gradient(circle at 80% 80%, #312e81, #0b1120);
  font-family:'Arrival';
  color:var(--text);
}

.app{display:flex;height:100vh}

/* sidebar */
.sidebar{
  width:90px;
  overflow-y:auto;
  background:#020617;
}

.tt{
  text-align:center;
  margin:10px 0;
  cursor:pointer;
}

.tt-circle{
  width:52px;height:52px;border-radius:50%;
  margin:auto;
  background:linear-gradient(135deg,#8b5cf6,#a855f7);
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;
}

/* main */
.main{flex:1;display:flex;flex-direction:column}

/* header */
.header{
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  background:#1e293b;
  font-family:'Moreno';
}

/* chat list */
.chat-list{flex:1;overflow-y:auto}

.chat{
  padding:15px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;
}

.badge{
  background:var(--accent);
  border-radius:20px;
  padding:3px 10px;
}

/* messages */
.chat-window{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:none;
}

.msg{margin-bottom:10px}

.bubble{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}

.user{font-size:12px;color:var(--muted)}
.time{font-size:10px;color:var(--muted)}

/* input */
.input{
  display:flex;
  padding:10px;
  background:#020617;
}

.input input{
  flex:1;
  border:none;
  border-radius:20px;
  padding:10px;
  background:#1e293b;
  color:white;
}

.send{
  margin-left:10px;
  width:45px;
  border-radius:50%;
  border:none;
  background:var(--accent);
  color:white;
}

/* profile */
.profile{
  display:none;
  padding:20px;
}

.avatar{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,#8b5cf6,#a855f7);
  margin-bottom:10px;
}

/* bottom */
.bottom{
  height:60px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:#020617;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="ttList"></div>

<div class="main">

<div class="header">
  <div id="title">Чаты</div>
  <div onclick="openProfile()">Профиль</div>
</div>

<div class="chat-list" id="chatList"></div>

<div class="chat-window" id="chatWindow"></div>

<div class="profile" id="profile"></div>

<div class="input">
  <input id="msgInput" placeholder="Сообщение...">
  <button class="send" onclick="send()">➤</button>
</div>

<div class="bottom">
  <div onclick="goHome()">Чаты</div>
  <div>Фин</div>
  <div>Важно</div>
  <div>🚚</div>
</div>

</div>
</div>

<script>

const baseChats={
  "Списание":[],
  "Болталка":[],
  "Колобокс":[],
  "График работы":[],
  "Важная информация":[],
  "Показания счётчиков":[],
  "Инвентаризация":[],
  "Кассовые операции":[]
};

const data={
  "Науки 18":JSON.parse(JSON.stringify(baseChats)),
  "Культуры 12":JSON.parse(JSON.stringify(baseChats)),
  "Художников 27":JSON.parse(JSON.stringify(baseChats)),
  "Ольги Форш 14":JSON.parse(JSON.stringify(baseChats)),
  "Товарищеский 22":JSON.parse(JSON.stringify(baseChats)),
  "Ворошилова 33":JSON.parse(JSON.stringify(baseChats)),
  "Антонова-Овсеенко 25":JSON.parse(JSON.stringify(baseChats))
};

const profiles={};

let currentTT=null;
let currentChat=null;

/* render TT */
function renderTT(){
  ttList.innerHTML="";
  Object.keys(data).forEach(tt=>{
    const d=document.createElement("div");
    d.className="tt";
    d.innerHTML=`<div class="tt-circle">${tt[0]}</div>`;
    d.onclick=()=>openTT(tt);
    ttList.appendChild(d);
  });
}

/* open TT */
function openTT(tt){
  currentTT=tt;
  title.innerText=tt;
  renderChats();
}

/* chats */
function renderChats(){
  chatList.style.display="block";
  chatWindow.style.display="none";
  profile.style.display="none";

  chatList.innerHTML="";

  Object.keys(data[currentTT]).forEach(chat=>{
    const unread=data[currentTT][chat].filter(m=>!m.read).length;

    const d=document.createElement("div");
    d.className="chat";
    d.innerHTML=`
      ${chat}
      <span class="badge">${unread}</span>
    `;
    d.onclick=()=>openChat(chat);
    chatList.appendChild(d);
  });
}

/* open chat */
function openChat(chat){
  currentChat=chat;
  title.innerText=currentTT+" / "+chat;

  chatList.style.display="none";
  chatWindow.style.display="block";

  data[currentTT][chat].forEach(m=>m.read=true);

  renderMessages();
}

/* messages */
function renderMessages(){
  chatWindow.innerHTML="";

  data[currentTT][currentChat].forEach(m=>{
    const d=document.createElement("div");
    d.className="msg";
    d.innerHTML=`
      <div class="user">${m.user}</div>
      <div class="bubble">${m.text}</div>
      <div class="time">${m.time}</div>
    `;
    chatWindow.appendChild(d);
  });
}

/* send */
function send(){
  if(!currentTT||!currentChat)return;

  const text=msgInput.value.trim();
  if(!text)return;

  data[currentTT][currentChat].push({
    user:"Вы",
    text,
    time:new Date().toLocaleTimeString().slice(0,5),
    read:false
  });

  msgInput.value="";
  renderMessages();
}

/* profile */
function openProfile(){
  chatList.style.display="none";
  chatWindow.style.display="none";
  profile.style.display="block";

  if(!profiles[currentTT]){
    profiles[currentTT]={phone:"",info:""};
  }

  profile.innerHTML=`
    <div class="avatar"></div>
    <h2>${currentTT}</h2>
    <input placeholder="Телефон" value="${profiles[currentTT].phone}" id="phone">
    <input placeholder="Описание" value="${profiles[currentTT].info}" id="info">
    <button onclick="saveProfile()">Сохранить</button>
  `;
}

function saveProfile(){
  profiles[currentTT].phone=phone.value;
  profiles[currentTT].info=info.value;
  alert("Сохранено");
}

/* home */
function goHome(){
  chatWindow.style.display="none";
  profile.style.display="none";
  chatList.style.display="block";
  title.innerText="Чаты";
}

renderTT();

</script>

</body>
</html>
