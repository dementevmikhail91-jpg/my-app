<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkChat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif;}

body{
  background:#0f172a;
  color:#fff;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  padding:15px;
  font-size:20px;
  font-weight:700;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CHAT LIST */
.chat-list{
  flex:1;
  overflow-y:auto;
}

.chat-item{
  display:flex;
  align-items:center;
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;
}

.chat-item:hover{
  background:#1e293b;
}

.avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#6d4aff;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:10px;
  font-weight:bold;
}

.chat-info{
  flex:1;
}

.chat-name{
  font-weight:600;
}

.chat-last{
  font-size:13px;
  opacity:0.6;
}

/* CHAT WINDOW */
.chat-window{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0f172a;
  display:none;
  flex-direction:column;
}

.chat-header{
  padding:15px;
  background:#1e293b;
  display:flex;
  justify-content:space-between;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  max-width:70%;
}

.me{
  background:#6d4aff;
  margin-left:auto;
}

.other{
  background:#1e293b;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#1e293b;
}

.input input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

.send{
  margin-left:10px;
  background:#6d4aff;
  border:none;
  color:#fff;
  padding:10px 15px;
  border-radius:10px;
}

/* BOTTOM MENU */
.bottom{
  height:60px;
  background:#111827;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom button{
  background:none;
  border:none;
  color:#aaa;
  font-size:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.bottom button.active{
  color:#6d4aff;
}

</style>
</head>

<body>

<div class="header">
  Чаты
</div>

<div class="chat-list" id="chatList"></div>

<!-- CHAT -->
<div class="chat-window" id="chatWindow">
  <div class="chat-header">
    <span id="chatTitle"></span>
    <button onclick="closeChat()">✖</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="msgInput" placeholder="Сообщение...">
    <button class="send" onclick="send()">➤</button>
  </div>
</div>

<!-- BOTTOM MENU -->
<div class="bottom">
  <button onclick="loadSection('tt')" class="active">💬<br>Чаты ТТ</button>
  <button onclick="loadSection('fin')">💰<br>Фин отчёт</button>
  <button onclick="loadSection('important')">📢<br>Важно</button>
  <button onclick="loadSection('move')">🚚<br>Перемещение</button>
</div>

<script>

/* ДАННЫЕ */
let sections = {
  tt: [
    "Науки 18 - Болталка",
    "Науки 18 - Уборка",
    "Культуры 12 - Болталка"
  ],
  fin: ["Фин отчёт"],
  important: ["Важная информация"],
  move: ["Перемещение товара"]
};

let currentChat=null;

/* ЗАГРУЗКА СПИСКА */
function loadSection(type){
  let list = document.getElementById("chatList");
  list.innerHTML="";

  sections[type].forEach(name=>{
    let el=document.createElement("div");
    el.className="chat-item";

    el.innerHTML=`
      <div class="avatar">${name[0]}</div>
      <div class="chat-info">
        <div class="chat-name">${name}</div>
        <div class="chat-last">Сообщение...</div>
      </div>
    `;

    el.onclick=()=>openChat(name);

    list.appendChild(el);
  });

  document.querySelectorAll(".bottom button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

/* ОТКРЫТЬ ЧАТ */
function openChat(name){
  currentChat=name;
  document.getElementById("chatTitle").innerText=name;
  document.getElementById("chatWindow").style.display="flex";
  loadMessages();
}

/* ЗАКРЫТЬ */
function closeChat(){
  document.getElementById("chatWindow").style.display="none";
}

/* ОТПРАВКА */
function send(){
  let input=document.getElementById("msgInput");
  let text=input.value.trim();
  if(!text)return;

  let msgs=JSON.parse(localStorage.getItem(currentChat)||"[]");

  msgs.push({text,me:true});

  localStorage.setItem(currentChat,JSON.stringify(msgs));

  input.value="";
  loadMessages();
}

/* ЗАГРУЗКА */
function loadMessages(){
  let box=document.getElementById("messages");
  box.innerHTML="";

  let msgs=JSON.parse(localStorage.getItem(currentChat)||"[]");

  msgs.forEach(m=>{
    if(!m.text)return;

    let el=document.createElement("div");
    el.className="msg "+(m.me?"me":"other");
    el.innerText=m.text;

    box.appendChild(el);
  });

  box.scrollTop=box.scrollHeight;
}

/* INIT */
loadSection('tt');

</script>

</body>
</html>
