<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chats</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #17212b;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

/* SEARCH */
.search {
  padding: 10px;
}

.search input {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: #242f3d;
  color: white;
}

/* CHAT LIST */
.chat {
  display: flex;
  padding: 12px;
  border-bottom: 1px solid #1f2a37;
  cursor: pointer;
}

.chat:hover {
  background: #1e293b;
}

.avatar {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: #3b82f6;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
}

.chatInfo {
  flex: 1;
}

.chatTop {
  display: flex;
  justify-content: space-between;
}

.chatName {
  font-weight: bold;
}

.time {
  font-size: 12px;
  opacity: 0.7;
}

.lastMsg {
  font-size: 14px;
  opacity: 0.7;
}

.badge {
  background: #3b82f6;
  border-radius: 12px;
  padding: 2px 6px;
  font-size: 12px;
}

/* BOTTOM MENU */
.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1f2a37;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}
</style>

</head>

<body>

<div class="header">Telegram 🚗</div>

<div class="search">
  <input placeholder="Поиск чатов">
</div>

<div id="chatList"></div>

<div class="menu">
  <div>💬</div>
  <div>👥</div>
  <div>⚙️</div>
  <div>👤</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const chats = [
  "Ворошилова 33к1",
  "Товарищеский 22к1",
  "Антонова Овсиенко 25к1",
  "Науки 18",
  "Культуры 12",
  "Ольги Форш 13",
  "Художников 27к1",
  "Болталка",
  "Важно",
  "Новинки",
  "Заметки",
  "ТУ",
  "Фин отчёт"
];

function loadChats() {
  const container = document.getElementById("chatList");
  container.innerHTML = "";

  chats.forEach(chatName => {

    db.collection("chats")
      .doc(chatName)
      .collection("messages")
      .orderBy("createdAt", "desc")
      .limit(1)
      .onSnapshot(snapshot => {

        let lastText = "Нет сообщений";
        let time = "";

        snapshot.forEach(doc => {
          lastText = doc.data().text;
          const date = doc.data().createdAt?.toDate();
          if (date) {
            time = date.getHours() + ":" + String(date.getMinutes()).padStart(2,'0');
          }
        });

        const div = document.createElement("div");
        div.className = "chat";

        div.innerHTML = `
          <div class="avatar">${chatName[0]}</div>

          <div class="chatInfo">
            <div class="chatTop">
              <div class="chatName">${chatName}</div>
              <div class="time">${time}</div>
            </div>

            <div class="chatTop">
              <div class="lastMsg">${lastText}</div>
              <div class="badge">1</div>
            </div>
          </div>
        `;

        div.onclick = () => openChat(chatName);

        container.appendChild(div);

      });

  });
}

function openChat(name) {
  alert("Открыть чат: " + name);
}

loadChats();
</script>

</body>
</html>
