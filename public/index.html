<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0b1120;
  --card:#1e293b;
  --accent:#8b5cf6;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

body{
  margin:0;
  background: radial-gradient(circle at 80% 80%, #312e81, #020617);
  color:var(--text);
  font-family:system-ui;
}

.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
  width:80px;
  background:#020617;
  overflow:auto;
}

.tt{
  text-align:center;
  margin:10px 0;
}

.tt-circle{
  width:50px;height:50px;
  border-radius:50%;
  background:linear-gradient(135deg,#8b5cf6,#a855f7);
  display:flex;align-items:center;justify-content:center;
  margin:auto;
  cursor:pointer;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}

/* HEADER */
.header{
  height:60px;
  background:#1e293b;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

/* PIN */
.pin{
  background:rgba(139,92,246,0.2);
  padding:10px;
  display:none;
}

/* CHAT LIST */
.chat-list{flex:1;overflow:auto}

.chat{
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.badge{
  background:var(--accent);
  border-radius:20px;
  padding:3px 10px;
}

/* CHAT WINDOW */
.chat-window{
  flex:1;
  overflow:auto;
  padding:10px;
  display:none;
}

.msg{
  margin:10px 0;
  position:relative;
}

.bubble{
  background:var(--card);
  padding:10px;
  border-radius:12px;
}

.meta{
  font-size:10px;
  color:var(--muted);
}

.reply{
  font-size:12px;
  color:var(--muted);
}

/* REACTIONS */
.reactions span{
  margin-right:5px;
  cursor:pointer;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#020617;
}

.input input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#1e293b;
  color:white;
}

.send{
  width:45px;
  margin-left:10px;
  border:none;
  border-radius:50%;
  background:var(--accent);
  color:white;
}

/* CONTEXT MENU */
.menu{
  position:fixed;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  display:none;
}
.menu div{padding:5px;cursor:pointer}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="ttList"></div>

<div class="main">

<div class="header">
  <div id="title">Чаты</div>
</div>

<div class="pin" id="pin"></div>

<div class="chat-list" id="chatList"></div>

<div class="chat-window" id="chatWindow"></div>

<div class="input">
  <input id="msgInput">
  <button class="send" onclick="send()">➤</button>
</div>

</div>
</div>

<div class="menu" id="menu">
  <div onclick="pinMsg()">📌 Закрепить</div>
  <div onclick="delayMsg()">⏱ Отложить</div>
</div>

<script>

const chats=["Списание","Болталка","Важно"];

const data={
  "Науки 18":create(),
  "Культуры 12":create()
};

function create(){
  let obj={};
  chats.forEach(c=>obj[c]={messages:[],pin:null});
  return obj;
}

let currentTT=null;
let currentChat=null;
let selectedMsg=null;
let reply=null;

/* TT */
function renderTT(){
  Object.keys(data).forEach(tt=>{
    let d=document.createElement("div");
    d.className="tt";
    d.innerHTML=`<div class="tt-circle">${tt[0]}</div>`;
    d.onclick=()=>openTT(tt);
    ttList.appendChild(d);
  });
}

/* OPEN TT */
function openTT(tt){
  currentTT=tt;
  title.innerText=tt;
  renderChats();
}

/* CHATS */
function renderChats(){
  chatList.innerHTML="";
  chatList.style.display="block";
  chatWindow.style.display="none";

  Object.keys(data[currentTT]).forEach(c=>{
    let unread=data[currentTT][c].messages.filter(m=>!m.read).length;

    let d=document.createElement("div");
    d.className="chat";
    d.innerHTML=`${c}<span class="badge">${unread}</span>`;
    d.onclick=()=>openChat(c);
    chatList.appendChild(d);
  });
}

/* OPEN CHAT */
function openChat(c){
  currentChat=c;
  chatList.style.display="none";
  chatWindow.style.display="block";

  data[currentTT][c].messages.forEach(m=>m.read=true);

  renderMessages();
}

/* RENDER MSG */
function renderMessages(){
  chatWindow.innerHTML="";

  let chat=data[currentTT][currentChat];

  if(chat.pin){
    pin.style.display="block";
    pin.innerText="📌 "+chat.pin.text;
  }else pin.style.display="none";

  chat.messages.forEach((m,i)=>{
    let d=document.createElement("div");
    d.className="msg";

    d.innerHTML=`
      <div class="reply">${m.reply||""}</div>
      <div class="bubble">${m.text}</div>
      <div class="meta">${m.time}</div>
      <div class="reactions">
        👍 ${m.like||0}
        ❤️ ${m.heart||0}
      </div>
    `;

    /* LONG TAP */
    d.oncontextmenu=(e)=>{
      e.preventDefault();
      selectedMsg=m;
      menu.style.display="block";
      menu.style.left=e.pageX+"px";
      menu.style.top=e.pageY+"px";
    };

    /* SWIPE */
    let startX=0;
    d.ontouchstart=e=>startX=e.touches[0].clientX;
    d.ontouchend=e=>{
      let dx=e.changedTouches[0].clientX-startX;
      if(dx>80) replyMsg(m.text);
    };

    chatWindow.appendChild(d);
  });
}

/* SEND */
function send(){
  let text=msgInput.value;
  if(!text)return;

  let msg={
    text,
    time:new Date().toLocaleTimeString().slice(0,5),
    read:false,
    reply
  };

  data[currentTT][currentChat].messages.push(msg);

  msgInput.value="";
  reply=null;

  renderMessages();
}

/* REPLY */
function replyMsg(text){
  reply="Ответ: "+text;
}

/* PIN */
function pinMsg(){
  data[currentTT][currentChat].pin=selectedMsg;
  menu.style.display="none";
  renderMessages();
}

/* DELAY */
function delayMsg(){
  let text=prompt("Через сколько секунд?");
  setTimeout(()=>{
    data[currentTT][currentChat].messages.push({
      text:"(отложено)",
      time:"...",
      read:false
    });
    renderMessages();
  },text*1000);
}

/* INIT */
renderTT();

</script>
</body>
</html>
