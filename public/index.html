<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Сёстры — Чаты сети</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b1a2b;
  color:white;
}

/* ЛЕВАЯ ПАНЕЛЬ */
.sidebar {
  position:fixed;
  left:0;
  top:0;
  width:90px;
  height:100%;
  background:#071426;
  padding-top:10px;
  transition:0.3s;
  overflow:auto;
}

.sidebar.expanded {
  width:260px;
}

.tt {
  background:#0f223a;
  margin:10px;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
  font-size:14px;
}

.tt:hover {
  background:#18365c;
}

.active {
  background:#1f4d8f;
}

/* ПРАВАЯ ЧАСТЬ */
.main {
  margin-left:90px;
  transition:0.3s;
}

.sidebar.expanded ~ .main {
  margin-left:260px;
}

/* СПИСОК ПОДГРУПП */
.groups {
  padding:15px;
}

.group {
  background:#10263f;
  margin-bottom:10px;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

/* ЧАТ */
.chat {
  display:none;
  flex-direction:column;
  height:100vh;
}

.chat.active {
  display:flex;
}

.messages {
  flex:1;
  overflow:auto;
  padding:15px;
}

.msg {
  background:#132c49;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.input {
  display:flex;
  padding:10px;
  background:#071426;
}

.input input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

.input button {
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#2c6df2;
  color:white;
}

/* СЧЁТЧИК */
.badge {
  float:right;
  background:red;
  border-radius:50%;
  padding:3px 8px;
  font-size:12px;
}

/* МОБИЛКА */
@media(max-width:768px){
  .sidebar {
    width:70px;
  }
  .sidebar.expanded {
    width:200px;
  }
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main" id="main">
  <div class="groups" id="groups"></div>
  <div class="chat" id="chat">
    <div class="messages" id="messages"></div>

    <div class="input">
      <input id="msgInput" placeholder="Сообщение">
      <button onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script>

// ===== ДАННЫЕ =====

const TT = [
"Науки 18",
"Культуры 12",
"Ольги Форш 13",
"Художников 27",
"Товарищеский",
"Ворошилова",
"Антонова"
];

const GROUPS = [
"Болталка",
"Ежедневная уборка",
"Кассовые операции",
"Колобокс",
"График работы",
"Списания",
"Показания счётчиков",
"Инвентаризация",
"Важная информация",
"Предзаказы",
"Передача смены"
];

// ===== СОСТОЯНИЕ =====
let currentTT = null;
let currentGroup = null;

let messages = {}; // ключ: TT+group

let unread = {};

// ===== UI =====

const sidebar = document.getElementById("sidebar");
const groupsDiv = document.getElementById("groups");
const chatDiv = document.getElementById("chat");
const messagesDiv = document.getElementById("messages");

// ===== СОЗДАЁМ ТТ =====
TT.forEach(tt => {
  const el = document.createElement("div");
  el.className = "tt";
  el.innerHTML = tt + ' <span class="badge" id="b_'+tt+'">0</span>';

  el.onclick = () => openTT(tt);

  sidebar.appendChild(el);
});

// ===== ОТКРЫТИЕ ТТ =====
function openTT(tt){
  currentTT = tt;
  sidebar.classList.add("expanded");

  groupsDiv.innerHTML = "";

  GROUPS.forEach(g => {
    const el = document.createElement("div");
    el.className = "group";
    el.innerText = g;

    el.onclick = () => openChat(g);

    groupsDiv.appendChild(el);
  });
}

// ===== ОТКРЫТИЕ ЧАТА =====
function openChat(group){
  currentGroup = group;
  chatDiv.classList.add("active");

  loadMessages();

  // обнуляем счётчик
  unread[key()] = 0;
  updateBadges();
}

// ===== КЛЮЧ =====
function key(){
  return currentTT + "_" + currentGroup;
}

// ===== ЗАГРУЗКА =====
function loadMessages(){
  messagesDiv.innerHTML = "";

  let arr = messages[key()] || [];

  arr.forEach(m => {
    const el = document.createElement("div");
    el.className = "msg";
    el.innerText = m;
    messagesDiv.appendChild(el);
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ===== ОТПРАВКА =====
function sendMsg(){
  const input = document.getElementById("msgInput");
  const text = input.value;

  if(!text) return;

  if(!messages[key()]) messages[key()] = [];

  messages[key()].push(text);

  input.value = "";

  loadMessages();
}

// ===== СЧЁТЧИК =====
function updateBadges(){
  TT.forEach(tt => {
    let total = 0;

    GROUPS.forEach(g => {
      let k = tt+"_"+g;
      total += unread[k] || 0;
    });

    document.getElementById("b_"+tt).innerText = total;
  });
}

// ===== ИМИТАЦИЯ УВЕДОМЛЕНИЙ =====
setInterval(()=>{
  let tt = TT[Math.floor(Math.random()*TT.length)];
  let g = GROUPS[Math.floor(Math.random()*GROUPS.length)];

  let k = tt+"_"+g;

  if(!messages[k]) messages[k]=[];

  messages[k].push("Новое сообщение");

  unread[k] = (unread[k]||0)+1;

  updateBadges();

}, 5000);

</script>

</body>
</html>
