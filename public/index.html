<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sisters Chat</title>

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --accent:#7c3aed;
  --text:#fff;
}

/* PATTERN */
body{
  margin:0;
  font-family:system-ui;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, rgba(124,58,237,0.15), transparent),
    radial-gradient(circle at 80% 80%, rgba(59,130,246,0.1), transparent),
    var(--bg);
}

/* LAYOUT */
.app{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:300px;
  background:#020617;
  border-right:1px solid #111;
  overflow:auto;
}

.section{
  padding:10px;
  font-size:12px;
  opacity:.6;
}

.group{
  margin-bottom:10px;
}

.group-title{
  padding:10px;
  font-weight:bold;
  color:#a78bfa;
}

.sub{
  padding:10px 20px;
  cursor:pointer;
  border-radius:8px;
  margin:2px 6px;
}

.sub:hover{
  background:#0f172a;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  padding:12px;
  background:rgba(15,23,42,0.8);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #111;
  display:flex;
  align-items:center;
}

.messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  max-width:75%;
  padding:10px;
  border-radius:12px;
  margin:6px 0;
  background:var(--card);
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.me{
  background:var(--accent);
  margin-left:auto;
}

.meta{
  font-size:10px;
  opacity:.6;
}

img.chat-img{
  max-width:200px;
  border-radius:10px;
  margin-top:5px;
}

/* INPUT */
.input{
  display:flex;
  border-top:1px solid #111;
}

.input input{
  flex:1;
  padding:14px;
  background:transparent;
  border:none;
  color:white;
}

.input button{
  padding:14px;
  background:var(--accent);
  border:none;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{width:100%;}
  .chat{display:none;}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="sidebar"></div>

<div class="chat" id="chat">

<div class="header">
<span onclick="back()">←</span>
<span id="title" style="margin-left:10px">Выберите чат</span>
<span style="margin-left:auto" onclick="openProfile()">👤</span>
</div>

<div class="messages" id="messages"></div>

<div class="input">
<input id="text">
<input type="file" id="file">
<button onclick="send()">➤</button>
</div>

</div>

</div>

<!-- PROFILE -->
<div id="profile" style="display:none;position:fixed;inset:0;background:#020617;">
<div style="padding:20px">
<h3>Профиль</h3>
<input id="p_name" placeholder="Имя"><br><br>
<input id="p_photo" placeholder="Фото URL"><br><br>
<button onclick="saveProfile()">Сохранить</button>
</div>
</div>

<script>

const points = {
  "СЕВЕР":[
    "Науки 18","Культуры 12","Художников 27","Ольги Форш 14"
  ],
  "ЮГ":[
    "Товарищеский 22к1","Ворошилова 33к1","Антонова Овсиенко 25к1"
  ]
};

const subs = ["Болталка","Уборка","Важно"];

let current=null;
let userData=JSON.parse(localStorage.getItem("userData")||"{}");

if(!userData.name){
  userData.name=prompt("Введите имя");
  localStorage.setItem("userData",JSON.stringify(userData));
}

/* BUILD SIDEBAR */
function build(){
  let html="";

  for(let zone in points){
    html+=`<div class="section">${zone}</div>`;

    points[zone].forEach(p=>{
      html+=`<div class="group">
        <div class="group-title">${p}</div>`;

      subs.forEach(s=>{
        html+=`<div class="sub" onclick="openChat('${p} / ${s}')">• ${s}</div>`;
      });

      html+=`</div>`;
    });
  }

  html+=`
  <div class="section">ОБЩИЕ</div>
  <div class="sub" onclick="openChat('Фото витрины')">📸 Фото витрины</div>
  <div class="sub" onclick="openChat('Фин отчёт')">💰 Фин отчёт</div>
  `;

  sidebar.innerHTML=html;
}

build();

/* CHAT */
function openChat(name){
  current=name;
  title.innerText=name;
  render();

  if(innerWidth<768){
    sidebar.style.display="none";
    chat.style.display="flex";
  }
}

function back(){
  sidebar.style.display="block";
  chat.style.display="none";
}

function get(){
  return JSON.parse(localStorage.getItem(current)||"[]");
}

function save(d){
  localStorage.setItem(current,JSON.stringify(d));
}

function render(){
  let d=get();
  messages.innerHTML="";

  d.forEach((m,i)=>{
    let el=document.createElement("div");
    el.className="msg "+(m.user==userData.name?"me":"");

    el.innerHTML=`
    <b>${m.user}</b><br>
    ${m.text||""}
    ${m.img?`<img src="${m.img}" class="chat-img">`:""}
    <div class="meta" onclick="react(${i})">${m.react||""}</div>
    `;

    messages.appendChild(el);
  });

  messages.scrollTop=9999;
}

/* SEND */
function send(){
  if(!current) return alert("Выбери чат");

  let t=text.value;
  let f=file.files[0];

  let d=get();

  if(f){
    let reader=new FileReader();
    reader.onload=e=>{
      d.push({user:userData.name,img:e.target.result});
      save(d);
      render();
    };
    reader.readAsDataURL(f);
  }

  if(t){
    d.push({user:userData.name,text:t});
    save(d);
  }

  text.value="";
  file.value="";
  render();
}

/* REACTION */
function react(i){
  let d=get();
  d[i].react="👍";
  save(d);
  render();
}

/* PROFILE */
function openProfile(){
  profile.style.display="block";
  p_name.value=userData.name||"";
  p_photo.value=userData.photo||"";
}

function saveProfile(){
  userData.name=p_name.value;
  userData.photo=p_photo.value;
  localStorage.setItem("userData",JSON.stringify(userData));
  profile.style.display="none";
}

/* AUTO */
setInterval(()=>{if(current)render()},1000);

</script>

</body>
</html>
