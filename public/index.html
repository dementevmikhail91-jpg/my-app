<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messenger</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  font-size: 18px;
  font-weight: 600;
}

/* LIST */
.list {
  padding: 10px;
}

.item {
  padding: 15px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
}

.item:hover {
  background: rgba(255,255,255,0.05);
}

/* CHAT */
.chat {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.message {
  background: #2563eb;
  padding: 10px 15px;
  border-radius: 15px;
  margin: 5px 0;
  max-width: 70%;
}

.message.me {
  margin-left: auto;
  background: #22c55e;
}

/* INPUT */
.input-area {
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
}

/* BOTTOM NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #111827;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.nav button {
  flex: 1;
  background: none;
  border: none;
  color: white;
  padding: 12px;
}
</style>
</head>

<body>

<div id="app"></div>

<div class="nav">
  <button onclick="goHome()">Чаты</button>
  <button onclick="openProfile()">Профиль</button>
</div>

<script>
let db = JSON.parse(localStorage.getItem('db')) || {
  points: [
    "Антонова Овсиенко",
    "Культуры 12",
    "Науки 18",
    "Ольги Форш 13"
  ],
  chats: {},
};

function save() {
  localStorage.setItem('db', JSON.stringify(db));
}

/* ---------- HOME ---------- */
function goHome() {
  let html = `<div class="header">Чаты</div><div class="list">`;

  db.points.forEach(p => {
    html += `<div class="item" onclick="openPoint('${p}')">${p}</div>`;
  });

  html += `</div>`;
  app.innerHTML = html;
}

/* ---------- POINT ---------- */
function openPoint(point) {
  let chats = ["Основной чат","Поставки","Смена","Финансы"];

  let html = `<div class="header">← ${point}</div><div class="list">`;

  chats.forEach(c => {
    html += `<div class="item" onclick="openChat('${point}','${c}')">${c}</div>`;
  });

  html += `</div>`;
  app.innerHTML = html;
}

/* ---------- CHAT ---------- */
function openChat(point, chat) {
  let key = point + "_" + chat;

  if (!db.chats[key]) db.chats[key] = [];

  let html = `
  <div class="chat">
    <div class="header">← ${chat}</div>
    <div class="messages" id="msgs"></div>

    <div class="input-area">
      <input id="msgInput" placeholder="Сообщение"/>
      <button onclick="send('${key}')">➤</button>
    </div>
  </div>
  `;

  app.innerHTML = html;

  renderMessages(key);
}

/* ---------- RENDER ---------- */
function renderMessages(key) {
  let msgs = db.chats[key];
  let html = "";

  msgs.forEach(m => {
    html += `<div class="message ${m.me ? 'me':''}">${m.text}</div>`;
  });

  document.getElementById("msgs").innerHTML = html;
}

/* ---------- SEND ---------- */
function send(key) {
  let input = document.getElementById("msgInput");
  if (!input.value) return;

  db.chats[key].push({ text: input.value, me: true });

  input.value = "";
  save();
  renderMessages(key);
}

/* ---------- PROFILE ---------- */
function openProfile() {
  app.innerHTML = `
    <div class="header">Профиль</div>
    <div class="list">
      <div class="item">Имя: Админ</div>
      <div class="item">Роль: Управляющий</div>
      <div class="item" onclick="clearDB()">🧹 Очистить данные</div>
    </div>
  `;
}

/* ---------- CLEAR ---------- */
function clearDB() {
  if (confirm("Удалить ВСЕ данные?")) {
    localStorage.removeItem("db");
    location.reload();
  }
}

/* START */
goHome();
</script>

</body>
</html>
