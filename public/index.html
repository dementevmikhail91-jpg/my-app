<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сёстры Chat</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1a2a;
  color:#fff;
}

/* ЛЕВАЯ ПАНЕЛЬ */
.sidebar {
  width:90px;
  background:#081521;
  height:100vh;
  overflow:auto;
  transition:0.3s;
}
.sidebar.expanded { width:260px; }

.tt {
  padding:12px;
  margin:8px;
  background:#0f2740;
  border-radius:12px;
  position:relative;
  cursor:pointer;
}

.badge {
  position:absolute;
  right:8px;
  top:8px;
  background:#ffcc00; /* заменить на бренд */
  color:#000;
  padding:3px 7px;
  border-radius:50%;
  font-size:12px;
}

/* ПОДГРУППЫ */
.subgroups {
  flex:1;
  padding:10px;
}

.sub {
  background:#112f4d;
  margin:6px;
  padding:10px;
  border-radius:12px;
  position:relative;
}

/* ЧАТ */
.chat {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0b1a2a;
  display:none;
  flex-direction:column;
}

.chat-header {
  padding:15px;
  background:#081521;
  display:flex;
  align-items:center;
  gap:10px;
}

.messages {
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg {
  margin:6px 0;
  padding:10px;
  background:#132f4a;
  border-radius:12px;
}

.input {
  display:flex;
  padding:10px;
  background:#081521;
}

input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button {
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
}

/* НИЖНИЙ БАР */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  background:#081521;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

</style>
</head>

<body>

<div style="display:flex">
  <div class="sidebar" id="sidebar"></div>
  <div class="subgroups" id="subgroups"></div>
</div>

<div class="chat" id="chat">
  <div class="chat-header">
    <button onclick="closeChat()">←</button>
    <span id="chatTitle"></span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="msgInput">
    <button onclick="sendMsg()">➤</button>
  </div>
</div>

<div class="bottom">
  <div>💬</div>
  <div>📊</div>
  <div>⚙️</div>
  <div>👤</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 ВСТАВЬ СВОИ ДАННЫЕ */
const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  projectId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ДАННЫЕ */
const TT = [
  "Науки 18","Культуры 12","Ольги Форш 13",
  "Художников 27","Товарищеский","Ворошилова","Антонова"
];

const SUB = [
"Болталка","Ежедневная уборка","Кассовые операции",
"Колобокс","График работы","Списания",
"Показания счётчиков","Инвентаризация",
"Важная информация","Предзаказы","Передача смены"
];

let currentTT = "";
let currentSub = "";

/* РЕНДЕР ТТ */
TT.forEach(t=>{
  let div = document.createElement("div");
  div.className="tt";
  div.innerText=t;

  div.onclick=()=>{
    currentTT=t;
    renderSubs();
    sidebar.classList.add("expanded");
  }

  sidebar.appendChild(div);
});

/* ПОДГРУППЫ */
function renderSubs(){
  subgroups.innerHTML="";
  SUB.forEach(s=>{
    let div = document.createElement("div");
    div.className="sub";
    div.innerText=s;

    div.onclick=()=>{
      currentSub=s;
      openChat();
    }

    subgroups.appendChild(div);
  });
}

/* ЧАТ */
function openChat(){
  chat.style.display="flex";
  chatTitle.innerText = currentTT + " / " + currentSub;

  const q = query(
    collection(db, currentTT + "_" + currentSub),
    orderBy("time")
  );

  onSnapshot(q, snap=>{
    messages.innerHTML="";
    snap.forEach(doc=>{
      let d = doc.data();
      let div = document.createElement("div");
      div.className="msg";
      div.innerText = d.text;
      messages.appendChild(div);
    });
  });
}

window.closeChat=()=> chat.style.display="none";

/* ОТПРАВКА */
window.sendMsg=async ()=>{
  let text = msgInput.value;
  if(!text) return;

  await addDoc(
    collection(db, currentTT + "_" + currentSub),
    {
      text,
      time: Date.now()
    }
  );

  msgInput.value="";
};

</script>
</body>
</html>
