<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  padding: 16px;
  font-size: 20px;
  font-weight: 700;
  background: #111827;
}

/* LIST */
.chat-item {
  display: flex;
  align-items: center;
  padding: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #2563eb;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 12px;
  font-weight: 600;
}

/* CHAT SCREEN */
.chat {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* FIXED HEADER */
.chat-header {
  flex-shrink: 0;
}

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  padding-bottom: 120px; /* чтобы не перекрывалось */
}

.message {
  background: #1f2937;
  padding: 10px 14px;
  border-radius: 16px;
  margin: 6px 0;
  max-width: 75%;
  word-break: break-word;
}

.message.me {
  margin-left: auto;
  background: #2563eb;
}

/* INPUT FIXED */
.input-area {
  position: fixed;
  bottom: 60px;
  left: 0;
  width: 100%;
  display: flex;
  padding: 10px;
  background: #111827;
  box-sizing: border-box;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 16px;
}

.send-btn {
  margin-left: 8px;
  padding: 0 16px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 12px;
  font-size: 18px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #111827;
  border-top: 1px solid rgba(255,255,255,0.05);
}

.nav button {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: white;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="app"></div>

<div class="nav">
  <button onclick="goHome()">💬 Чаты</button>
  <button onclick="openProfile()">👤 Профиль</button>
</div>

<script>
const app = document.getElementById('app');

/* DB SAFE */
function getDB() {
  try {
    let db = JSON.parse(localStorage.getItem('db'));
    if (!db || !db.points) throw "bad";
    return db;
  } catch {
    return {
      points: [
        "Антонова Овсиенко",
        "Культуры 12",
        "Науки 18",
        "Ольги Форш 13",
        "Художников 27к1",
        "Товарищеский 22к1",
        "Ворошилова 33к1"
      ],
      chats: {}
    };
  }
}

let db = getDB();

function save() {
  localStorage.setItem('db', JSON.stringify(db));
}

/* HOME */
function goHome() {
  let html = `<div class="header">Чаты</div>`;

  db.points.forEach(p => {
    html += `
      <div class="chat-item" onclick="openPoint('${p}')">
        <div class="avatar">${p[0]}</div>
        <div>${p}</div>
      </div>
    `;
  });

  app.innerHTML = html;
}

/* POINT */
function openPoint(point) {
  let chats = ["Основной чат","Поставки","Смена","Финансы"];

  let html = `<div class="header">← ${point}</div>`;

  chats.forEach(c => {
    html += `
      <div class="chat-item" onclick="openChat('${point}','${c}')">
        <div class="avatar">💬</div>
        <div>${c}</div>
      </div>
    `;
  });

  app.innerHTML = html;
}

/* CHAT */
function openChat(point, chat) {
  let key = point+"_"+chat;

  if (!db.chats[key]) db.chats[key] = [];

  app.innerHTML = `
  <div class="chat">
    <div class="header chat-header" onclick="openPoint('${point}')">
      ← ${chat}
    </div>

    <div class="messages" id="msgs"></div>

    <div class="input-area">
      <input id="msgInput" placeholder="Сообщение">
      <button class="send-btn" onclick="send('${key}')">➤</button>
    </div>
  </div>
  `;

  renderMessages(key);
}

/* RENDER */
function renderMessages(key) {
  let msgs = db.chats[key];
  let html = "";

  msgs.forEach(m => {
    html += `<div class="message ${m.me ? 'me' : ''}">${m.text}</div>`;
  });

  const container = document.getElementById("msgs");
  container.innerHTML = html;

  /* авто-скролл вниз */
  setTimeout(() => {
    container.scrollTop = container.scrollHeight;
  }, 50);
}

/* SEND */
function send(key) {
  let input = document.getElementById("msgInput");

  if (!input.value.trim()) return;

  db.chats[key].push({
    text: input.value,
    me: true
  });

  input.value = "";

  save();
  renderMessages(key);
}

/* PROFILE */
function openProfile() {
  app.innerHTML = `
    <div class="header">Профиль</div>
    <div class="chat-item">👤 Администратор</div>
  `;
}

/* START */
goHome();
</script>

</body>
</html>
