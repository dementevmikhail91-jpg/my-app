<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakery Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

.topbar{
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.item{
  padding:15px;
  border-bottom:1px solid #1e293b;
}

.chat-item{
  display:flex;
  align-items:center;
  padding:15px;
  border-bottom:1px solid #1e293b;
}

.avatar{
  width:40px;
  height:40px;
  background:#3b82f6;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:10px;
}

.badge{
  background:red;
  padding:4px 8px;
  border-radius:10px;
  font-size:12px;
}

.input-bar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#0f172a;
}

.input-bar input{
  flex:1;
  padding:10px;
  border:none;
}

.input-bar button{
  padding:10px;
  background:#3b82f6;
  border:none;
  color:white;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user = JSON.parse(localStorage.getItem("user"));
const app = document.getElementById("app");


// ========= LOGIN =========

function renderLogin(){
  app.innerHTML = `
    <div class="topbar">Вход</div>
    <div class="item">
      <input id="name" placeholder="Имя"><br><br>
      <input id="point" placeholder="ТТ (kultury12)"><br><br>
      <button onclick="login()">Войти</button>
    </div>
  `;
}

window.login = function(){
  user = {
    uid: Date.now().toString(),
    name: document.getElementById("name").value,
    pointId: document.getElementById("point").value,
    role: "staff"
  };

  localStorage.setItem("user", JSON.stringify(user));
  initChats();
  renderMenu();
}


// ========= MENU =========

function renderMenu(){
  app.innerHTML = `
    <div class="topbar">Меню</div>
    <div class="item" onclick="loadChats()">💬 Чаты</div>
    <div class="item" onclick="loadSupplies()">📦 Поставки</div>
    <div class="item" onclick="logout()">🚪 Выйти</div>
  `;
}

window.logout = function(){
  localStorage.clear();
  location.reload();
}


// ========= INIT CHATS =========

function initChats(){
  const chats = [
    {id:"main", name:"Общий чат", type:"group"},
    {id:"kultury12", name:"Культуры 12", type:"point"},
    {id:"nauki18", name:"Науки 18", type:"point"},
    {id:"forsh13", name:"Ольги Форш 13", type:"point"},
    {id:"hudo27", name:"Художников 27к1", type:"point"},
    {id:"tov22", name:"Товарищеский 22к1", type:"point"},
    {id:"vor33", name:"Ворошилова 33к1", type:"point"}
  ];

  chats.forEach(c=>{
    db.collection("chats").doc(c.id).set({
      name:c.name,
      type:c.type,
      pointId:c.id,
      unreadCount:0
    }, {merge:true});
  });
}


// ========= CHATS =========

window.loadChats = function(){
  app.innerHTML = `<div class="topbar">Чаты</div>`;

  db.collection("chats").onSnapshot(snap=>{
    let html = `<div class="topbar">Чаты</div>`;

    snap.forEach(doc=>{
      let c = doc.data();

      if(user.role==="staff" && c.type==="point" && c.pointId!==user.pointId) return;

      html += `
        <div class="chat-item" onclick="openChat('${doc.id}','${c.name}')">
          <div class="avatar">${c.name[0]}</div>
          <div style="flex:1">${c.name}</div>
          ${c.unreadCount>0?`<div class="badge">${c.unreadCount}</div>`:""}
        </div>
      `;
    });

    app.innerHTML = html;
  });
}


// ========= OPEN CHAT =========

window.openChat = function(id,name){
  app.innerHTML = `
    <div class="topbar" onclick="loadChats()">← ${name}</div>
    <div id="msgs" style="height:70vh;overflow:auto;padding:10px"></div>
    <div class="input-bar">
      <input id="msg">
      <button onclick="sendMsg('${id}')">➤</button>
    </div>
  `;

  db.collection("chats").doc(id).collection("messages")
  .orderBy("createdAt")
  .onSnapshot(snap=>{
    let html="";

    snap.forEach(d=>{
      let m=d.data();
      let mine = m.userId===user.uid;

      html += `
        <div style="text-align:${mine?'right':'left'}">
          <div style="
            display:inline-block;
            background:${mine?'#3b82f6':'#1e293b'};
            padding:8px;
            border-radius:10px;
            margin:4px;
          ">
            ${m.name}<br>${m.text}
          </div>
        </div>
      `;
    });

    let box=document.getElementById("msgs");
    if(box){
      box.innerHTML=html;
      box.scrollTop=box.scrollHeight;
    }
  });

  db.collection("chats").doc(id).update({unreadCount:0});
}


// ========= SEND =========

window.sendMsg = function(id){
  let text=document.getElementById("msg").value;
  if(!text) return;

  db.collection("chats").doc(id).collection("messages").add({
    text,
    name:user.name,
    userId:user.uid,
    createdAt:Date.now()
  });

  db.collection("chats").doc(id).update({
    unreadCount: firebase.firestore.FieldValue.increment(1)
  });

  document.getElementById("msg").value="";
}


// ========= SUPPLIES =========

window.loadSupplies = function(){
  db.collection("supplies").onSnapshot(snap=>{
    let html = `<div class="topbar">Поставки</div>
    <div class="item" onclick="newSupply()">➕ Новая</div>`;

    snap.forEach(doc=>{
      let s=doc.data();

      if(user.role==="staff" && s.pointId!==user.pointId) return;

      html+=`
        <div class="item">
          ${s.items}<br>${s.status}
        </div>
      `;
    });

    app.innerHTML=html;
  });
}

window.newSupply = function(){
  let items = prompt("Что нужно?");
  if(!items) return;

  db.collection("supplies").add({
    items,
    pointId:user.pointId,
    status:"new",
    createdAt:Date.now()
  });
}


// ========= START =========

if(user){
  renderMenu();
}else{
  renderLogin();
}

});
</script>

</body>
</html>
