<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f172a;
  color: white;
}

.header {
  padding: 16px;
  font-size: 20px;
  font-weight: 700;
  background: #111827;
}

.chat-item {
  display: flex;
  align-items: center;
  padding: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
}

.avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #2563eb;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
}

.chat {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  padding-bottom: 90px;
}

.message {
  background: #1f2937;
  padding: 10px;
  border-radius: 12px;
  margin: 5px 0;
  max-width: 70%;
}

.message.me {
  margin-left: auto;
  background: #2563eb;
}

.input-area {
  position: fixed;
  bottom: 60px;
  width: 100%;
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 10px;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #111827;
}

.nav button {
  flex: 1;
  background: none;
}
</style>
</head>

<body>

<div id="app"></div>

<div class="nav">
  <button onclick="goHome()">💬 Чаты</button>
  <button onclick="openProfile()">👤 Профиль</button>
</div>

<script>
const app = document.getElementById('app');

/* SAFE DB */
function getDB() {
  try {
    let db = JSON.parse(localStorage.getItem('db'));
    if (!db || !db.points) throw "bad";
    return db;
  } catch {
    return {
      points: [
        "Антонова Овсиенко",
        "Культуры 12",
        "Науки 18",
        "Ольги Форш 13",
        "Художников 27к1",
        "Товарищеский 22к1",
        "Ворошилова 33к1"
      ],
      chats: {}
    };
  }
}

let db = getDB();

function save() {
  localStorage.setItem('db', JSON.stringify(db));
}

/* HOME */
function goHome() {
  let html = `<div class="header">Чаты</div>`;

  db.points.forEach(p => {
    html += `
      <div class="chat-item" onclick="openPoint('${p}')">
        <div class="avatar">${p[0]}</div>
        <div>${p}</div>
      </div>
    `;
  });

  app.innerHTML = html;
}

/* POINT */
function openPoint(point) {
  let chats = ["Основной чат","Поставки","Смена","Финансы"];

  let html = `<div class="header" onclick="goHome()">← ${point}</div>`;

  chats.forEach(c => {
    html += `
      <div class="chat-item" onclick="openChat('${point}','${c}')">
        <div class="avatar">💬</div>
        <div>${c}</div>
      </div>
    `;
  });

  app.innerHTML = html;
}

/* CHAT */
function openChat(point, chat) {
  let key = point+"_"+chat;

  if (!db.chats[key]) db.chats[key] = [];

  let html = `
  <div class="chat">
    <div class="header" onclick="openPoint('${point}')">← ${chat}</div>
    <div class="messages" id="msgs"></div>

    <div class="input-area">
      <input id="msgInput" placeholder="Сообщение">
      <button onclick="send('${key}')">➤</button>
    </div>
  </div>
  `;

  app.innerHTML = html;
  renderMessages(key);
}

/* RENDER */
function renderMessages(key) {
  let msgs = db.chats[key];
  let html = "";

  msgs.forEach(m => {
    html += `<div class="message ${m.me?'me':''}">${m.text}</div>`;
  });

  document.getElementById("msgs").innerHTML = html;
}

/* SEND */
function send(key) {
  let input = document.getElementById("msgInput");
  if (!input.value) return;

  db.chats[key].push({text: input.value, me: true});
  input.value = "";

  save();
  renderMessages(key);
}

/* PROFILE */
function openProfile() {
  app.innerHTML = `
    <div class="header">Профиль</div>
    <div class="chat-item">Админ</div>
  `;
}

/* RESET если всё сломалось */
function resetDB() {
  localStorage.removeItem('db');
  location.reload();
}

/* START */
goHome();
</script>

</body>
</html>
