<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sisters Chat</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* Layout */
.app {
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar {
  width:260px;
  background:#020617;
  overflow:auto;
  padding:10px;
}

.point {
  margin-bottom:10px;
}

.point-title {
  font-weight:bold;
  margin-top:10px;
}

.subchat {
  padding:6px 10px;
  cursor:pointer;
  border-radius:8px;
}

.subchat:hover {
  background:#1e293b;
}

.active {
  background:#2563eb;
}

/* Chat */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header {
  padding:10px;
  border-bottom:1px solid #1e293b;
  font-weight:bold;
}

.messages {
  flex:1;
  padding:10px;
  overflow:auto;
}

/* Bubbles */
.msg {
  max-width:70%;
  padding:8px 12px;
  border-radius:12px;
  margin-bottom:10px;
}

.me {
  background:#2563eb;
  margin-left:auto;
}

.other {
  background:#1e293b;
}

/* Input */
.input-area {
  display:flex;
  padding:10px;
  border-top:1px solid #1e293b;
}

input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button {
  margin-left:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}

/* Mobile */
@media (max-width:700px){
  .sidebar {
    width:90px;
  }
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar"></div>

<!-- CHAT -->
<div class="chat">
  <div class="chat-header" id="chatTitle">Выберите чат</div>
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="Сообщение...">
    <button onclick="send()">▶</button>
  </div>
</div>

</div>

<script>

// ====== ДАННЫЕ ======

const structure = {
  "СЕВЕР": {
    color:"#3b82f6",
    points:[
      "Науки 18",
      "Культуры 12",
      "Художников 27",
      "Ольги Форш 14"
    ]
  },
  "ЮГ": {
    color:"#ef4444",
    points:[
      "Товарищеский 22к1",
      "Ворошилова 33к1",
      "Антонова Овсиенко 25к1"
    ]
  }
}

const subchats = ["Болталка","Уборка","Важное"]

let currentChat = null

// ====== РЕНДЕР САЙДБАРА ======

function renderSidebar(){
  const sidebar = document.getElementById("sidebar")
  sidebar.innerHTML = ""

  Object.keys(structure).forEach(region=>{
    const block = document.createElement("div")

    const title = document.createElement("div")
    title.innerText = region
    title.style.color = structure[region].color
    block.appendChild(title)

    structure[region].points.forEach(point=>{
      const p = document.createElement("div")
      p.className="point"

      const t = document.createElement("div")
      t.className="point-title"
      t.innerText=point
      p.appendChild(t)

      subchats.forEach(sub=>{
        const s = document.createElement("div")
        s.className="subchat"
        s.innerText="• "+sub

        s.onclick=()=>{
          currentChat = point+"_"+sub
          document.getElementById("chatTitle").innerText = point+" / "+sub
          loadMessages()
          highlight(s)
        }

        p.appendChild(s)
      })

      block.appendChild(p)
    })

    sidebar.appendChild(block)
  })
}

function highlight(el){
  document.querySelectorAll(".subchat").forEach(e=>e.classList.remove("active"))
  el.classList.add("active")
}

// ====== СООБЩЕНИЯ ======

function loadMessages(){
  const box = document.getElementById("messages")
  box.innerHTML=""

  const data = JSON.parse(localStorage.getItem(currentChat)||"[]")

  data.forEach(m=>{
    addMessage(m.text,m.me)
  })
}

function addMessage(text,me){
  const box = document.getElementById("messages")

  const msg = document.createElement("div")
  msg.className = "msg " + (me?"me":"other")
  msg.innerText = text

  box.appendChild(msg)
  box.scrollTop = box.scrollHeight
}

// ====== ОТПРАВКА ======

function send(){
  const input = document.getElementById("input")
  const text = input.value.trim()

  if(!text || !currentChat) return

  addMessage(text,true)

  const data = JSON.parse(localStorage.getItem(currentChat)||"[]")
  data.push({text,me:true})
  localStorage.setItem(currentChat,JSON.stringify(data))

  input.value=""

  notify("Новое сообщение")
}

// ====== УВЕДОМЛЕНИЯ ======

function notify(text){
  if(Notification.permission==="granted"){
    new Notification(text)
  }
}

if(Notification.permission!=="granted"){
  Notification.requestPermission()
}

// ====== INIT ======

renderSidebar()

</script>

</body>
</html>
