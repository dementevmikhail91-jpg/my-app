<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial;}
.header{padding:15px;font-size:20px;font-weight:bold;}
.chat{padding:15px;border-bottom:1px solid #1e293b;cursor:pointer;}
.message{padding:10px;margin:5px;border-radius:10px;background:#1e293b;}
.me{background:#3b82f6;}
.inputWrap{position:fixed;bottom:0;width:100%;display:flex;background:#0f172a;padding:10px;}
input{flex:1;padding:10px;border-radius:20px;border:none;background:#1e293b;color:white;}
button{background:#3b82f6;border:none;padding:10px 15px;border-radius:10px;color:white;margin-left:5px;}
#messages{padding-bottom:80px;}
</style>
</head>

<body>

<div id="app">Загрузка...</div>

<script>

// 🔥 Firebase (твой)
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7"
};

// ❗ УБРАЛ analytics (он ломал)
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user = null;
let currentChat = null;

// 🔥 ГЛОБАЛЬНЫЙ ЛОВЕЦ ОШИБОК
window.onerror = function(msg){
  document.body.innerHTML = "<div style='padding:20px;color:red'>Ошибка: "+msg+"</div>";
};

// 🔹 ЛОГИН
async function start(){
  try{
    await auth.signInAnonymously();
    user = auth.currentUser;

    loadChats();

  }catch(e){
    document.body.innerHTML = "Ошибка входа: "+e;
  }
}

// 🔹 ЧАТЫ
async function loadChats(){
  const snap = await db.collection("chats").get();

  let html = "<div class='header'>Telegram 🚗</div>";
  html += `<div class="chat" onclick="createChat()">➕ Новый чат</div>`;

  snap.forEach(doc=>{
    const c = doc.data();
    html += `<div class="chat" onclick="openChat('${doc.id}','${c.name}')">${c.name}</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

// 🔹 СОЗДАТЬ
async function createChat(){
  const name = prompt("Название");
  if(!name) return;

  await db.collection("chats").add({
    name:name,
    time:Date.now()
  });

  loadChats();
}

// 🔹 ОТКРЫТЬ ЧАТ
function openChat(id,name){
  currentChat = id;

  document.getElementById("app").innerHTML = `
    <div class="header" onclick="loadChats()">← ${name}</div>
    <div id="messages"></div>

    <div class="inputWrap">
      <input id="msg" placeholder="Сообщение">
      <button onclick="send()">➤</button>
    </div>
  `;

  db.collection("chats")
    .doc(id)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap=>{
      let html = "";

      snap.forEach(doc=>{
        const m = doc.data();

        html += `
          <div class="message ${m.uid===user.uid?'me':''}">
            ${m.text}
          </div>
        `;
      });

      document.getElementById("messages").innerHTML = html;
    });
}

// 🔹 ОТПРАВКА
async function send(){
  const text = document.getElementById("msg").value;
  if(!text) return;

  await db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .add({
      text:text,
      uid:user.uid,
      time:Date.now()
    });

  document.getElementById("msg").value="";
}

// 🚀 СТАРТ
start();

</script>

</body>
</html>
