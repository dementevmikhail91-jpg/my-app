<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ШРИФТ -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* === БРЕНД ПЕРЕМЕННЫЕ === */
:root{
  --bg:#0b1120;
  --bg2:#0f172a;
  --card:#1e293b;
  --accent:#8b5cf6;
  --accent2:#a855f7;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

/* === БАЗА === */
body{
  margin:0;
  font-family:'Inter', sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, #1e1b4b 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, #312e81 0%, transparent 40%),
    var(--bg);
}

/* === APP === */
.app{
  display:flex;
  height:100vh;
  backdrop-filter: blur(20px);
}

/* === SIDEBAR === */
.sidebar{
  width:90px;
  background:rgba(2,6,23,0.8);
  backdrop-filter: blur(20px);
  border-right:1px solid rgba(255,255,255,0.05);
}

.tt{
  margin:14px 0;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.tt:hover{
  transform:scale(1.05);
}

.tt-circle{
  width:52px;
  height:52px;
  border-radius:50%;
  margin:auto;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  box-shadow:0 8px 20px rgba(139,92,246,0.4);
}

/* === MAIN === */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* === HEADER === */
.header{
  height:60px;
  padding:0 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(30,41,59,0.6);
  backdrop-filter: blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* === CHAT LIST === */
.chat-list{
  flex:1;
  overflow:auto;
}

.chat{
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
  border-bottom:1px solid rgba(255,255,255,0.03);
}

.chat:hover{
  background:rgba(139,92,246,0.08);
}

/* badge */
.badge{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  padding:3px 10px;
  border-radius:20px;
  font-size:12px;
  box-shadow:0 4px 10px rgba(139,92,246,0.5);
}

/* === CHAT WINDOW === */
.chat-window{
  flex:1;
  overflow:auto;
  padding:20px;
  display:none;
}

/* messages */
.message{
  margin-bottom:14px;
}

.msg-user{
  font-size:12px;
  color:var(--muted);
  margin-bottom:4px;
}

.msg-bubble{
  display:inline-block;
  background:linear-gradient(135deg,#1e293b,#0f172a);
  padding:12px 14px;
  border-radius:14px;
  box-shadow:0 6px 15px rgba(0,0,0,0.4);
  max-width:70%;
}

.msg-time{
  font-size:10px;
  color:var(--muted);
  margin-top:3px;
}

/* === INPUT === */
.input{
  padding:12px;
  display:flex;
  background:rgba(2,6,23,0.9);
  backdrop-filter: blur(20px);
  border-top:1px solid rgba(255,255,255,0.05);
}

.input input{
  flex:1;
  border:none;
  outline:none;
  border-radius:30px;
  padding:12px 16px;
  background:#1e293b;
  color:white;
}

.send{
  width:48px;
  height:48px;
  margin-left:10px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 6px 15px rgba(139,92,246,0.6);
}

/* === BOTTOM === */
.bottom{
  height:65px;
  background:rgba(2,6,23,0.9);
  backdrop-filter: blur(20px);
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid rgba(255,255,255,0.05);
}

.bottom div{
  text-align:center;
  font-size:13px;
  color:var(--muted);
  cursor:pointer;
  transition:0.2s;
}

.bottom div:hover{
  color:white;
  transform:scale(1.1);
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="ttList"></div>

<div class="main">

<div class="header">
  <div id="title">Чаты</div>
  <div onclick="alert('Профиль')">👤 Профиль</div>
</div>

<div class="chat-list" id="chatList"></div>

<div class="chat-window" id="chatWindow"></div>

<div class="input">
  <input id="msgInput" placeholder="Сообщение...">
  <button class="send" onclick="sendMessage()">➤</button>
</div>

<div class="bottom">
  <div onclick="goHome()">💬<br>Чаты</div>
  <div>💰<br>Фин</div>
  <div>⚠<br>Важно</div>
  <div>🚚<br>Перемещение</div>
</div>

</div>
</div>

<script>

/* ДАННЫЕ */
const data={
 "Науки 18":{
   "Списание":[{user:"Катя",text:"Списание сделала",time:"21:00"}],
   "Болталка":[{user:"Олег",text:"Привет!",time:"21:05"}],
   "Важно":[]
 }
};

let currentTT=null;
let currentChat=null;

/* TT */
function renderTT(){
  const el=document.getElementById("ttList");
  el.innerHTML="";
  Object.keys(data).forEach(tt=>{
    const d=document.createElement("div");
    d.className="tt";
    d.innerHTML=`<div class="tt-circle">${tt[0]}</div>`;
    d.onclick=()=>openTT(tt);
    el.appendChild(d);
  });
}

/* TT OPEN */
function openTT(tt){
  currentTT=tt;
  renderChats();
}

/* CHAT LIST */
function renderChats(){
  const el=document.getElementById("chatList");
  el.style.display="block";
  chatWindow.style.display="none";
  el.innerHTML="";

  Object.keys(data[currentTT]).forEach(chat=>{
    const d=document.createElement("div");
    d.className="chat";
    d.innerHTML=`
      ${chat}
      <span class="badge">${data[currentTT][chat].length}</span>
    `;
    d.onclick=()=>openChat(chat);
    el.appendChild(d);
  });
}

/* CHAT */
function openChat(chat){
  currentChat=chat;
  title.innerText=currentTT+" / "+chat;
  chatList.style.display="none";
  chatWindow.style.display="block";
  renderMessages();
}

/* MSG */
function renderMessages(){
  chatWindow.innerHTML="";
  data[currentTT][currentChat].forEach(m=>{
    const d=document.createElement("div");
    d.className="message";
    d.innerHTML=`
      <div class="msg-user">${m.user}</div>
      <div class="msg-bubble">${m.text}</div>
      <div class="msg-time">${m.time}</div>
    `;
    chatWindow.appendChild(d);
  });
}

/* SEND */
function sendMessage(){
  if(!msgInput.value) return;

  data[currentTT][currentChat].push({
    user:"Вы",
    text:msgInput.value,
    time:new Date().toLocaleTimeString().slice(0,5)
  });

  msgInput.value="";
  renderMessages();
}

/* HOME */
function goHome(){
  chatWindow.style.display="none";
  chatList.style.display="block";
  title.innerText="Чаты";
}

/* INIT */
renderTT();

</script>

</body>
</html>
