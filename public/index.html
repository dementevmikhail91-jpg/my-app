<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sisters Chat</title>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#020617;
  color:white;
}

.app{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:300px;
  background:#020617;
  border-right:1px solid #111;
  overflow:auto;
}

.section{
  padding:10px;
  font-size:12px;
  color:#64748b;
}

.chat-item{
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid #111;
}

.chat-item:hover{
  background:#0f172a;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header{
  padding:12px;
  border-bottom:1px solid #111;
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
}

.messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  max-width:75%;
  padding:10px;
  border-radius:12px;
  margin:6px 0;
}

.me{
  background:#7c3aed;
  margin-left:auto;
}

.other{
  background:#1e293b;
}

.meta{
  font-size:10px;
  opacity:.6;
  margin-top:4px;
}

/* INPUT */
.input{
  display:flex;
  border-top:1px solid #111;
}

.input input{
  flex:1;
  padding:12px;
  border:none;
  background:#020617;
  color:white;
}

.input button{
  padding:12px;
  background:#7c3aed;
  border:none;
  color:white;
}

/* MOBILE */
@media(max-width:768px){

  .app{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
  }

  .chat{
    display:none;
  }

}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<div class="section">СЕВЕР</div>

<div class="chat-item" onclick="openChat('Науки 18 / Болталка')">Науки 18 💬
