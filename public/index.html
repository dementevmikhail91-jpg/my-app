<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Чат сети</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* ===== SIDEBAR (как меню) ===== */
.sidebar {
  position: fixed;
  width: 260px;
  height: 100%;
  background: #020617;
  padding: 15px;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: 0.3s;
  z-index: 10;
}

.sidebar.open {
  transform: translateX(0);
}

.menu-btn {
  padding: 10px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

.region {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.6;
}

.sub div {
  padding: 6px;
  cursor: pointer;
  border-radius: 6px;
}

.activeChat {
  background: #1e293b;
}

/* ===== CHAT ===== */
.chat {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  max-width: 75%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 14px;
  font-size: 14px;
}

.me {
  background: #6366f1;
  margin-left: auto;
}

.other {
  background: #1e293b;
}

/* ===== INPUT ===== */
.input {
  display: flex;
  padding: 8px;
  background: #020617;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

button {
  margin-left: 5px;
  padding: 10px 14px;
  border-radius: 20px;
  background: #6366f1;
  border: none;
  color: white;
}

/* DESKTOP */
@media(min-width:768px){
  .sidebar {
    transform: translateX(0);
    position: relative;
  }
  .chat {
    margin-left: 260px;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h3>Точки</h3>

  <div class="region">СЕВЕР</div>
  <div class="sub">
    <div onclick="openChat('nauki-chat', this)">Науки 18</div>
    <div onclick="openChat('kult-chat', this)">Культуры 12</div>
  </div>

  <div class="region">ЮГ</div>
  <div class="sub">
    <div onclick="openChat('tov-chat', this)">Товарищеский</div>
  </div>

  <div class="region">ОБЩИЕ</div>
  <div class="sub">
    <div onclick="openChat('photo', this)">📸 Фото витрины</div>
    <div onclick="openChat('finance', this)">💰 Фин отчёт</div>
  </div>
</div>

<!-- CHAT -->
<div class="chat">

  <div class="header">
    <button onclick="toggleMenu()">☰</button>
    <div id="header">Выберите чат</div>
  </div>

  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="text" placeholder="Сообщение..." />
    <button onclick="send()">➤</button>
  </div>

</div>

<script>
const socket = io();

let currentRoom = null;
let username = prompt("Введите имя") || "Сотрудник";

// меню
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
}

// открыть чат
function openChat(room, el){
  currentRoom = room;

  document.getElementById("messages").innerHTML = "";
  document.getElementById("header").innerText = room;

  socket.emit("join", room);

  document.querySelectorAll(".sub div").forEach(e => e.classList.remove("activeChat"));
  el.classList.add("activeChat");

  toggleMenu();
}

// отправка (ФИКС!)
function send(){
  const input = document.getElementById("text");
  const text = input.value.trim();

  if(!text || !currentRoom) return alert("Выберите чат");

  const data = {
    room: currentRoom,
    text: text,
    user: username
  };

  // 👉 СРАЗУ показываем сообщение (фикс)
  renderMessage(data);

  socket.emit("message", data);

  input.value = "";
}

// получение
socket.on("message", (data)=>{
  if(data.room !== currentRoom){
    notify(data);
    return;
  }

  renderMessage(data);
});

// рендер
function renderMessage(data){
  const div = document.createElement("div");
  div.className = "msg " + (data.user === username ? "me" : "other");

  div.innerHTML = `<b>${data.user}</b><br>${data.text}`;

  document.getElementById("messages").appendChild(div);

  div.scrollIntoView();
}

// уведомления
function notify(data){
  if(Notification.permission !== "granted"){
    Notification.requestPermission();
  }

  if(Notification.permission === "granted"){
    new Notification(data.user, { body: data.text });
  }
}
</script>

</body>
</html>
