<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  padding: 16px;
  font-size: 20px;
  font-weight: 700;
  background: #111827;
  display: flex;
  align-items: center;
}

.back {
  margin-right: 10px;
  cursor: pointer;
}

/* SEARCH */
.search {
  padding: 10px;
}

.search input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* LIST */
.chat-item {
  display: flex;
  align-items: center;
  padding: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
}

.chat-item:hover {
  background: rgba(255,255,255,0.05);
}

.avatar {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: #2563eb;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 12px;
  font-weight: 700;
}

.chat-info {
  flex: 1;
}

.chat-title {
  font-weight: 600;
}

.chat-last {
  font-size: 13px;
  opacity: 0.6;
}

.badge {
  background: #22c55e;
  padding: 4px 8px;
  border-radius: 10px;
  font-size: 12px;
}

/* CHAT */
.chat {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  padding-bottom: 90px;
}

.message {
  padding: 10px 14px;
  border-radius: 15px;
  margin: 6px 0;
  max-width: 70%;
  background: #1f2937;
}

.message.me {
  margin-left: auto;
  background: #2563eb;
}

/* INPUT */
.input-area {
  position: fixed;
  bottom: 60px;
  width: 100%;
  display: flex;
  padding: 10px;
  background: #111827;
  box-sizing: border-box;
}

input.msg {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.send-btn {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #111827;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.nav button {
  flex: 1;
  background: none;
  color: white;
  border: none;
  padding: 12px;
}
</style>
</head>

<body>

<div id="app"></div>

<div class="nav">
  <button onclick="goHome()">💬 Чаты</button>
  <button onclick="openProfile()">👤 Профиль</button>
</div>

<script>
let db = JSON.parse(localStorage.getItem('db')) || {
  points: [
    "Антонова Овсиенко",
    "Культуры 12",
    "Науки 18",
    "Ольги Форш 13",
    "Художников 27к1",
    "Товарищеский 22к1",
    "Ворошилова 33к1"
  ],
  chats: {},
  unread: {}
};

function save() {
  localStorage.setItem('db', JSON.stringify(db));
}

/* ---------- HOME ---------- */
function goHome(filter="") {
  let html = `
    <div class="header">Чаты</div>
    <div class="search">
      <input placeholder="Поиск..." oninput="goHome(this.value)">
    </div>
  `;

  db.points
    .filter(p => p.toLowerCase().includes(filter.toLowerCase()))
    .forEach(p => {
      let key = p+"_Основной чат";
      let msgs = db.chats[key] || [];
      let last = msgs.length ? msgs[msgs.length-1].text : "Нет сообщений";
      let unread = db.unread[key] || 0;

      html += `
        <div class="chat-item" onclick="openPoint('${p}')">
          <div class="avatar">${p[0]}</div>
          <div class="chat-info">
            <div class="chat-title">${p}</div>
            <div class="chat-last">${last}</div>
          </div>
          ${unread ? `<div class="badge">${unread}</div>` : ""}
        </div>
      `;
    });

  app.innerHTML = html;
}

/* ---------- POINT ---------- */
function openPoint(point) {
  let chats = ["Основной чат","Поставки","Смена","Финансы"];

  let html = `<div class="header">
    <span class="back" onclick="goHome()">←</span>${point}
  </div>`;

  chats.forEach(c => {
    html += `
      <div class="chat-item" onclick="openChat('${point}','${c}')">
        <div class="avatar">💬</div>
        <div class="chat-info">
          <div class="chat-title">${c}</div>
        </div>
      </div>
    `;
  });

  app.innerHTML = html;
}

/* ---------- CHAT ---------- */
function openChat(point, chat) {
  let key = point+"_"+chat;

  if (!db.chats[key]) db.chats[key] = [];
  db.unread[key] = 0;

  let html = `
  <div class="chat">
    <div class="header">
      <span class="back" onclick="openPoint('${point}')">←</span>${chat}
    </div>

    <div class="messages" id="msgs"></div>

    <div class="input-area">
      <input class="msg" id="msgInput" placeholder="Сообщение"/>
      <button class="send-btn" onclick="send('${key}')">➤</button>
    </div>
  </div>
  `;

  app.innerHTML = html;
  renderMessages(key);
}

/* ---------- RENDER ---------- */
function renderMessages(key) {
  let msgs = db.chats[key];
  let html = "";

  msgs.forEach(m => {
    html += `<div class="message ${m.me?'me':''}">${m.text}</div>`;
  });

  document.getElementById("msgs").innerHTML = html;
}

/* ---------- SEND ---------- */
function send(key) {
  let input = document.getElementById("msgInput");
  if (!input.value) return;

  db.chats[key].push({
    text: input.value,
    me: true
  });

  input.value = "";
  save();
  renderMessages(key);
}

/* ---------- SIMULATE OTHER USER ---------- */
function fakeIncoming() {
  let keys = Object.keys(db.chats);
  if (!keys.length) return;

  let key = keys[Math.floor(Math.random()*keys.length)];

  db.chats[key].push({
    text: "Новое сообщение",
    me: false
  });

  db.unread[key] = (db.unread[key] || 0) + 1;

  save();
}

setInterval(fakeIncoming, 8000);

/* ---------- PROFILE ---------- */
function openProfile() {
  app.innerHTML = `
    <div class="header">Профиль</div>
    <div class="chat-item">Имя: Админ</div>
    <div class="chat-item">Роль: Управляющий</div>
  `;
}

/* START */
goHome();
</script>

</body>
</html>
