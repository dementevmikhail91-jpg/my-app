<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial;}
.header{padding:15px;font-size:20px;font-weight:bold;}
.item{padding:15px;border-bottom:1px solid #1e293b;cursor:pointer;}
.message{padding:10px;margin:5px;border-radius:10px;background:#1e293b;}
.me{background:#3b82f6;}
.inputWrap{position:fixed;bottom:0;width:100%;display:flex;background:#0f172a;padding:10px;}
input{flex:1;padding:10px;border-radius:20px;border:none;background:#1e293b;color:white;}
button{background:#3b82f6;border:none;padding:10px 15px;border-radius:10px;color:white;margin-left:5px;}
#messages{padding-bottom:80px;}
</style>
</head>

<body>

<div id="app">Загрузка...</div>

<script>

// 🔥 Firebase (твой)
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user = null;

// 🚀 СТАРТ
auth.signInAnonymously().then(()=>{
  user = auth.currentUser;
  loadPoints();
});

// =======================
// 📍 УРОВЕНЬ 1 — ТТ
// =======================
async function loadPoints(){
  const snap = await db.collection("chats")
    .where("type","==","point")
    .get();

  let html = "<div class='header'>Точки</div>";

  snap.forEach(doc=>{
    const c = doc.data();
    html += `<div class="item" onclick="openPoint('${doc.id}','${c.name}')">${c.name}</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

// =======================
// 📁 УРОВЕНЬ 2 — ГРУППЫ
// =======================
async function openPoint(pointId,name){
  const snap = await db.collection("chats")
    .where("parent","==",pointId)
    .get();

  let html = `<div class="header" onclick="loadPoints()">← ${name}</div>`;

  snap.forEach(doc=>{
    const c = doc.data();
    html += `<div class="item" onclick="openChat('${doc.id}','${c.name}')">${c.name}</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

// =======================
// 💬 УРОВЕНЬ 3 — ЧАТ
// =======================
function openChat(chatId,name){

  document.getElementById("app").innerHTML = `
    <div class="header" onclick="loadPoints()">← ${name}</div>
    <div id="messages"></div>

    <div class="inputWrap">
      <input id="msg" placeholder="Сообщение">
      <button onclick="send('${chatId}')">➤</button>
    </div>
  `;

  db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap=>{
      let html = "";

      snap.forEach(doc=>{
        const m = doc.data();

        html += `
          <div class="message ${m.uid===user.uid?'me':''}">
            ${m.text}
          </div>
        `;
      });

      document.getElementById("messages").innerHTML = html;
    });
}

// =======================
// ✉️ ОТПРАВКА
// =======================
async function send(chatId){
  const input = document.getElementById("msg");
  const text = input.value;

  if(!text) return;

  await db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .add({
      text:text,
      uid:user.uid,
      time:Date.now()
    });

  input.value="";
}

</script>

</body>
</html>
