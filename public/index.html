<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* AUTH */
firebase.auth().signInAnonymously();

let user = { uid: null, name: localStorage.getItem("name") || "" };

firebase.auth().onAuthStateChanged(u => {
  if (!u) return;
  user.uid = u.uid;

  if (!user.name) askName();
  else initUser();
});

/* USER INIT */
function initUser() {
  db.collection("users").doc(user.uid).set({
    name: user.name,
    online: true,
    lastSeen: Date.now()
  });

  home();
}

/* NAME */
function askName() {
  document.body.innerHTML = `
    <h2>Введите имя</h2>
    <input id="n"><button onclick="saveName()">OK</button>
  `;
}

function saveName() {
  user.name = document.getElementById("n").value;
  localStorage.setItem("name", user.name);
  initUser();
}

/* ТТ */
const points = [
"Антонова Овсиенко",
"Культуры 12",
"Науки 18",
"Ольги Форш 13",
"Художников 27к1",
"Товарищеский 22к1",
"Ворошилова 33к1"
];

/* HOME + СЧЁТЧИК */
function home() {
  let html = `<h2>Чаты</h2>`;

  points.forEach(p => {
    const chatId = p+"_Основной чат";

    html += `
      <div onclick="openChat('${chatId}')">
        ${p}
        <span id="count_${chatId}">0</span>
      </div>
    `;

    db.collection("messages")
      .where("chatId","==",chatId)
      .onSnapshot(snap=>{
        document.getElementById("count_"+chatId).innerText = snap.size;
      });
  });

  document.body.innerHTML = html;
}

/* CHAT */
let unsub;

function openChat(chatId) {
  if (unsub) unsub();

  document.body.innerHTML = `
    <h2>${chatId}</h2>
    <div id="msgs"></div>
    <input id="msg">
    <button onclick="send('${chatId}')">Send</button>
  `;

  const box = document.getElementById("msgs");

  unsub = db.collection("messages")
    .where("chatId","==",chatId)
    .orderBy("createdAt")
    .onSnapshot(snap=>{
      box.innerHTML = "";
      snap.forEach(d=>{
        const m = d.data();
        box.innerHTML += `<p><b>${m.userName}</b>: ${m.text}</p>`;
      });
    });
}

/* SEND */
function send(chatId) {
  const text = document.getElementById("msg").value;

  db.collection("messages").add({
    chatId,
    text,
    userId: user.uid,
    userName: user.name,
    createdAt: Date.now()
  });

  document.getElementById("msg").value = "";
}
</script>
