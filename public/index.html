<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Чат сотрудников</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body{
  background: linear-gradient(180deg,#0a0f2a,#0d1b3f);
  color:#fff;
  height:100vh;
  overflow:hidden;
}

/* ОСНОВА */
.app{
  display:flex;
  height:100vh;
}

/* ЛЕВОЕ МЕНЮ */
.sidebar{
  width:260px;
  background:#0b1333;
  padding:15px;
  overflow-y:auto;
}

.title{
  font-size:20px;
  margin-bottom:10px;
  font-weight:600;
}

.section{
  margin-top:15px;
  font-size:12px;
  opacity:0.6;
}

.point{
  margin-top:10px;
}

.point-name{
  color:#a78bfa;
  font-weight:600;
  margin-bottom:5px;
}

.chat-item{
  padding:8px 10px;
  border-radius:8px;
  margin-bottom:5px;
  cursor:pointer;
  transition:0.2s;
}

.chat-item:hover{
  background:#1c2450;
}

.active{
  background:#6d4aff;
}

/* ЧАТ */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  height:60px;
  background:#0d1b3f;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.profile-btn{
  background:#6d4aff;
  border:none;
  color:#fff;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* СООБЩЕНИЯ */
.messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ПУЗЫРИ */
.msg{
  max-width:70%;
  padding:10px 14px;
  border-radius:14px;
  font-size:14px;
}

.me{
  align-self:flex-end;
  background:#6d4aff;
}

.other{
  align-self:flex-start;
  background:#1c2450;
}

/* ВВОД */
.input-area{
  height:60px;
  display:flex;
  gap:10px;
  padding:10px;
  background:#0d1b3f;
}

.input-area input{
  flex:1;
  border:none;
  border-radius:10px;
  padding:10px;
}

.send-btn{
  width:50px;
  border:none;
  background:#6d4aff;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

/* МОБИЛКА */
@media(max-width:768px){
  .sidebar{
    width:200px;
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- ЛЕВОЕ МЕНЮ -->
  <div class="sidebar">
    <div class="title">Точки</div>

    <div class="section">СЕВЕР</div>

    <div class="point">
      <div class="point-name">Науки 18</div>
      <div class="chat-item" onclick="openChat('Науки 18 / Болталка')">💬 Болталка</div>
      <div class="chat-item" onclick="openChat('Науки 18 / Уборка')">🧹 Уборка</div>
      <div class="chat-item" onclick="openChat('Науки 18 / Важно')">📢 Важно</div>
    </div>

    <div class="point">
      <div class="point-name">Культуры 12</div>
      <div class="chat-item" onclick="openChat('Культуры 12 / Болталка')">💬 Болталка</div>
      <div class="chat-item" onclick="openChat('Культуры 12 / Уборка')">🧹 Уборка</div>
      <div class="chat-item" onclick="openChat('Культуры 12 / Важно')">📢 Важно</div>
    </div>

    <div class="section">ЮГ</div>

    <div class="point">
      <div class="point-name">Товарищеский</div>
      <div class="chat-item" onclick="openChat('Товарищеский / Болталка')">💬 Болталка</div>
      <div class="chat-item" onclick="openChat('Товарищеский / Уборка')">🧹 Уборка</div>
      <div class="chat-item" onclick="openChat('Товарищеский / Важно')">📢 Важно</div>
    </div>

    <div class="section">ОБЩИЕ</div>

    <div class="chat-item" onclick="openChat('Фото витрины')">📸 Фото витрины</div>
    <div class="chat-item" onclick="openChat('Фин отчёт')">💰 Фин отчёт</div>

  </div>

  <!-- ЧАТ -->
  <div class="chat">

    <div class="header">
      <div id="chatTitle">Выберите чат</div>
      <button class="profile-btn">Профиль</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input id="msgInput" placeholder="Сообщение...">
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>

  </div>

</div>

<script>
let currentChat = null;

function openChat(name){
  currentChat = name;
  document.getElementById("chatTitle").innerText = name;
  document.getElementById("messages").innerHTML = "";
}

function sendMsg(){
  const input = document.getElementById("msgInput");
  if(!input.value || !currentChat) return;

  const msg = document.createElement("div");
  msg.className = "msg me";
  msg.innerText = input.value;

  document.getElementById("messages").appendChild(msg);

  input.value = "";

  setTimeout(()=>{
    const reply = document.createElement("div");
    reply.className = "msg other";
    reply.innerText = "Ответ из чата";
    document.getElementById("messages").appendChild(reply);
  },1000);
}
</script>

</body>
</html>
