<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sisters Chat</title>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#020617;
  color:white;
}

/* layout */
.app{
  display:flex;
  height:100vh;
}

/* sidebar */
.sidebar{
  width:300px;
  background:#020617;
  border-right:1px solid #111;
  overflow:auto;
}

.section{
  padding:10px;
  font-size:12px;
  color:#64748b;
}

.chat-item{
  padding:10px;
  cursor:pointer;
}

.chat-item:hover{
  background:#0f172a;
}

/* chat */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header{
  padding:10px;
  border-bottom:1px solid #111;
  display:flex;
  align-items:center;
  gap:10px;
}

.messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  max-width:70%;
  padding:10px;
  border-radius:12px;
  margin:5px 0;
  position:relative;
}

.me{
  background:#7c3aed;
  margin-left:auto;
}

.other{
  background:#1e293b;
}

.meta{
  font-size:10px;
  opacity:.6;
}

/* input */
.input{
  display:flex;
  border-top:1px solid #111;
}

.input input{
  flex:1;
  padding:10px;
  border:none;
  background:#020617;
  color:white;
}

.input button{
  padding:10px;
  background:#7c3aed;
  border:none;
  color:white;
}

/* mobile */
@media(max-width:768px){
  .sidebar{
    width:100%;
  }
  .chat{
    display:none;
  }
}
</style>
</head>

<body>

<div class="app">

<!-- sidebar -->
<div class="sidebar" id="sidebar">

<div class="section">СЕВЕР</div>

<div class="chat-item" onclick="openChat('Науки 18 / Болталка')">Науки 18 💬</div>
<div class="chat-item" onclick="openChat('Науки 18 / Уборка')">Науки 18 🧹</div>
<div class="chat-item" onclick="openChat('Науки 18 / Важно')">Науки 18 📢</div>

<div class="chat-item" onclick="openChat('Культуры 12 / Болталка')">Культуры 12 💬</div>

<div class="section">ЮГ</div>

<div class="chat-item" onclick="openChat('Товарищеский / Болталка')">Товарищеский 💬</div>

<div class="section">ОБЩИЕ</div>

<div class="chat-item" onclick="openChat('Фото витрины')">📸 Фото витрины</div>
<div class="chat-item" onclick="openChat('Фин отчёт')">💰 Фин отчёт</div>

</div>

<!-- chat -->
<div class="chat" id="chat">

<div class="chat-header">
<span onclick="back()" style="cursor:pointer;">←</span>
<span id="title">Выберите чат</span>
</div>

<div class="messages" id="messages"></div>

<div class="input">
<input id="text" placeholder="Сообщение...">
<button onclick="send()">➤</button>
</div>

</div>

</div>

<script>
let current = null;
let user = localStorage.getItem("user") || prompt("Введите имя");
localStorage.setItem("user", user);

function openChat(name){
  current = name;
  document.getElementById("title").innerText = name;
  render();

  if(window.innerWidth < 768){
    sidebar.style.display="none";
    chat.style.display="flex";
  }
}

function back(){
  sidebar.style.display="block";
  chat.style.display="none";
}

function getMessages(){
  return JSON.parse(localStorage.getItem(current) || "[]");
}

function saveMessages(msgs){
  localStorage.setItem(current, JSON.stringify(msgs));
}

function render(){
  let msgs = getMessages();
  let html = "";

  msgs.forEach(m=>{
    html += `
    <div class="msg ${m.user===user?'me':'other'}">
      <div>${m.text}</div>
      <div class="meta">${m.user}</div>
    </div>
    `;
  });

  document.getElementById("messages").innerHTML = html;
}

function send(){
  let input = document.getElementById("text");
  if(!input.value) return;

  let msgs = getMessages();

  msgs.push({
    user:user,
    text:input.value
  });

  saveMessages(msgs);
  input.value="";
  render();
  notify();
}

function notify(){
  if(Notification.permission==="granted"){
    new Notification("Новое сообщение");
  } else {
    Notification.requestPermission();
  }
}

/* автообновление */
setInterval(()=>{
  if(current) render();
},1000);

/* мобильный старт */
if(window.innerWidth < 768){
  document.getElementById("chat").style.display="none";
}
</script>

</body>
</html>
