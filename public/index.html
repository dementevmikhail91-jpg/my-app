<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* SEARCH */
.search {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #1e293b;
  color: white;
  border: none;
  width: calc(100% - 20px);
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.tab {
  background: #1e293b;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
}

.tab.active {
  background: #3b82f6;
}

/* CHAT LIST */
.chat {
  display: flex;
  padding: 12px;
  border-bottom: 1px solid #1e293b;
  cursor: pointer;
}

.chat:hover {
  background: #1e293b;
}

.avatar {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: #3b82f6;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
}

.chat-info {
  flex: 1;
}

.chat-name {
  font-weight: bold;
}

.chat-last {
  font-size: 12px;
  color: #94a3b8;
}

.badge {
  background: #3b82f6;
  border-radius: 20px;
  padding: 4px 8px;
  font-size: 12px;
}

/* BOTTOM MENU */
.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #020617;
  padding: 10px 0;
}

.bottom div {
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">Telegram 🚗</div>

<input class="search" placeholder="Поиск">

<div class="tabs">
  <div class="tab active" onclick="setTab('all')">Все</div>
  <div class="tab" onclick="setTab('tt')">ТТ</div>
  <div class="tab" onclick="setTab('tu')">ТУ</div>
  <div class="tab" onclick="setTab('reports')">Отчёты</div>
</div>

<div id="chatList"></div>

<div class="bottom">
  <div onclick="setTab('all')">💬</div>
  <div onclick="setTab('tt')">⭐</div>
  <div onclick="setTab('tu')">⚠️</div>
  <div onclick="setTab('reports')">📊</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentTab = "all";

window.setTab = function(tab) {
  currentTab = tab;
  loadChats();
}

/* СПИСОК ЧАТОВ */
function loadChats() {
  const chatList = document.getElementById("chatList");
  chatList.innerHTML = "";

  const q = query(collection(db, "chats"), orderBy("time", "desc"));

  onSnapshot(q, (snapshot) => {
    chatList.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      if (currentTab === "tt" && data.type !== "tt") return;
      if (currentTab === "tu" && data.type !== "tu") return;
      if (currentTab === "reports" && data.type !== "report") return;

      chatList.innerHTML += `
        <div class="chat" onclick="openChat('${doc.id}')">
          <div class="avatar">${data.name[0]}</div>
          <div class="chat-info">
            <div class="chat-name">${data.name}</div>
            <div class="chat-last">${data.last || ""}</div>
          </div>
          <div class="badge">${data.count || 0}</div>
        </div>
      `;
    });
  });
}

/* ОТКРЫТИЕ ЧАТА */
window.openChat = function(id) {
  window.location.href = "/chat.html?id=" + id;
}

/* ПЕРВЫЙ ЗАПУСК */
loadChats();

/* СОЗДАНИЕ ЧАТОВ (один раз вставь в консоль) */
window.seed = async function() {
  const chats = [
    {name: "Ворошилова 33к1", type: "tt"},
    {name: "Товарищеский 22к1", type: "tt"},
    {name: "Антонова Овсиенко 25к1", type: "tt"},
    {name: "Науки 18", type: "tt"},
    {name: "Культуры 12", type: "tt"},
    {name: "Ольги Форш 13", type: "tt"},
    {name: "Художников 27к1", type: "tt"},
    {name: "Чат с ТУ Юг", type: "tu"},
    {name: "Чат с ТУ Север", type: "tu"},
    {name: "Фин отчёт", type: "report"}
  ];

  for (let c of chats) {
    await addDoc(collection(db, "chats"), {
      ...c,
      time: Date.now(),
      last: "",
      count: 0
    });
  }

  alert("Чаты созданы");
}
</script>

</body>
</html>
