<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sisters Chat</title>

<style>
:root{
  --bg:#0f172a;
  --sidebar:#020617;
  --chat:#0b1220;
  --brand:#7c3aed;
  --north:#22c55e;
  --south:#f97316;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:white;
}

/* LOGIN */
.login{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:#020617;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  background:var(--brand);
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* APP */
.app{
  display:flex;
  height:100vh;
}

.sidebar{
  width:260px;
  background:var(--sidebar);
  padding:10px;
  overflow:auto;
}

.header-profile{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#333;
  object-fit:cover;
}

.chat{
  flex:1;
  display:flex;
  flex-direction:column;
  background:var(--chat);
}

.messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  max-width:75%;
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}

.me{
  background:var(--brand);
  margin-left:auto;
}

.other{
  background:#1e293b;
}

.name{
  font-size:12px;
  opacity:0.7;
}

.input{
  display:flex;
  padding:10px;
}

.input input{
  flex:1;
}

.section{
  font-size:11px;
  opacity:0.5;
  margin-top:10px;
}

.point-name{
  font-weight:bold;
}

.north{color:var(--north);}
.south{color:var(--south);}

.sub{
  cursor:pointer;
  padding:5px;
  border-radius:6px;
}

.sub:hover{
  background:#1e293b;
}

.profile-edit{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#020617;
  padding:20px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-box">
    <h3>Вход</h3>
    <input id="name" placeholder="Имя">
    <input id="surname" placeholder="Фамилия">
    <input id="avatar" placeholder="Ссылка на фото">
    <button onclick="login()">Войти</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none">

<div class="sidebar">
  <div class="header-profile">
    <img id="avatarImg" class="avatar">
    <div>
      <div id="username"></div>
      <small onclick="openProfile()">Редактировать</small>
    </div>
  </div>

  <div id="sidebar"></div>
</div>

<div class="chat">
  <div id="chatTitle">Выбери чат</div>
  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="input">
    <button onclick="send()">➤</button>
  </div>
</div>

</div>

<!-- PROFILE EDIT -->
<div class="profile-edit" id="profileEdit">
  <h3>Профиль</h3>
  <input id="editName">
  <input id="editSurname">
  <input id="editAvatar">
  <button onclick="saveProfile()">Сохранить</button>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
let chats = {};
let current = null;

/* LOGIN */
function login(){
  user = {
    name: name.value,
    surname: surname.value,
    avatar: avatar.value
  };
  localStorage.setItem("user", JSON.stringify(user));
  init();
}

/* INIT */
function init(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";

  username.innerText = user.name+" "+user.surname;
  avatarImg.src = user.avatar || "";

  renderSidebar();
}

/* PROFILE */
function openProfile(){
  profileEdit.style.display="block";
  editName.value=user.name;
  editSurname.value=user.surname;
  editAvatar.value=user.avatar;
}

function saveProfile(){
  user.name=editName.value;
  user.surname=editSurname.value;
  user.avatar=editAvatar.value;
  localStorage.setItem("user", JSON.stringify(user));
  location.reload();
}

/* SIDEBAR */
function renderSidebar(){
  sidebar.innerHTML=`
    <div class="section">СЕВЕР</div>
    ${["Науки 18","Культуры 12"].map(p=>`
      <div class="point-name north">${p}</div>
      <div class="sub" onclick="openChat('${p}-болталка')">💬 Болталка</div>
      <div class="sub" onclick="openChat('${p}-уборка')">🧹 Уборка</div>
    `).join("")}

    <div class="section">ЮГ</div>
    ${["Товарищеский 22к1"].map(p=>`
      <div class="point-name south">${p}</div>
      <div class="sub" onclick="openChat('${p}-болталка')">💬 Болталка</div>
    `).join("")}
  `;
}

/* CHAT */
function openChat(name){
  current=name;
  if(!chats[name]) chats[name]=[];
  chatTitle.innerText=name;
  render();
}

function send(){
  if(!input.value) return;

  chats[current].push({
    text:input.value,
    user:user
  });

  input.value="";
  render();
}

function render(){
  messages.innerHTML="";

  chats[current]?.forEach(m=>{
    const d=document.createElement("div");
    d.className="msg "+(m.user.name===user.name?"me":"other");

    d.innerHTML=`
      <div class="name">${m.user.name}</div>
      ${m.text}
    `;

    messages.appendChild(d);
  });

  messages.scrollTop=9999;
}

/* AUTO LOGIN */
if(user){
  init();
}
</script>

</body>
</html>
