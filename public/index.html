<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sisters Chat</title>

<style>
:root {
  --primary: #6C2BD9;
  --bg: #0f0f14;
  --panel: #1a1a22;
  --text: #fff;
  --sub: #aaa;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 250px;
  background: var(--panel);
  padding: 10px;
  overflow-y: auto;
}

.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.room {
  padding: 10px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.room:hover {
  background: #222;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.message {
  margin-bottom: 10px;
}

.input {
  display: flex;
  padding: 10px;
  background: #111;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  background: var(--primary);
  border: none;
  color: white;
  padding: 10px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar" id="rooms">
  <h3>Точки</h3>
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="msg" placeholder="Сообщение..." />
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let currentRoom = "";
let username = prompt("Ваше имя") || "Сотрудник";

// список точек
const rooms = [
  "ТТ - Центр",
  "ТТ - Мега",
  "ТТ - Аэропорт",
  "Управляющие",
  "Общий чат"
];

const roomsDiv = document.getElementById("rooms");
const messagesDiv = document.getElementById("messages");

rooms.forEach(room => {
  const div = document.createElement("div");
  div.className = "room";
  div.innerText = room;

  div.onclick = () => joinRoom(room);

  roomsDiv.appendChild(div);
});

function joinRoom(room) {
  messagesDiv.innerHTML = "";
  currentRoom = room;

  socket.emit("joinRoom", {
    room,
    user: username
  });
}

function sendMessage() {
  const input = document.getElementById("msg");
  if (!input.value) return;

  socket.emit("chatMessage", input.value);
  input.value = "";
}

socket.on("message", (msg) => {
  const div = document.createElement("div");
  div.className = "message";
  div.innerHTML = `<b>${msg.user}:</b> ${msg.text}`;
  messagesDiv.appendChild(div);

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});
</script>

</body>
</html>
