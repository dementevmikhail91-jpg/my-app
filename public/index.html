<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sisters Chat</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* layout */
.app {
  display:flex;
  height:100vh;
}

/* sidebar */
.sidebar {
  width:260px;
  background:#020617;
  overflow-y:auto;
  padding:10px;
}

.section-title {
  font-size:12px;
  opacity:0.6;
  margin:10px 0 5px;
}

.point {
  margin-bottom:10px;
}

.point-name {
  font-weight:bold;
  margin-bottom:5px;
}

/* sub chats */
.subchat {
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.subchat:hover {
  background:#1e293b;
}

.active {
  background:#2563eb;
}

/* chat area */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* header */
.chat-header {
  padding:10px;
  border-bottom:1px solid #1e293b;
  font-weight:bold;
}

/* messages */
.messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* bubbles */
.msg {
  max-width:70%;
  padding:10px;
  border-radius:12px;
  margin-bottom:8px;
}

.me {
  background:#2563eb;
  margin-left:auto;
}

.other {
  background:#1e293b;
}

/* input */
.input {
  display:flex;
  padding:10px;
  border-top:1px solid #1e293b;
}

.input input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
}

.input button {
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
}

/* mobile */
@media(max-width:768px){
  .sidebar{
    width:90px;
    font-size:10px;
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar"></div>

  <!-- CHAT -->
  <div class="chat">
    <div class="chat-header" id="chatTitle">Выбери чат</div>
    <div class="messages" id="messages"></div>

    <div class="input">
      <input id="input" placeholder="Сообщение...">
      <button onclick="send()">➤</button>
    </div>
  </div>

</div>

<script>
const chats = {};

// структура точек
const points = {
  "СЕВЕР": [
    "Науки 18",
    "Культуры 12",
    "Художников 27",
    "Ольги Форш 14"
  ],
  "ЮГ": [
    "Товарищеский 22к1",
    "Ворошилова 33к1",
    "Антонова Овсиенко 25к1"
  ]
};

const subChats = ["💬 Болталка","🧹 Уборка","📢 Важное"];

let currentChat = null;

// рендер меню
function renderSidebar(){
  const el = document.getElementById("sidebar");
  el.innerHTML = "";

  for(let region in points){
    el.innerHTML += `<div class="section-title">${region}</div>`;

    points[region].forEach(point=>{
      el.innerHTML += `<div class="point">
        <div class="point-name">${point}</div>
        ${subChats.map(sub=>`
          <div class="subchat" onclick="openChat('${point}-${sub}')">
            ${sub}
          </div>
        `).join("")}
      </div>`;
    });
  }

  // общие
  el.innerHTML += `
    <div class="section-title">ОБЩИЕ</div>
    <div class="subchat" onclick="openChat('Фото')">📸 Фото витрины</div>
    <div class="subchat" onclick="openChat('Фин')">💰 Фин отчёт</div>
  `;
}

// открыть чат
function openChat(name){
  currentChat = name;

  if(!chats[name]) chats[name] = [];

  document.getElementById("chatTitle").innerText = name;

  renderMessages();
}

// вывод сообщений
function renderMessages(){
  const box = document.getElementById("messages");
  box.innerHTML = "";

  chats[currentChat].forEach(m=>{
    const div = document.createElement("div");
    div.className = "msg " + (m.me ? "me":"other");
    div.innerText = m.text;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

// отправка
function send(){
  const input = document.getElementById("input");
  const text = input.value;

  if(!text || !currentChat) return;

  chats[currentChat].push({
    text,
    me:true
  });

  input.value = "";
  renderMessages();

  // фейк ответ
  setTimeout(()=>{
    chats[currentChat].push({
      text:"Ответ 👍",
      me:false
    });
    renderMessages();

    notify("Новое сообщение в " + currentChat);
  },1000);
}

// уведомление
function notify(text){
  if(Notification.permission === "granted"){
    new Notification(text);
  }
}

// запрос разрешения
if("Notification" in window){
  Notification.requestPermission();
}

// старт
renderSidebar();
</script>

</body>
</html>
