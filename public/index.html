<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0b1120;
  --card:#1e293b;
  --accent:#8b5cf6;
  --accent2:#a855f7;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

body{
  margin:0;
  background: radial-gradient(circle at 80% 80%, #312e81, #020617);
  color:var(--text);
  font-family: system-ui;
}

.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
  width:80px;
  background:#020617;
  overflow-y:auto;
}

.tt{
  text-align:center;
  margin:12px 0;
}

.tt-circle{
  width:50px;height:50px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
  cursor:pointer;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}

/* HEADER */
.header{
  height:60px;
  background:#1e293b;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

/* PIN */
.pin{
  background:rgba(139,92,246,0.2);
  padding:10px;
  font-size:14px;
}

/* CHAT LIST */
.chat-list{flex:1;overflow:auto}

.chat{
  padding:15px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.badge{
  background:var(--accent);
  border-radius:20px;
  padding:3px 10px;
}

/* CHAT WINDOW */
.chat-window{
  flex:1;
  overflow:auto;
  padding:10px;
  display:none;
}

.msg{margin:10px 0}

.bubble{
  background:var(--card);
  padding:10px;
  border-radius:12px;
}

.reply{
  font-size:12px;
  color:var(--muted);
}

.meta{
  font-size:10px;
  color:var(--muted);
}

/* REACTIONS */
.reactions span{
  margin-right:5px;
  cursor:pointer;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#020617;
}

.input input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#1e293b;
  color:white;
}

.send{
  width:45px;
  margin-left:10px;
  border:none;
  border-radius:50%;
  background:var(--accent);
  color:white;
}

/* PROFILE */
.profile{
  display:none;
  padding:15px;
}

.avatar{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}

/* MEMBERS */
.members{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="ttList"></div>

<div class="main">

<div class="header">
  <div id="title">Чаты</div>
  <div onclick="openProfile()">👤</div>
</div>

<div class="pin" id="pin" style="display:none"></div>

<div class="chat-list" id="chatList"></div>

<div class="chat-window" id="chatWindow"></div>

<div class="profile" id="profile"></div>

<div class="input">
  <input id="msgInput" placeholder="Сообщение...">
  <button class="send" onclick="send()">➤</button>
</div>

</div>
</div>

<script>

const chatsTemplate=[
"Списание","Болталка","Колобокс","График работы",
"Важная информация","Показания счётчиков",
"Инвентаризация","Кассовые операции"
];

const users=["Катя","Олег","Ася","Маша"];

function createTT(){
  let obj={};
  chatsTemplate.forEach(c=>{
    obj[c]={messages:[],pin:null};
  });
  return obj;
}

const data={
  "Науки 18":createTT(),
  "Культуры 12":createTT(),
  "Художников 27":createTT(),
  "Ольги Форш 14":createTT(),
  "Товарищеский 22":createTT(),
  "Ворошилова 33":createTT(),
  "Антонова-Овсеенко 25":createTT()
};

let currentTT=null;
let currentChat=null;
let replyTo=null;

/* SIDEBAR */
function renderTT(){
  ttList.innerHTML="";
  Object.keys(data).forEach(tt=>{
    let d=document.createElement("div");
    d.className="tt";
    d.innerHTML=`<div class="tt-circle">${tt[0]}</div>`;
    d.onclick=()=>openTT(tt);
    ttList.appendChild(d);
  });
}

/* OPEN TT */
function openTT(tt){
  currentTT=tt;
  title.innerText=tt;
  renderChats();
}

/* CHAT LIST */
function renderChats(){
  chatList.style.display="block";
  chatWindow.style.display="none";
  profile.style.display="none";
  pin.style.display="none";

  chatList.innerHTML="";

  Object.keys(data[currentTT]).forEach(c=>{
    let unread=data[currentTT][c].messages.filter(m=>!m.read).length;

    let d=document.createElement("div");
    d.className="chat";
    d.innerHTML=`${c}<span class="badge">${unread}</span>`;
    d.onclick=()=>openChat(c);
    chatList.appendChild(d);
  });
}

/* OPEN CHAT */
function openChat(c){
  currentChat=c;
  title.innerText=currentTT+" / "+c;

  chatList.style.display="none";
  chatWindow.style.display="block";

  data[currentTT][c].messages.forEach(m=>m.read=true);

  renderMessages();
}

/* RENDER MSG */
function renderMessages(){
  chatWindow.innerHTML="";

  let chat=data[currentTT][currentChat];

  if(chat.pin){
    pin.style.display="block";
    pin.innerText="📌 "+chat.pin.text;
  }

  chat.messages.forEach((m,i)=>{
    let d=document.createElement("div");
    d.className="msg";

    d.innerHTML=`
      <div class="reply">${m.reply||""}</div>
      <div class="bubble">${m.text}</div>
      <div class="meta">${m.user} • ${m.time}</div>
      <div class="reactions">
        👍 ${m.like||0}
        ❤️ ${m.heart||0}
        🔥 ${m.fire||0}
      </div>
    `;

    d.onclick=()=>replyToMsg(m.text);

    chatWindow.appendChild(d);
  });

  chatWindow.scrollTop=chatWindow.scrollHeight;
}

/* SEND */
function send(){
  if(!currentChat)return;

  let text=msgInput.value.trim();
  if(!text)return;

  let msg={
    user:"Вы",
    text,
    time:new Date().toLocaleTimeString().slice(0,5),
    read:false,
    reply:replyTo
  };

  data[currentTT][currentChat].messages.push(msg);

  msgInput.value="";
  replyTo=null;

  renderMessages();
}

/* REPLY */
function replyToMsg(text){
  replyTo="Ответ на: "+text;
}

/* PROFILE */
function openProfile(){
  chatList.style.display="none";
  chatWindow.style.display="none";
  profile.style.display="block";

  profile.innerHTML=`
    <div class="avatar"></div>
    <h2>${currentTT}</h2>
    <p>Телефон: +7 999</p>
    <p>Описание: кофейня</p>

    <div class="members">
      👥 Участники:<br>
      ${users.join("<br>")}
    </div>
  `;
}

renderTT();

</script>

</body>
</html>
