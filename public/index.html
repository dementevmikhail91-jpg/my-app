<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram UI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.header {
  padding:16px;
  font-size:22px;
  font-weight:600;
}

.search {
  margin:10px;
  padding:12px;
  border-radius:20px;
  background:#1e293b;
  border:none;
  width:calc(100% - 20px);
  color:white;
}

.tabs {
  display:flex;
  gap:10px;
  padding:10px;
}

.tab {
  padding:10px 14px;
  border-radius:20px;
  background:#1e293b;
  cursor:pointer;
}

.tab.active {
  background:#3b82f6;
}

.chat {
  display:flex;
  align-items:center;
  padding:14px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
}

.avatar {
  width:45px;
  height:45px;
  border-radius:50%;
  background:#334155;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:10px;
}

.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#0f172a;
  padding:10px 0;
}

.screen {
  display:none;
}

.screen.active {
  display:block;
}

.back {
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔹 ЭКРАН 1 — СПИСОК ТТ -->
<div id="home" class="screen active">

<div class="header">Telegram 🚗</div>

<input class="search" placeholder="Поиск">

<div class="tabs">
  <div class="tab active">Все</div>
  <div class="tab">ТТ</div>
  <div class="tab">Группы</div>
  <div class="tab">📊</div>
</div>

<div id="ttList"></div>

</div>


<!-- 🔹 ЭКРАН 2 — ВНУТРИ ТТ -->
<div id="ttScreen" class="screen">

<div class="back" onclick="goBack()">← Назад</div>

<div class="header" id="ttTitle"></div>

<div id="groupsList"></div>

</div>


<!-- 🔹 ЭКРАН 3 — ЧАТ -->
<div id="chatScreen" class="screen">

<div class="back" onclick="backToTT()">← Назад</div>

<div class="header" id="chatTitle"></div>

<div style="padding:10px">Сообщения...</div>

<input class="search" placeholder="Сообщение">

</div>


<!-- 🔻 НИЖНЕЕ МЕНЮ -->
<div class="bottom">
  <div>💬</div>
  <div>⭐</div>
  <div>⚠️</div>
  <div>📊</div>
</div>


<script>

// 🔥 ВСЕ 7 ТТ + ВНУТРЕННИЕ ЧАТЫ
const data = {
  "Ворошилова 33к1": [
    "Основной чат",
    "Кухня",
    "Отчёты",
    "Склад"
  ],
  "Товарищеский 22к1": [
    "Основной чат",
    "Кухня",
    "Отчёты"
  ],
  "Антонова Овсиенко 25к1": [
    "Основной чат",
    "Персонал",
    "Отчёты"
  ],
  "Науки 18": [
    "Основной чат",
    "Кухня"
  ],
  "Культуры 12": [
    "Основной чат",
    "Отчёты"
  ],
  "Ольги Форш 13": [
    "Основной чат",
    "Склад"
  ],
  "Художников 27к1": [
    "Основной чат",
    "Кухня",
    "Отчёты"
  ]
};

let currentTT = "";

// 🔹 РЕНДЕР ТТ
function renderTT() {
  const list = document.getElementById("ttList");
  list.innerHTML = "";

  Object.keys(data).forEach(tt => {
    list.innerHTML += `
      <div class="chat" onclick="openTT('${tt}')">
        <div class="avatar">🏪</div>
        <div>${tt}</div>
      </div>
    `;
  });
}

// 🔹 ОТКРЫТЬ ТТ
function openTT(tt) {
  currentTT = tt;

  document.getElementById("home").classList.remove("active");
  document.getElementById("ttScreen").classList.add("active");

  document.getElementById("ttTitle").innerText = tt;

  const list = document.getElementById("groupsList");
  list.innerHTML = "";

  data[tt].forEach(group => {
    list.innerHTML += `
      <div class="chat" onclick="openChat('${group}')">
        <div class="avatar">👥</div>
        <div>${group}</div>
      </div>
    `;
  });
}

// 🔹 ОТКРЫТЬ ЧАТ
function openChat(name) {
  document.getElementById("ttScreen").classList.remove("active");
  document.getElementById("chatScreen").classList.add("active");

  document.getElementById("chatTitle").innerText = currentTT + " / " + name;
}

// 🔹 НАЗАД
function goBack() {
  document.getElementById("ttScreen").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

function backToTT() {
  document.getElementById("chatScreen").classList.remove("active");
  document.getElementById("ttScreen").classList.add("active");
}


// INIT
renderTT();

</script>

</body>
</html>
