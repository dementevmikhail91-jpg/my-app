<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0f172a;
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:90px;
  height:100%;
  background:#0b1220;
  overflow:auto;
}

.tt{
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.tt.active{
  background:#1e293b;
}

.circle{
  width:50px;height:50px;
  border-radius:50%;
  background:linear-gradient(135deg,#7b4bff,#9c6bff);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:bold;
}

/* MAIN */
.main{
  margin-left:90px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#1e293b;
}

/* CHAT LIST */
.chat-list{
  width:250px;
  background:#020617;
  overflow:auto;
}

.chat-item{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;
}

.chat-item.active{
  background:#1e293b;
}

.badge{
  background:#7b4bff;
  padding:3px 7px;
  border-radius:10px;
  font-size:12px;
  float:right;
}

/* CONTENT */
.content{
  flex:1;
  display:flex;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* MESSAGES */
.messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

/* MESSAGE */
.msg{
  margin-bottom:10px;
}

.msg-name{
  font-size:12px;
  color:#aaa;
}

.msg-bubble{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  display:inline-block;
  max-width:70%;
}

.msg-time{
  font-size:10px;
  color:#888;
  margin-left:5px;
}

/* REACTIONS */
.reactions{
  font-size:12px;
  margin-top:3px;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#020617;
}

.input input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
}

.send{
  margin-left:10px;
  padding:10px;
  border-radius:50%;
  border:none;
  background:#7b4bff;
  color:white;
}

/* BOTTOM */
.bottom{
  position:fixed;
  bottom:0;
  left:90px;
  right:0;
  height:65px;
  background:#020617;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.main{
  padding-bottom:65px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="ttList"></div>

<div class="main">

<div class="header">
  <div>← Назад</div>
  <div id="chatTitle">Чат</div>
  <div>Профиль</div>
</div>

<div class="content">

  <div class="chat-list" id="chatList"></div>

  <div class="chat">
    <div class="messages" id="messages"></div>

    <div class="input">
      <input id="msgInput" placeholder="Сообщение...">
      <button class="send" onclick="sendMsg()">➤</button>
    </div>
  </div>

</div>

</div>

<div class="bottom">
  <div>💬<br>Чаты</div>
  <div>💰<br>Фин</div>
  <div>⚠️<br>Важно</div>
  <div>🚚<br>Перемещение</div>
</div>

<script>

const data = {
  "Науки 18":{
    "Болталка":[
      {name:"Олег",text:"Привет",time:"22:10",reactions:"👍 2"},
      {name:"Ася",text:"Ок",time:"22:11"}
    ],
    "Списание":[
      {name:"Катя",text:"Списание сделала",time:"21:00"}
    ]
  },
  "Культуры 12":{
    "Болталка":[
      {name:"Ира",text:"Доброе утро",time:"10:00"}
    ]
  }
};

let currentTT = null;
let currentChat = null;

/* LOAD TT */
const ttList = document.getElementById("ttList");
Object.keys(data).forEach(tt=>{
  let el = document.createElement("div");
  el.className="tt";
  el.innerHTML = `<div class="circle">${tt[0]}</div>${tt}`;
  el.onclick=()=>{
    currentTT=tt;
    renderChats();
  };
  ttList.appendChild(el);
});

/* CHATS */
function renderChats(){
  const list = document.getElementById("chatList");
  list.innerHTML="";
  
  Object.keys(data[currentTT]).forEach(chat=>{
    let el=document.createElement("div");
    el.className="chat-item";
    el.innerHTML = `${chat} <span class="badge">2</span>`;
    
    el.onclick=()=>{
      currentChat=chat;
      renderMessages();
      document.getElementById("chatTitle").innerText = currentTT + " / " + chat;
    };
    
    list.appendChild(el);
  });
}

/* MESSAGES */
function renderMessages(){
  const box=document.getElementById("messages");
  box.innerHTML="";
  
  data[currentTT][currentChat].forEach(m=>{
    let el=document.createElement("div");
    el.className="msg";
    
    el.innerHTML=`
      <div class="msg-name">${m.name}</div>
      <div class="msg-bubble">${m.text} <span class="msg-time">${m.time}</span></div>
      <div class="reactions">${m.reactions || ""}</div>
    `;
    
    box.appendChild(el);
  });
}

/* SEND */
function sendMsg(){
  let text = document.getElementById("msgInput").value;
  if(!text) return;
  
  data[currentTT][currentChat].push({
    name:"Вы",
    text:text,
    time:"сейчас"
  });
  
  document.getElementById("msgInput").value="";
  renderMessages();
}

</script>

</body>
</html>
