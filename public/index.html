<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1026;
color:#fff;
}

/* ЭКРАНЫ */
.screen{
display:none;
height:100vh;
flex-direction:column;
}

.active{
display:flex;
}

/* HEADER */
.header{
height:60px;
background:#1c2a4a;
display:flex;
align-items:center;
padding:0 15px;
gap:10px;
}

.back{
cursor:pointer;
}

/* СПИСОК */
.list{
flex:1;
overflow-y:auto;
}

.item{
padding:16px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.item:active{
background:#222;
}

/* ЧАТ */
.messages{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
background:#2a356b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

/* ВВОД */
.input{
display:flex;
padding:10px;
background:#1c2a4a;
}

.input input{
flex:1;
padding:12px;
border:none;
border-radius:20px;
}

.send{
margin-left:10px;
background:#9d5cff;
border:none;
padding:12px;
border-radius:20px;
color:#fff;
}

/* НИЖНЕЕ МЕНЮ */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:65px;
background:#0f1a3a;
display:flex;
justify-content:space-around;
align-items:center;
}

.tab{
opacity:0.5;
cursor:pointer;
}

.tab.active{
opacity:1;
color:#9d5cff;
}
</style>
</head>

<body>

<!-- СПИСОК -->
<div id="home" class="screen active">
<div class="header">Чаты</div>
<div class="list" id="mainList"></div>
</div>

<!-- ЧАТ -->
<div id="chat" class="screen">
<div class="header">
<span class="back" onclick="back()">←</span>
<span id="chatTitle"></span>
</div>

<div class="messages" id="msgs"></div>

<div class="input">
<input id="input" placeholder="Сообщение...">
<button class="send" onclick="send()">➤</button>
</div>
</div>

<!-- НИЖНЕЕ МЕНЮ -->
<div class="bottom">
<div class="tab active" onclick="loadMain()">💬</div>
<div class="tab" onclick="loadTU()">⭐</div>
<div class="tab" onclick="loadTT()">⚠️</div>
<div class="tab">📊</div>
</div>
