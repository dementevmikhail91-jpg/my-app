<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Сёстры — Чат</title>

<!-- Шрифты -->
<link href="https://fonts.googleapis.com/css2?family=Calibri&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: Calibri;
  background:#2B2B2B;
  color:white;
}

/* ЛЕВАЯ ПАНЕЛЬ */
.sidebar {
  width:280px;
  background:#662681;
  height:100vh;
  overflow:auto;
  position:fixed;
  transition:0.3s;
}

.sidebar.small {
  width:80px;
}

.chat-item {
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  cursor:pointer;
}

.chat-item:hover {
  background:#FFCE00;
  color:#2B2B2B;
}

/* ПРАВАЯ ЧАСТЬ */
.main {
  margin-left:280px;
  transition:0.3s;
}

.main.full {
  margin-left:80px;
}

.header {
  background:#FFCE00;
  color:#2B2B2B;
  padding:15px;
  font-weight:bold;
}

.messages {
  height:70vh;
  overflow:auto;
  padding:10px;
}

.msg {
  background:#444;
  padding:10px;
  border-radius:10px;
  margin:5px 0;
}

/* ВВОД */
.input-area {
  display:flex;
  padding:10px;
  background:#2B2B2B;
}

input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button {
  margin-left:10px;
  background:#FFCE00;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* РЕГИСТРАЦИЯ */
#auth {
  position:fixed;
  width:100%;
  height:100%;
  background:#2B2B2B;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#auth input {
  margin:5px;
  width:200px;
}
</style>
</head>

<body>

<div id="auth">
  <h2>Регистрация</h2>
  <input id="name" placeholder="Имя">
  <input id="surname" placeholder="Фамилия">
  <input id="phone" placeholder="Телефон">

  <select id="tt">
    <option>Науки 18</option>
    <option>Культуры 12</option>
    <option>Антонова Овсиенко</option>
  </select>

  <button onclick="register()">Войти</button>

  <hr>

  <button onclick="loginAdmin('north')">Север</button>
  <button onclick="loginAdmin('south')">Юг</button>
</div>

<div class="sidebar" id="sidebar"></div>

<div class="main" id="main">
  <div class="header" id="header">Чат</div>
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="text">
    <input type="file" id="file">
    <button onclick="send()">➤</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let user = null;
let currentChat = "main";

/* РЕГИСТРАЦИЯ */
window.register = () => {
  user = {
    name: name.value,
    tt: tt.value
  };
  auth.style.display = "none";
  loadChats();
};

/* АДМИНЫ */
window.loginAdmin = (type) => {
  if(type === "north"){
    user = {name:"Михаил Север", role:"admin"};
  } else {
    user = {name:"Михаил Юг", role:"admin"};
  }
  auth.style.display = "none";
  loadChats();
};

/* ЧАТЫ */
function loadChats(){
  const chats = [
    "Науки 18",
    "Культуры 12",
    "Антонова Овсиенко"
  ];

  sidebar.innerHTML = "";

  chats.forEach(c=>{
    const div = document.createElement("div");
    div.className="chat-item";
    div.innerText=c;
    div.onclick=()=>openChat(c);
    sidebar.appendChild(div);
  });
}

/* ОТКРЫТЬ ЧАТ */
function openChat(name){
  currentChat = name;
  header.innerText = name;
  messages.innerHTML="";

  onSnapshot(collection(db,"chats",name,"messages"), snap=>{
    messages.innerHTML="";
    snap.forEach(doc=>{
      const m = doc.data();
      const div = document.createElement("div");
      div.className="msg";
      div.innerText = m.user + ": " + m.text;
      messages.appendChild(div);
    });
  });
}

/* ОТПРАВКА */
window.send = async () => {
  const txt = text.value;

  await addDoc(collection(db,"chats",currentChat,"messages"),{
    user:user.name,
    text:txt,
    time:Date.now()
  });

  text.value="";
};

</script>

</body>
</html>
