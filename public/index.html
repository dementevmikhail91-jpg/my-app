<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakery Chat</title>

<!-- Firebase (CDN версия — работает без сборщиков) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: #0f172a;
  color: white;
}

.header {
  padding: 16px;
  background: #111827;
  font-size: 20px;
  font-weight: 700;
}

.chat-item {
  display: flex;
  align-items: center;
  padding: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.avatar {
  width: 42px;
  height: 42px;
  background: #2563eb;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
}

.chat {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  padding-bottom: 120px;
}

.message {
  background: #1f2937;
  padding: 10px;
  border-radius: 12px;
  margin: 6px 0;
  max-width: 75%;
}

.me {
  background: #2563eb;
  margin-left: auto;
}

.input-area {
  position: fixed;
  bottom: 60px;
  width: 100%;
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

.send-btn {
  margin-left: 8px;
  padding: 0 16px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 10px;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #111827;
}

.nav button {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: white;
}
</style>
</head>

<body>

<div id="app"></div>

<div class="nav">
  <button onclick="home()">💬 Чаты</button>
  <button onclick="profile()">👤 Профиль</button>
</div>

<script>

/* 🔥 ТВОЙ FIREBASE УЖЕ ВСТАВЛЕН */
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7",
  measurementId: "G-TRM9TP4XSL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔐 АНОНИМНЫЙ ЛОГИН */
firebase.auth().signInAnonymously();

/* ТТ */
const points = [
"Антонова Овсиенко",
"Культуры 12",
"Науки 18",
"Ольги Форш 13",
"Художников 27к1",
"Товарищеский 22к1",
"Ворошилова 33к1"
];

const app = document.getElementById('app');

/* HOME */
function home() {
  let html = `<div class="header">Чаты</div>`;
  points.forEach(p => {
    html += `
      <div class="chat-item" onclick="openPoint('${p}')">
        <div class="avatar">${p[0]}</div>
        <div>${p}</div>
      </div>
    `;
  });
  app.innerHTML = html;
}

/* POINT */
function openPoint(point) {
  let chats = ["Основной чат","Поставки","Смена","Финансы"];
  let html = `<div class="header">← ${point}</div>`;
  chats.forEach(c => {
    html += `
      <div class="chat-item" onclick="openChat('${point}','${c}')">
        <div class="avatar">💬</div>
        <div>${c}</div>
      </div>
    `;
  });
  app.innerHTML = html;
}

/* CHAT */
let unsubscribe = null;

function openChat(point, chat) {
  if (unsubscribe) unsubscribe();

  const key = point + "_" + chat;

  app.innerHTML = `
    <div class="chat">
      <div class="header" onclick="openPoint('${point}')">← ${chat}</div>
      <div class="messages" id="msgs"></div>
      <div class="input-area">
        <input id="msgInput" placeholder="Сообщение">
        <button class="send-btn" onclick="send('${key}')">➤</button>
      </div>
    </div>
  `;

  const container = document.getElementById("msgs");

  unsubscribe = db.collection("messages")
    .where("chat", "==", key)
    .orderBy("time")
    .onSnapshot(snapshot => {
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const m = doc.data();
        container.innerHTML += `
          <div class="message ${m.uid === firebase.auth().currentUser.uid ? 'me' : ''}">
            ${m.text}
          </div>
        `;
      });

      container.scrollTop = container.scrollHeight;
    });
}

/* SEND */
function send(chat) {
  const input = document.getElementById("msgInput");
  if (!input.value.trim()) return;

  db.collection("messages").add({
    chat: chat,
    text: input.value,
    uid: firebase.auth().currentUser.uid,
    time: Date.now()
  });

  input.value = "";
}

/* PROFILE */
function profile() {
  app.innerHTML = `
    <div class="header">Профиль</div>
    <div class="chat-item">ID: ${firebase.auth().currentUser?.uid || "..."}</div>
  `;
}

/* START */
home();

</script>

</body>
</html>
