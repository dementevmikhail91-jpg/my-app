<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1026;
color:#fff;
}

/* ЭКРАНЫ */
.screen{
display:none;
height:100vh;
flex-direction:column;
}
.active{display:flex;}

/* HEADER */
.header{
height:60px;
background:#1c2a4a;
display:flex;
align-items:center;
padding:0 15px;
font-size:18px;
}

/* LIST */
.list{
flex:1;
overflow-y:auto;
}

.item{
padding:18px;
border-bottom:1px solid rgba(255,255,255,0.05);
font-size:16px;
}

/* CHAT */
.messages{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
background:#2a356b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

/* INPUT */
.input{
display:flex;
padding:10px;
background:#1c2a4a;
}

.input input{
flex:1;
padding:14px;
border:none;
border-radius:20px;
font-size:16px;
}

.send{
margin-left:10px;
background:#9d5cff;
border:none;
padding:14px;
border-radius:20px;
color:#fff;
}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#0f1a3a;
display:flex;
justify-content:space-around;
align-items:center;
font-size:22px;
}

.tab{opacity:0.5;}
.tab.active{opacity:1;color:#9d5cff;}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
<div class="header">Чаты</div>
<div class="list" id="mainList"></div>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
<div class="header" id="chatTitle">Чат</div>

<div class="messages" id="msgs"></div>

<div class="input">
<input id="input" placeholder="Сообщение...">
<button class="send" id="sendBtn">➤</button>
</div>
</div>

<!-- MENU -->
<div class="bottom">
<div class="tab active" id="tabMain">💬</div>
<div class="tab" id="tabTU">⭐</div>
<div class="tab" id="tabTT">⚠️</div>
<div class="tab">📊</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const chats=["Болталка","Важно","Новинки","Заметки"];

const TT=[
"Ворошилова 33к1",
"Товарищеский 22к1",
"Антонова Овсиенко 25к1",
"Науки 18",
"Культуры 12",
"Ольги Форш 13",
"Художников 27к1"
];

const mainList=document.getElementById("mainList");
const home=document.getElementById("home");
const chat=document.getElementById("chat");
const chatTitle=document.getElementById("chatTitle");
const msgs=document.getElementById("msgs");
const input=document.getElementById("input");

/* SCREEN */
function showHome(){
home.classList.add("active");
chat.classList.remove("active");
}

function showChat(){
chat.classList.add("active");
home.classList.remove("active");
}

/* LOAD */
function loadMain(){
mainList.innerHTML=`
<div class="item">Сёстры Питер</div>
`;
}

function loadTU(){
mainList.innerHTML=`
<div class="item">ТУ Север</div>
<div class="item">ТУ Юг</div>
`;
}

function loadTT(){
let html="";
TT.forEach(t=>{
html+=`<div class="item">${t}</div>`;
});
mainList.innerHTML=html;
}

/* CLICK LIST */
mainList.addEventListener("click", function(e){
if(!e.target.classList.contains("item")) return;

let name=e.target.innerText;

if(name==="ТУ Север" || name==="ТУ Юг" || TT.includes(name)){
let html="";
chats.forEach(c=>{
html+=`<div class="item">${name} / ${c}</div>`;
});
mainList.innerHTML=html;
return;
}

openChat(name);
});

/* CHAT */
function openChat(name){
chatTitle.innerText=name;
msgs.innerHTML="";
showChat();
}

/* SEND */
document.getElementById("sendBtn").onclick=function(){
if(!input.value) return;
msgs.innerHTML+=`<div class="msg">${input.value}</div>`;
input.value="";
};

/* TABS */
document.getElementById("tabMain").onclick=function(){
loadMain();showHome();
};
document.getElementById("tabTU").onclick=function(){
loadTU();showHome();
};
document.getElementById("tabTT").onclick=function(){
loadTT();showHome();
};

/* INIT */
loadMain();

});
</script>

</body>
</html>
