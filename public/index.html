<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakery Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* SEARCH */
.search {
  margin: 10px;
  padding: 10px;
  border-radius: 20px;
  border: none;
  width: calc(100% - 40px);
  background: #1e293b;
  color: white;
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto;
}

.tab {
  padding: 6px 12px;
  background: #1e293b;
  border-radius: 15px;
  cursor: pointer;
  white-space: nowrap;
}

.tab.active {
  background: #3b82f6;
}

/* CHAT LIST */
#chatList {
  padding-bottom: 80px;
}

.chat {
  padding: 15px;
  border-bottom: 1px solid #1e293b;
  cursor: pointer;
}

.chat-title {
  font-weight: bold;
}

.chat-last {
  color: #9ca3af;
  font-size: 14px;
}

/* INPUT */
.input {
  position: fixed;
  bottom: 60px;
  width: 100%;
  display: flex;
  padding: 10px;
  background: #0f172a;
}

.input input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.input button {
  margin-left: 10px;
  border: none;
  border-radius: 50%;
  width: 45px;
  background: #7c3aed;
  color: white;
}

/* BOTTOM MENU */
.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1e293b;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.bottom div {
  text-align: center;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">Telegram 🚗</div>

<input class="search" placeholder="Поиск">

<div class="tabs">
  <div class="tab active" onclick="setTab('all')">Все</div>
  <div class="tab" onclick="setTab('tt')">ТТ</div>
  <div class="tab" onclick="setTab('important')">⚠ Важно</div>
  <div class="tab" onclick="setTab('report')">📊 Отчёты</div>
</div>

<div id="chatList"></div>

<div class="input">
  <input id="messageInput" placeholder="Сообщение...">
  <button onclick="sendMessage()">➤</button>
</div>

<div class="bottom">
  <div>💬<br>Чаты</div>
  <div>⭐<br>Избранное</div>
  <div>⚠<br>Важно</div>
  <div>📊<br>Отчёты</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentTab = "all";

/* ТВОИ ЧАТЫ */
const chats = [
  {id:"1", name:"Ворошилова 33к1", type:"tt"},
  {id:"2", name:"Товарищеский 22к1", type:"tt"},
  {id:"3", name:"Антонова Овсиенко 25к1", type:"tt"},
  {id:"4", name:"Науки 18", type:"tt"},
  {id:"5", name:"Культуры 12", type:"tt"},
  {id:"6", name:"Ольги Форш 13", type:"tt"},
  {id:"7", name:"Художников 27к1", type:"tt"},
  {id:"8", name:"⚠ Важно", type:"important"},
  {id:"9", name:"📊 Фин отчёт", type:"report"}
];

/* РЕНДЕР ЧАТОВ */
function renderChats() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats
    .filter(c => currentTab === "all" || c.type === currentTab)
    .forEach(chat => {
      const div = document.createElement("div");
      div.className = "chat";
      div.innerHTML = `
        <div class="chat-title">${chat.name}</div>
        <div class="chat-last">Последнее сообщение...</div>
      `;
      list.appendChild(div);
    });
}

/* СМЕНА ВКЛАДКИ */
window.setTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  renderChats();
};

/* ОТПРАВКА */
window.sendMessage = async () => {
  const input = document.getElementById("messageInput");
  if (!input.value) return;

  await addDoc(collection(db, "messages"), {
    text: input.value,
    time: Date.now()
  });

  input.value = "";
};

/* СЛУШАЕМ БАЗУ */
const q = query(collection(db, "messages"), orderBy("time"));
onSnapshot(q, (snapshot) => {
  console.log("Обновление сообщений:", snapshot.docs.length);
});

renderChats();

</script>

</body>
</html>
