<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Чат сети</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body {
  margin: 0;
  display: flex;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #020617;
  padding: 15px;
  overflow-y: auto;
}

.region {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.6;
}

.north { color: #4fc3f7; }
.south { color: #ff8a65; }
.common { color: #81c784; }

.tt { margin-top: 10px; }
.sub { margin-left: 10px; font-size: 14px; }

.sub div, .common-chat {
  cursor: pointer;
  padding: 5px;
  border-radius: 6px;
}

.activeChat {
  background: #1e293b;
}

/* CHAT */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 10px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.msg {
  max-width: 70%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 12px;
}

.me {
  background: #6366f1;
  margin-left: auto;
}

.other {
  background: #1e293b;
}

/* INPUT */
.input {
  display: flex;
  padding: 10px;
  background: #020617;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
  background: #6366f1;
  border: none;
  color: white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Точки</h3>

  <div class="region north">СЕВЕР</div>

  <div class="tt">
    Науки 18
    <div class="sub">
      <div onclick="openChat('nauki-chat', this)">💬 Болталка</div>
      <div onclick="openChat('nauki-clean', this)">🧹 Уборка</div>
      <div onclick="openChat('nauki-info', this)">📢 Важное</div>
    </div>
  </div>

  <div class="tt">
    Культуры 12
    <div class="sub">
      <div onclick="openChat('kult-chat', this)">💬 Болталка</div>
      <div onclick="openChat('kult-clean', this)">🧹 Уборка</div>
      <div onclick="openChat('kult-info', this)">📢 Важное</div>
    </div>
  </div>

  <div class="region south">ЮГ</div>

  <div class="tt">
    Товарищеский
    <div class="sub">
      <div onclick="openChat('tov-chat', this)">💬 Болталка</div>
      <div onclick="openChat('tov-clean', this)">🧹 Уборка</div>
      <div onclick="openChat('tov-info', this)">📢 Важное</div>
    </div>
  </div>

  <div class="region common">ОБЩИЕ</div>
  <div class="common-chat" onclick="openChat('photo', this)">📸 Фото витрины</div>
  <div class="common-chat" onclick="openChat('finance', this)">💰 Фин отчёт</div>
</div>

<!-- CHAT -->
<div class="chat">

  <div id="header" class="header">Выберите чат</div>

  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="text" placeholder="Сообщение..." />
    <button onclick="send()">Отправить</button>
  </div>

</div>

<script>
const socket = io();

let currentRoom = null;
let username = prompt("Введите имя") || "Сотрудник";

// разрешение уведомлений
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

function openChat(room, el) {
  currentRoom = room;

  document.getElementById("messages").innerHTML = "";
  document.getElementById("header").innerText = room;

  socket.emit("join", room);

  document.querySelectorAll(".sub div, .common-chat").forEach(e => {
    e.classList.remove("activeChat");
  });

  el.classList.add("activeChat");
}

function send() {
  const input = document.getElementById("text");
  const text = input.value.trim();

  if (!text || !currentRoom) {
    alert("Выберите чат");
    return;
  }

  socket.emit("message", {
    room: currentRoom,
    text: text,
    user: username
  });

  input.value = "";
}

socket.on("message", (data) => {

  if (data.room !== currentRoom) {
    notify(data);
    return;
  }

  const div = document.createElement("div");
  div.className = "msg " + (data.user === username ? "me" : "other");

  div.innerHTML = `<b>${data.user}</b><br>${data.text}`;

  document.getElementById("messages").appendChild(div);
});

// уведомления
function notify(data) {

  const audio = new Audio("https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3");
  audio.play();

  if (Notification.permission === "granted") {
    new Notification("Новое сообщение", {
      body: data.user + ": " + data.text
    });
  }
}
</script>

</body>
</html>
