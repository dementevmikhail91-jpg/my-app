<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат Сёстры</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
background: linear-gradient(180deg,#0b1026,#1b1f4a,#2a2f7a);
color:#fff;
height:100vh;
display:flex;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:80px;
background:#070b1f;
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
overflow-y:auto;
}
.tt{
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(135deg,#b46cff,#6d3cff);
display:flex;
align-items:center;
justify-content:center;
margin:8px 0;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}
.tt.active{box-shadow:0 0 15px #b46cff;}
/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
padding:15px;
background:rgba(255,255,255,0.05);
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

/* CHAT LIST */
.chat-list{
flex:1;
overflow-y:auto;
}
.chat{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.05);
display:flex;
justify-content:space-between;
cursor:pointer;
}
.badge{
background:#b46cff;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* MESSAGES */
.messages{
flex:1;
padding:15px;
overflow-y:auto;
display:none;
flex-direction:column;
}
.msg{
background:#2c2f6f;
padding:10px;
border-radius:10px;
margin-bottom:10px;
max-width:70%;
}
.me{align-self:flex-end;background:#6d3cff;}
.meta{font-size:10px;opacity:0.6;margin-top:5px}

/* INPUT */
.input{
display:flex;
padding:10px;
background:rgba(0,0,0,0.3);
}
input{
flex:1;
padding:12px;
border-radius:20px;
border:none;
outline:none;
}
button{
margin-left:10px;
padding:10px 15px;
border:none;
border-radius:50%;
background:#b46cff;
color:#fff;
cursor:pointer;
}

/* FOOTER */
.footer{
display:flex;
justify-content:space-around;
padding:10px;
background:#070b1f;
}
.footer div{cursor:pointer}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="tts"></div>

<!-- MAIN -->
<div class="main">

<div class="header">
<span id="title">Выберите ТТ</span>
<span onclick="openProfile()">👤 Профиль</span>
</div>

<div class="chat-list" id="chatList"></div>

<div class="messages" id="messages"></div>

<div class="input">
<input id="text" placeholder="Сообщение...">
<button onclick="send()">➤</button>
</div>

<div class="footer">
<div onclick="goHome()">💬</div>
<div onclick="alert('Финансы')">💰</div>
<div onclick="alert('Важно')">⚠️</div>
<div onclick="alert('Перемещения')">🚚</div>
</div>

</div>

<script>

/* ====== ДАННЫЕ ====== */
const data = {
"ТУ Север": ["Болталка","Важно","Новинки","Заметки"],
"ТУ Юг": ["Болталка","Важно","Новинки","Заметки"],
"Сёстры Питер": ["Общий чат"]
};

/* ====== СОСТОЯНИЕ ====== */
let currentTT = null;
let currentChat = null;

/* ====== ИНИЦИАЛИЗАЦИЯ ====== */
const ttsDiv = document.getElementById("tts");

Object.keys(data).forEach(tt=>{
let el = document.createElement("div");
el.className="tt";
el.innerText=tt[0];
el.onclick=()=>selectTT(tt);
ttsDiv.appendChild(el);
});

/* ====== ВЫБОР ТТ ====== */
function selectTT(tt){
currentTT = tt;
currentChat = null;
document.getElementById("title").innerText = tt;

renderChats();
document.getElementById("messages").style.display="none";
}

/* ====== ЧАТЫ ====== */
function renderChats(){
let list = document.getElementById("chatList");
list.innerHTML="";

data[currentTT].forEach(chat=>{
let el=document.createElement("div");
el.className="chat";

let count = getMessages(chat).length;

el.innerHTML = `
<span>${chat}</span>
<span class="badge">${count}</span>
`;

el.onclick=()=>openChat(chat);
list.appendChild(el);
});
}

/* ====== ОТКРЫТЬ ЧАТ ====== */
function openChat(chat){
currentChat = chat;
document.getElementById("title").innerText = chat;

document.getElementById("chatList").style.display="none";
document.getElementById("messages").style.display="flex";

renderMessages();
}

/* ====== СООБЩЕНИЯ ====== */
function getMessages(chat){
return JSON.parse(localStorage.getItem(chat) || "[]");
}

function saveMessages(chat,msgs){
localStorage.setItem(chat,JSON.stringify(msgs));
}

function renderMessages(){
let box = document.getElementById("messages");
box.innerHTML="";

let msgs = getMessages(currentChat);

msgs.forEach(m=>{
let div=document.createElement("div");
div.className="msg";
div.innerHTML=`
${m.text}
<div class="meta">${m.time}</div>
`;
box.appendChild(div);
});
}

/* ====== ОТПРАВКА ====== */
function send(){
let input = document.getElementById("text");
let text = input.value.trim();
if(!text) return;

let msgs = getMessages(currentChat);

msgs.push({
text,
time:new Date().toLocaleTimeString().slice(0,5)
});

saveMessages(currentChat,msgs);
input.value="";

renderMessages();
}

/* ====== ПРОФИЛЬ ====== */
function openProfile(){
alert("Профиль (заглушка)");
}

/* ====== НАЗАД ====== */
function goHome(){
document.getElementById("chatList").style.display="block";
document.getElementById("messages").style.display="none";
document.getElementById("title").innerText = currentTT || "Выберите ТТ";
}

</script>

</body>
</html>
