<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(160deg,#0b1730,#1a1f4d);
  color:white;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:80px;
  height:100%;
  background:#0c1226;
}

.tt{
  text-align:center;
  padding:10px;
}

.tt-circle{
  width:50px;height:50px;
  border-radius:50%;
  background:linear-gradient(135deg,#7b4bff,#9c6bff);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
}

/* MAIN */
.main{
  margin-left:80px;
  height:100vh;
  display:flex;
  flex-direction:column;
  padding-bottom:75px; /* запас под меню */
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(255,255,255,0.05);
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* MESSAGES */
.messages{
  flex:1;
  overflow:auto;
  padding:15px;
}

/* MESSAGE */
.msg{
  background:#1e2a5a;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  max-width:75%;
}

/* INPUT */
.input{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 15px;
  margin:10px; /* 👈 вот он "воздух" */
  background:rgba(255,255,255,0.05);
  border-radius:25px;
  backdrop-filter:blur(10px);
}

.input input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  background:#fff;
}

.send{
  background:linear-gradient(135deg,#7b4bff,#9c6bff);
  border:none;
  width:45px;
  height:45px;
  border-radius:50%;
  color:white;
  font-size:18px;
}

/* BOTTOM MENU */
.bottom{
  position:fixed;
  bottom:0;
  left:80px;
  right:0;
  height:70px;
  background:rgba(20,20,40,0.95);
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid rgba(255,255,255,0.05);
}

.bottom div{
  text-align:center;
  font-size:14px;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="tt">
    <div class="tt-circle">Н</div>
    Науки
  </div>
</div>

<div class="main">

  <div class="header">
    <div>← Назад</div>
    <div>Чат</div>
    <div>Профиль</div>
  </div>

  <div class="chat">

    <div class="messages">
      <div class="msg">Сообщение 1</div>
      <div class="msg">Сообщение 2</div>
      <div class="msg">Сообщение 3</div>
    </div>

    <!-- INPUT -->
    <div class="input">
      <input placeholder="Сообщение...">
      <button class="send">➤</button>
    </div>

  </div>

</div>

<!-- MENU -->
<div class="bottom">
  <div>💬<br>Чаты</div>
  <div>💰<br>Фин</div>
  <div>⚠️<br>Важно</div>
  <div>🚚<br>Перемещение</div>
</div>

</body>
</html>
