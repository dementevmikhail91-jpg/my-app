<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:system-ui;
  background: radial-gradient(circle at 80% 80%, #312e81, #020617);
  color:#fff;
}

/* APP */
.app{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:72px;
  background:#020617;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  flex-shrink:0;
}

.tt{
  padding:10px 0;
  text-align:center;
}

.tt-circle{
  width:48px;
  height:48px;
  border-radius:50%;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#8b5cf6,#a855f7);
  font-weight:bold;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
}

/* HEADER */
.header{
  height:56px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  padding:0 16px;
  background:#1e293b;
  font-weight:600;
}

/* CHAT LIST */
.chat-list{
  flex:1;
  overflow-y:auto;
}

.chat{
  padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.badge{
  background:#8b5cf6;
  border-radius:20px;
  padding:4px 10px;
  font-size:12px;
}

/* CHAT WINDOW */
.chat-window{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:none;
}

/* INPUT */
.input{
  flex-shrink:0;
  display:flex;
  padding:10px;
  background:#020617;
}

.input input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#1e293b;
  color:white;
}

.send{
  width:44px;
  margin-left:8px;
  border:none;
  border-radius:50%;
  background:#8b5cf6;
  color:white;
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar" id="ttList"></div>

  <div class="main">

    <div class="header" id="title">Выберите ТТ</div>

    <div class="chat-list" id="chatList"></div>

    <div class="chat-window" id="chatWindow"></div>

    <div class="input">
      <input id="msgInput" placeholder="Сообщение...">
      <button class="send" onclick="send()">➤</button>
    </div>

  </div>

</div>

<script>

const data={
  "Науки 18":["Списание","Болталка","Важно"],
  "Культуры 12":["Списание","Болталка","Важно"],
  "Художников 27":["Списание","Болталка","Важно"],
  "Антонова 25":["Списание","Болталка","Важно"]
};

let currentTT=null;

/* SIDEBAR */
function renderTT(){
  ttList.innerHTML="";
  Object.keys(data).forEach(tt=>{
    let d=document.createElement("div");
    d.className="tt";
    d.innerHTML=`<div class="tt-circle">${tt[0]}</div>`;
    d.onclick=()=>openTT(tt);
    ttList.appendChild(d);
  });
}

/* OPEN TT */
function openTT(tt){
  currentTT=tt;
  title.innerText=tt;
  renderChats();
}

/* CHATS */
function renderChats(){
  chatList.style.display="block";
  chatWindow.style.display="none";

  chatList.innerHTML="";
  data[currentTT].forEach(c=>{
    let d=document.createElement("div");
    d.className="chat";
    d.innerHTML=`${c}<span class="badge">0</span>`;
    chatList.appendChild(d);
  });
}

/* SEND */
function send(){
  alert("Отправка работает (дальше подключаем логику)");
}

renderTT();

</script>

</body>
</html>
