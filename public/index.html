<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Чат</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* СПИСОК */
#chatList {
  padding: 10px;
  height: 70vh;
  overflow-y: auto;
}

.chatBtn {
  padding: 12px;
  margin-bottom: 8px;
  background: #1e293b;
  border-radius: 10px;
  cursor: pointer;
}

/* ЧАТ */
#chat {
  display: none;
  height: 65vh;
  overflow-y: auto;
  padding: 10px;
}

.message {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 5px;
}

/* ВВОД */
#bottomInput {
  position: fixed;
  bottom: 60px;
  left: 0;
  right: 0;
  display: flex;
  padding: 10px;
  gap: 10px;
  background: #0f172a;
}

#messageInput {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: none;
}

.sendBtn {
  background: #7c3aed;
  border: none;
  padding: 12px;
  border-radius: 50%;
  color: white;
}

/* НИЖНЕЕ МЕНЮ */
#menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1e293b;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.menuBtn {
  color: white;
  font-size: 20px;
}
</style>

</head>

<body>

<!-- СПИСОК ЧАТОВ -->
<div id="chatList">

  <!-- ТОЧКИ -->
  <div class="chatBtn" onclick="openChat('Ворошилова 33к1')">Ворошилова 33к1</div>
  <div class="chatBtn" onclick="openChat('Товарищеский 22к1')">Товарищеский 22к1</div>
  <div class="chatBtn" onclick="openChat('Антонова Овсиенко 25к1')">Антонова Овсиенко 25к1</div>
  <div class="chatBtn" onclick="openChat('Науки 18')">Науки 18</div>
  <div class="chatBtn" onclick="openChat('Культуры 12')">Культуры 12</div>
  <div class="chatBtn" onclick="openChat('Ольги Форш 13')">Ольги Форш 13</div>
  <div class="chatBtn" onclick="openChat('Художников 27к1')">Художников 27к1</div>

  <!-- ОБЩИЕ -->
  <div class="chatBtn" onclick="openChat('Болталка')">💬 Болталка</div>
  <div class="chatBtn" onclick="openChat('Важно')">⚠️ Важно</div>
  <div class="chatBtn" onclick="openChat('Новинки')">⭐ Новинки</div>
  <div class="chatBtn" onclick="openChat('Заметки')">📌 Заметки</div>

  <!-- ДОБАВИЛ -->
  <div class="chatBtn" onclick="openChat('ТУ')">📋 ТУ</div>
  <div class="chatBtn" onclick="openChat('Фин отчёт')">📊 Фин отчёт</div>

</div>

<!-- ЧАТ -->
<div id="chat"></div>

<!-- ВВОД -->
<div id="bottomInput">
  <input id="messageInput" placeholder="Сообщение..." />
  <button class="sendBtn" onclick="sendMessage()">➤</button>
</div>

<!-- МЕНЮ -->
<div id="menu">
  <div class="menuBtn" onclick="goHome()">💬</div>
  <div class="menuBtn">⭐</div>
  <div class="menuBtn">⚠️</div>
  <div class="menuBtn">📊</div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentChat = null;
let unsubscribe = null;

/* ОТКРЫТЬ ЧАТ */
function openChat(name) {
  currentChat = name;

  document.getElementById("chatList").style.display = "none";
  document.getElementById("chat").style.display = "block";

  loadMessages();
}

/* НАЗАД */
function goHome() {
  document.getElementById("chatList").style.display = "block";
  document.getElementById("chat").style.display = "none";
}

/* ОТПРАВКА */
function sendMessage() {
  const input = document.getElementById("messageInput");

  if (!input.value.trim()) return;

  db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .add({
      text: input.value,
      createdAt: new Date()
    });

  input.value = "";
}

/* ЗАГРУЗКА */
function loadMessages() {
  if (unsubscribe) unsubscribe();

  unsubscribe = db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .orderBy("createdAt")
    .onSnapshot(snapshot => {

      const chat = document.getElementById("chat");
      chat.innerHTML = "";

      snapshot.forEach(doc => {
        const div = document.createElement("div");
        div.className = "message";
        div.innerText = doc.data().text;
        chat.appendChild(div);
      });

      chat.scrollTop = chat.scrollHeight;
    });
}
</script>

</body>
</html>
