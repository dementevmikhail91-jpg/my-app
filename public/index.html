<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сёстры Chat PRO</title>

<style>

body{
margin:0;
font-family: Arial;
background:linear-gradient(180deg,#0b1023,#1d1b4f);
color:#fff;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:80px;
background:#050b22;
height:100vh;
position:fixed;
left:0;
top:0;
display:flex;
flex-direction:column;
align-items:center;
padding-top:10px;
gap:10px;
overflow-y:auto;
}

.avatar{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(135deg,#a855f7,#6366f1);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
flex-shrink:0;
}

/* MAIN */
.main{
margin-left:80px;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
height:60px;
background:#1e293b;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
font-weight:bold;
}

/* CHAT LIST */
.chat-list{
flex:1;
overflow:auto;
}

.chat{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.05);
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.badge{
background:#8b5cf6;
border-radius:20px;
padding:5px 10px;
font-size:12px;
}

/* CHAT WINDOW */
.chat-window{
flex:1;
display:none;
flex-direction:column;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
}

.message{
margin-bottom:10px;
background:#1e293b;
padding:10px;
border-radius:10px;
max-width:70%;
}

.input{
display:flex;
padding:10px;
background:#111827;
}

.input input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
outline:none;
}

.send{
margin-left:10px;
background:#8b5cf6;
border:none;
padding:10px 15px;
border-radius:20px;
color:white;
cursor:pointer;
}

/* BOTTOM MENU */
.bottom{
height:70px;
background:#050b22;
display:flex;
justify-content:space-around;
align-items:center;
font-size:22px;
}

/* PROFILE */
.profile{
position:absolute;
top:0;
right:-100%;
width:100%;
height:100%;
background:#0b1023;
transition:0.3s;
padding:20px;
}

.profile.active{
right:0;
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">

<div class="header">
<div id="title">Выберите чат</div>
<div onclick="openProfile()">👤 Профиль</div>
</div>

<div class="chat-list" id="chatList"></div>

<div class="chat-window" id="chatWindow">
<div class="messages" id="messages"></div>

<div class="input">
<input id="msgInput" placeholder="Сообщение...">
<button class="send" onclick="sendMessage()">➤</button>
</div>
</div>

<div class="bottom">
💬 ⭐ ⚠️ 📊
</div>

</div>

<div class="profile" id="profile">
<h2>Профиль</h2>
<input placeholder="Имя"><br><br>
<input placeholder="Телефон"><br><br>
<textarea placeholder="О себе"></textarea><br><br>
<button onclick="closeProfile()">Сохранить</button>
</div>

<script>

/* ===== ДАННЫЕ ===== */

const groups = [
"ТТ 1","ТТ 2","ТТ 3","ТТ 4","ТТ 5","ТТ 6","ТТ 7"
];

const folders = {
"ТУ Север":["Болталка","Важно","Новинки","Заметки"],
"ТУ Юг":["Болталка","Важно","Новинки","Заметки"],
"Сёстры Питер":["Общий чат"]
};

let currentChat = null;

const messagesDB = {};

/* ===== SIDEBAR ===== */

function renderSidebar(){
const sidebar=document.getElementById("sidebar");
sidebar.innerHTML="";

Object.keys(folders).forEach(f=>{
let div=document.createElement("div");
div.className="avatar";
div.innerText=f[0];
div.onclick=()=>openFolder(f);
sidebar.appendChild(div);
});

groups.forEach(g=>{
let div=document.createElement("div");
div.className="avatar";
div.innerText="Т";
div.onclick=()=>openSuperGroup(g);
sidebar.appendChild(div);
});

}

renderSidebar();

/* ===== ОТКРЫТИЕ ===== */

function openFolder(name){
document.getElementById("title").innerText=name;
const list=document.getElementById("chatList");
list.innerHTML="";
document.getElementById("chatWindow").style.display="none";

folders[name].forEach(chat=>{
let el=document.createElement("div");
el.className="chat";
el.innerHTML=`${chat}<span class="badge">${count(chat)}</span>`;
el.onclick=()=>openChat(chat);
list.appendChild(el);
});
}

function openSuperGroup(name){
document.getElementById("title").innerText=name;
const list=document.getElementById("chatList");
list.innerHTML="";
document.getElementById("chatWindow").style.display="none";

["Болталка","Важно","Новинки","Заметки"].forEach(chat=>{
let full=name+"-"+chat;

let el=document.createElement("div");
el.className="chat";
el.innerHTML=`${chat}<span class="badge">${count(full)}</span>`;
el.onclick=()=>openChat(full);
list.appendChild(el);
});
}

function openChat(name){
currentChat=name;
document.getElementById("chatWindow").style.display="flex";
document.getElementById("messages").innerHTML="";

(messagesDB[name]||[]).forEach(m=>{
addMsg(m);
});
}

/* ===== СООБЩЕНИЯ ===== */

function sendMessage(){
let text=document.getElementById("msgInput").value;
if(!text)return;

if(!messagesDB[currentChat])messagesDB[currentChat]=[];

messagesDB[currentChat].push(text);
addMsg(text);

document.getElementById("msgInput").value="";
}

function addMsg(text){
let div=document.createElement("div");
div.className="message";
div.innerText=text;
document.getElementById("messages").appendChild(div);
}

/* ===== СЧЁТЧИК ===== */

function count(chat){
return (messagesDB[chat]||[]).length;
}

/* ===== ПРОФИЛЬ ===== */

function openProfile(){
document.getElementById("profile").classList.add("active");
}

function closeProfile(){
document.getElementById("profile").classList.remove("active");
}

</script>

</body>
</html>
