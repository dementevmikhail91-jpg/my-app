<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #0b1220;
  color: white;
}

/* ОСНОВА */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ЛЕВАЯ ПАНЕЛЬ (ТТ) */
.sidebar {
  width: 70px;
  background: #070f1f;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 10px;
}

.tt {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7a5cff, #b57aff);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 8px 0;
  font-weight: bold;
  cursor: pointer;
}

/* СПИСОК ЧАТОВ */
.chat-list {
  width: 220px;
  background: #101a33;
  overflow-y: auto;
}

.chat-item {
  padding: 15px;
  border-bottom: 1px solid #1c2a4a;
  cursor: pointer;
}

.chat-item:hover {
  background: #1a2a50;
}

/* ОСНОВНОЙ ЭКРАН */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ХЕДЕР */
.header {
  background: #1b2b4a;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.profile-btn {
  cursor: pointer;
}

/* ЧАТ */
.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.message {
  background: #243a6b;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  width: fit-content;
}

/* ВВОД */
.input-area {
  display: flex;
  padding: 10px;
  background: #1b2b4a;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: #7a5cff;
  color: white;
  cursor: pointer;
}

/* НИЖНЕЕ МЕНЮ */
.bottom {
  display: flex;
  justify-content: space-around;
  background: #101a33;
  padding: 10px 0;
  font-size: 22px;
}

.bottom div {
  cursor: pointer;
}

/* ПРОФИЛЬ */
.profile {
  position: absolute;
  top: 0;
  right: -100%;
  width: 100%;
  height: 100%;
  background: #0b1220;
  padding: 20px;
  transition: 0.3s;
}

.profile.active {
  right: 0;
}

.profile input {
  width: 100%;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="app">

  <!-- ТТ -->
  <div class="sidebar" id="ttList"></div>

  <!-- ЧАТЫ -->
  <div class="chat-list" id="chatList"></div>

  <!-- ОСНОВА -->
  <div class="main">

    <div class="header">
      <div id="chatTitle">Чаты</div>
      <div class="profile-btn" onclick="openProfile()">👤</div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input id="msgInput" placeholder="Сообщение...">
      <button onclick="sendMsg()">➤</button>
    </div>

    <div class="bottom">
      <div onclick="alert('Чаты')">💬</div>
      <div onclick="alert('Избранное')">⭐</div>
      <div onclick="alert('Важно')">⚠️</div>
      <div onclick="alert('Аналитика')">📊</div>
    </div>

  </div>

</div>

<!-- ПРОФИЛЬ -->
<div class="profile" id="profile">
  <h2>Профиль</h2>
  <input placeholder="Имя">
  <input placeholder="Телефон">
  <input placeholder="О себе">
  <button onclick="closeProfile()">Сохранить</button>
</div>

<script>

/* ТТ СПИСОК */
const ttList = [
"Ворошилова 33к1",
"Товарищеский 22к1",
"Антонова Овсиенко 25к1",
"Науки 18",
"Культуры 12",
"Ольги Форш 13",
"Художников 27к1"
];

const chats = ["Болталка","Важно","Новинки","Заметки"];

/* РЕНДЕР ТТ */
const ttContainer = document.getElementById("ttList");

ttList.forEach((tt, i) => {
  const el = document.createElement("div");
  el.className = "tt";
  el.innerText = tt.split(" ")[0][0];
  el.onclick = () => loadChats(tt);
  ttContainer.appendChild(el);
});

/* ЗАГРУЗКА ЧАТОВ */
function loadChats(ttName){
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats.forEach(chat => {
    const el = document.createElement("div");
    el.className = "chat-item";
    el.innerText = chat;
    el.onclick = () => openChat(ttName + " — " + chat);
    list.appendChild(el);
  });
}

/* ОТКРЫТЬ ЧАТ */
function openChat(name){
  document.getElementById("chatTitle").innerText = name;
  document.getElementById("messages").innerHTML = "";
}

/* ОТПРАВКА */
function sendMsg(){
  const input = document.getElementById("msgInput");
  if(!input.value) return;

  const msg = document.createElement("div");
  msg.className = "message";
  msg.innerText = input.value;

  document.getElementById("messages").appendChild(msg);

  input.value = "";
}

/* ПРОФИЛЬ */
function openProfile(){
  document.getElementById("profile").classList.add("active");
}

function closeProfile(){
  document.getElementById("profile").classList.remove("active");
}

/* ПЕРВЫЙ ЗАПУСК */
loadChats(ttList[0]);

</script>

</body>
</html>
