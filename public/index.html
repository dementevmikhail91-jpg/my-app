<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Чат пекарни</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

#chatList {
  padding: 10px;
  border-bottom: 1px solid #1e293b;
}

.chatBtn {
  display: block;
  padding: 10px;
  margin-bottom: 5px;
  background: #1e293b;
  border-radius: 8px;
  cursor: pointer;
}

#chat {
  height: 60vh;
  overflow-y: auto;
  padding: 10px;
}

.message {
  background: #1e293b;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 5px;
}

#bottom {
  display: flex;
  padding: 10px;
  gap: 10px;
}

#messageInput {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

button {
  background: #7c3aed;
  border: none;
  padding: 10px 15px;
  border-radius: 50%;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<div id="chatList">
  <div class="chatBtn" onclick="setChat('Ворошилова 33к1')">Ворошилова 33к1</div>
  <div class="chatBtn" onclick="setChat('Товарищеский 22к1')">Товарищеский 22к1</div>
  <div class="chatBtn" onclick="setChat('Антонова Овсиенко 25к1')">Антонова Овсиенко 25к1</div>
  <div class="chatBtn" onclick="setChat('Науки 18')">Науки 18</div>
  <div class="chatBtn" onclick="setChat('Культуры 12')">Культуры 12</div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="messageInput" placeholder="Сообщение..." />
  <button onclick="sendMessage()">➤</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentChat = "Ворошилова 33к1";

function setChat(name) {
  currentChat = name;
  loadMessages();
}

function sendMessage() {
  const input = document.getElementById("messageInput");

  if (!input.value.trim()) return;

  db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .add({
      text: input.value,
      createdAt: new Date()
    });

  input.value = "";
}

let unsubscribe;

function loadMessages() {
  if (unsubscribe) unsubscribe();

  unsubscribe = db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .orderBy("createdAt")
    .onSnapshot((snapshot) => {

      const chat = document.getElementById("chat");
      chat.innerHTML = "";

      snapshot.forEach((doc) => {
        const msg = document.createElement("div");
        msg.className = "message";
        msg.innerText = doc.data().text;
        chat.appendChild(msg);
      });

      chat.scrollTop = chat.scrollHeight;
    });
}

loadMessages();
</script>

</body>
</html>
