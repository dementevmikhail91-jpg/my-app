<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sisters Chat</title>

<style>
:root{
  --bg:#0f172a;
  --sidebar:#020617;
  --chat:#0b1220;
  --brand:#7c3aed;
  --bubble-me:#7c3aed;
  --bubble-other:#1e293b;
}

body{
  margin:0;
  font-family: system-ui;
  background:var(--bg);
  color:white;
}

/* LAYOUT */
.app{
  display:flex;
  height:100vh;
}

/* SIDEBAR (как Telegram список чатов) */
.sidebar{
  width:100%;
  max-width:320px;
  background:var(--sidebar);
  overflow:auto;
  border-right:1px solid #111;
}

.chat-item{
  padding:12px;
  border-bottom:1px solid #111;
  cursor:pointer;
}

.chat-item:hover{
  background:#111827;
}

.chat-item.active{
  background:#1e293b;
}

.chat-title{
  font-weight:600;
}

.chat-sub{
  font-size:12px;
  opacity:0.6;
}

/* CHAT AREA */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.chat-header{
  padding:12px;
  border-bottom:1px solid #111;
  font-weight:600;
}

/* MESSAGES */
.messages{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* MESSAGE */
.msg{
  max-width:75%;
  padding:10px;
  border-radius:16px;
  margin-bottom:8px;
  word-wrap:break-word;
}

.me{
  align-self:flex-end;
  background:var(--bubble-me);
}

.other{
  align-self:flex-start;
  background:var(--bubble-other);
}

.name{
  font-size:11px;
  opacity:0.7;
  margin-bottom:3px;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  border-top:1px solid #111;
  background:var(--chat);
}

.input input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  outline:none;
}

.send{
  margin-left:8px;
  padding:10px 14px;
  border:none;
  border-radius:20px;
  background:var(--brand);
  color:white;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{
    position:absolute;
    z-index:2;
    height:100%;
    transform:translateX(-100%);
    transition:0.3s;
  }

  .sidebar.open{
    transform:translateX(0);
  }

  .menu-btn{
    display:block;
  }
}

.menu-btn{
  display:none;
  margin-right:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- CHAT -->
<div class="chat">

<div class="chat-header">
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  <span id="chatTitle">Выберите чат</span>
</div>

<div id="messages" class="messages"></div>

<div class="input">
  <input id="input" placeholder="Сообщение...">
  <button class="send" onclick="send()">➤</button>
</div>

</div>
</div>

<script>
let user = "Сотрудник";
let chats = {
  "Науки 18 • Болталка": [],
  "Науки 18 • Уборка": [],
  "Культуры 12 • Болталка": [],
  "Товарищеский • Болталка": [],
  "Фото витрины": [],
  "Фин отчёт": []
};

let current = null;

/* SIDEBAR */
function renderSidebar(){
  sidebar.innerHTML = Object.keys(chats).map(c=>`
    <div class="chat-item ${c===current?'active':''}" onclick="openChat('${c}')">
      <div class="chat-title">${c}</div>
      <div class="chat-sub">Нажми чтобы открыть</div>
    </div>
  `).join("");
}

/* OPEN CHAT */
function openChat(name){
  current = name;
  chatTitle.innerText = name;
  renderSidebar();
  renderMessages();

  if(window.innerWidth < 768){
    sidebar.classList.remove("open");
  }
}

/* SEND */
function send(){
  if(!input.value || !current) return;

  chats[current].push({
    user,
    text:input.value
  });

  input.value="";
  renderMessages();
}

/* RENDER */
function renderMessages(){
  messages.innerHTML="";

  chats[current].forEach(m=>{
    let div=document.createElement("div");
    div.className="msg "+(m.user===user?"me":"other");

    div.innerHTML=`
      <div class="name">${m.user}</div>
      ${m.text}
    `;

    messages.appendChild(div);
  });

  messages.scrollTop=9999;
}

/* MOBILE MENU */
function toggleMenu(){
  sidebar.classList.toggle("open");
}

/* INIT */
renderSidebar();
</script>

</body>
</html>
