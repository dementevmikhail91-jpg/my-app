<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telegram 🚗</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* ЭКРАНЫ */
.screen {
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:#0f172a;
  transition:0.3s;
}

.hidden {
  transform:translateX(100%);
}

/* HEADER */
.header {
  padding:15px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:10px;
}

.back {
  cursor:pointer;
}

/* ПОИСК */
.search {
  width:90%;
  margin:10px auto;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#1e293b;
  color:white;
}

/* ТАБЫ */
.tabs {
  display:flex;
  gap:10px;
  padding:10px;
}

.tab {
  padding:8px 14px;
  border-radius:20px;
  background:#1e293b;
  cursor:pointer;
}

.tab.active {
  background:#3b82f6;
}

/* ЧАТЫ */
.chat {
  padding:12px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
}

.chatRow {
  display:flex;
  align-items:center;
}

.avatar {
  width:50px;
  height:50px;
  border-radius:50%;
  background:#334155;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:10px;
}

/* СООБЩЕНИЯ */
.messages {
  height:calc(100% - 140px);
  overflow:auto;
  padding:10px;
}

.message {
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
  background:#1e293b;
}

/* ВВОД */
.inputBox {
  position:absolute;
  bottom:60px;
  width:100%;
  display:flex;
}

.inputBox input {
  flex:1;
  padding:12px;
  border:none;
}

.inputBox button {
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
}

/* НИЖНЕЕ МЕНЮ */
.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#1e293b;
  padding:10px;
}
</style>
</head>

<body>

<!-- 📋 СПИСОК -->
<div id="listScreen" class="screen">
  <div class="header">Telegram 🚗</div>

  <input class="search" placeholder="Поиск">

  <div class="tabs">
    <div class="tab active" onclick="setTab('all')">Все</div>
    <div class="tab" onclick="setTab('tt')">ТТ</div>
    <div class="tab" onclick="setTab('super')">Группы</div>
    <div class="tab" onclick="setTab('report')">📊</div>
  </div>

  <div id="chatList"></div>
</div>

<!-- 💬 ЧАТ -->
<div id="chatScreen" class="screen hidden">
  <div class="header">
    <div class="back" onclick="goBack()">⬅</div>
    <div id="chatTitle"></div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="messageInput" placeholder="Сообщение">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="bottom">
  💬 ⭐ ⚠ 📊
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let user = {
  name:"Михаил",
  role:"admin"
};

// ЧАТЫ + СУПЕРГРУППЫ
let chats = [
  {id:1, name:"Ворошилова 33к1", type:"tt"},
  {id:2, name:"Товарищеский 22к1", type:"tt"},
  {id:3, name:"Антонова Овсиенко", type:"tt"},
  {id:10, name:"📢 Общий чат сети", type:"super"},
  {id:11, name:"👨‍💼 Управляющие", type:"super"},
  {id:20, name:"📊 Фин отчёт", type:"report"}
];

let currentTab = "all";
let currentChat = null;

// ТАБЫ
window.setTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
  renderChats();
};

// СПИСОК
function renderChats() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats
    .filter(c => currentTab==="all" || c.type===currentTab)
    .forEach(chat => {

      const div = document.createElement("div");
      div.className = "chat";

      div.innerHTML = `
        <div class="chatRow">
          <div class="avatar">${chat.type==="super"?"👥":"🏪"}</div>
          <div>${chat.name}</div>
        </div>
      `;

      div.onclick = () => openChat(chat);
      list.appendChild(div);
    });
}

// ОТКРЫТЬ ЧАТ
window.openChat = (chat) => {
  currentChat = chat;

  document.getElementById("chatTitle").innerText = chat.name;

  document.getElementById("listScreen").classList.add("hidden");
  document.getElementById("chatScreen").classList.remove("hidden");

  loadMessages();
};

// НАЗАД
window.goBack = () => {
  document.getElementById("chatScreen").classList.add("hidden");
  document.getElementById("listScreen").classList.remove("hidden");
};

// СООБЩЕНИЯ
function loadMessages() {
  const container = document.getElementById("messages");

  const q = query(
    collection(db,"messages"),
    where("chatId","==",currentChat.id),
    orderBy("time")
  );

  onSnapshot(q,(snapshot)=>{
    container.innerHTML="";

    snapshot.forEach(doc=>{
      const msg = doc.data();
      const div = document.createElement("div");

      div.className="message";

      if(msg.user===user.name){
        div.style.background="#3b82f6";
        div.style.marginLeft="auto";
      }

      div.innerHTML = msg.text;
      container.appendChild(div);
    });

    container.scrollTop = container.scrollHeight;
  });
}

// ОТПРАВКА
window.sendMessage = async () => {
  const input = document.getElementById("messageInput");
  if(!input.value) return;

  await addDoc(collection(db,"messages"),{
    text:input.value,
    chatId:currentChat.id,
    user:user.name,
    time:Date.now()
  });

  input.value="";
};

// 👆 СВАЙП НАЗАД (простая версия)
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (endX - startX > 100) {
    goBack();
  }
});

// СТАРТ
renderChats();

</script>

</body>
</html>
