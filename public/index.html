<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bakery System</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.topbar{
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.item{
  padding:15px;
  border-bottom:1px solid #1e293b;
}

.chat-item{
  display:flex;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #1e293b;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#3b82f6;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:10px;
}

.badge{
  background:#3b82f6;
  padding:4px 8px;
  border-radius:12px;
  font-size:12px;
}

.input-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  padding:10px;
  background:#0f172a;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  margin-left:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

// 🔥 ТВОЙ FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user = JSON.parse(localStorage.getItem("user"));

// ================= LOGIN =================

if(!user){
  document.getElementById("app").innerHTML = `
    <div class="topbar">Вход</div>
    <div class="item">
      <input id="name" placeholder="Имя"><br><br>
      <input id="point" placeholder="ТТ (например kultury12)"><br><br>
      <button onclick="login()">Войти</button>
    </div>
  `;
}

function login(){
  user = {
    uid: Date.now().toString(),
    name: document.getElementById("name").value,
    pointId: document.getElementById("point").value,
    role: "staff"
  };

  localStorage.setItem("user", JSON.stringify(user));
  location.reload();
}

// ================= MENU =================

if(user) showMenu();

function showMenu(){
  document.getElementById("app").innerHTML = `
    <div class="topbar">Меню</div>
    <div class="item" onclick="loadChats()">💬 Чаты</div>
    <div class="item" onclick="loadSupplies()">📦 Поставки</div>
    <div class="item" onclick="logout()">🚪 Выйти</div>
  `;
}

function logout(){
  localStorage.clear();
  location.reload();
}

// ================= CHATS =================

function loadChats(){
  db.collection("chats").onSnapshot(snap=>{
    let html = `<div class="topbar">Чаты</div>`;

    snap.forEach(doc=>{
      let c = doc.data();

      if(user.role==="staff" && c.type==="point" && c.pointId!==user.pointId) return;

      html += `
        <div class="chat-item" onclick="openChat('${doc.id}','${c.name}')">
          <div class="avatar">${c.name[0]}</div>
          <div style="flex:1">${c.name}</div>
          ${c.unreadCount>0?`<div class="badge">${c.unreadCount}</div>`:""}
        </div>
      `;
    });

    document.getElementById("app").innerHTML = html;
  });
}

function openChat(id,name){
  document.getElementById("app").innerHTML = `
    <div class="topbar" onclick="loadChats()">← ${name}</div>
    <div id="msgs" style="height:70vh;overflow:auto;padding:10px"></div>
    <div class="input-bar">
      <input id="msg">
      <button onclick="send('${id}')">➤</button>
    </div>
  `;

  db.collection("chats").doc(id).collection("messages")
  .orderBy("createdAt")
  .onSnapshot(snap=>{
    let html="";

    snap.forEach(d=>{
      let m=d.data();
      let mine = m.userId===user.uid;

      html += `
        <div style="text-align:${mine?'right':'left'}">
          <div style="
            display:inline-block;
            background:${mine?'#3b82f6':'#1e293b'};
            padding:8px;
            border-radius:10px;
            margin:4px;
          ">
            ${m.name}<br>${m.text}
          </div>
        </div>
      `;
    });

    let box=document.getElementById("msgs");
    box.innerHTML=html;
    box.scrollTop=box.scrollHeight;
  });

  db.collection("chats").doc(id).update({unreadCount:0});
}

function send(id){
  let text=document.getElementById("msg").value;
  if(!text) return;

  db.collection("chats").doc(id).collection("messages").add({
    text,
    name:user.name,
    userId:user.uid,
    createdAt:Date.now()
  });

  db.collection("chats").doc(id).update({
    unreadCount: firebase.firestore.FieldValue.increment(1),
    updatedAt: Date.now()
  });

  document.getElementById("msg").value="";
}

// ================= SUPPLIES =================

function loadSupplies(){
  db.collection("supplies").onSnapshot(snap=>{
    let html = `<div class="topbar">Поставки</div>
    <div class="item" onclick="newSupply()">➕ Новая</div>`;

    snap.forEach(doc=>{
      let s=doc.data();

      if(user.role==="staff" && s.pointId!==user.pointId) return;

      html+=`
        <div class="item">
          ${s.items}<br>
          ${s.status}
          <button onclick="setStatus('${doc.id}','done')">✔</button>
        </div>
      `;
    });

    document.getElementById("app").innerHTML=html;
  });
}

function newSupply(){
  let items = prompt("Что нужно?");
  if(!items) return;

  db.collection("supplies").add({
    items,
    pointId:user.pointId,
    status:"new",
    createdAt:Date.now()
  });
}

function setStatus(id,status){
  db.collection("supplies").doc(id).update({status});
}

// ================= INIT CHATS =================

function seed(){
  const points = [
    {id:"kultury12",name:"Культуры 12"},
    {id:"nauki18",name:"Науки 18"},
    {id:"forsh13",name:"Ольги Форш 13"}
  ];

  points.forEach(p=>{
    db.collection("chats").add({
      name:p.name,
      type:"point",
      pointId:p.id,
      unreadCount:0,
      updatedAt:Date.now()
    });
  });

  db.collection("chats").add({
    name:"Общий чат",
    type:"group",
    unreadCount:0,
    updatedAt:Date.now()
  });
}

// запусти один раз в консоли:
// seed()

</script>

</body>
</html>
