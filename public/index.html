<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сёстры Chat</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(180deg,#0b1020,#1a1f4f);
    color:#fff;
}

.app{
    display:flex;
    height:100vh;
}

/* LEFT SIDEBAR */
.sidebar{
    width:80px;
    background:#070b1a;
    overflow-y:auto;
}

.tt{
    width:50px;
    height:50px;
    margin:15px auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    background:linear-gradient(135deg,#a855f7,#6366f1);
    cursor:pointer;
}

/* CHAT LIST */
.chat-list{
    width:250px;
    background:#0f1530;
    overflow-y:auto;
}

.chat-item{
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,0.05);
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

.badge{
    background:#8b5cf6;
    padding:5px 10px;
    border-radius:20px;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    padding:15px;
    background:#1c254a;
    font-weight:bold;
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg{
    margin-bottom:10px;
    padding:10px;
    background:#2a2f60;
    border-radius:10px;
}

.input{
    display:flex;
    padding:10px;
    background:#11162e;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:20px;
}

button{
    margin-left:10px;
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:#8b5cf6;
    color:#fff;
}
</style>
</head>

<body>

<div class="app">

<!-- ТТ -->
<div class="sidebar" id="ttList"></div>

<!-- ЧАТЫ -->
<div class="chat-list" id="chatList"></div>

<!-- ОКНО -->
<div class="main">
    <div class="header" id="header">Выберите чат</div>
    <div class="messages" id="messages"></div>

    <div class="input">
        <input id="msgInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

</div>

<script>

/* ================== ДАННЫЕ ================== */

const data = {

    "ТУ ЮГ": {
        chats: {
            "Болталка": [],
            "Важно": [],
            "Новинки": []
        }
    },

    "ТУ СЕВЕР": {
        chats: {
            "Болталка": [],
            "Важно": [],
            "Новинки": []
        }
    },

    "Сёстры Питер": {
        chats: {
            "Общий чат": []
        }
    },

    "Науки 18": {
        chats: {
            "Болталка": [],
            "Важно": [],
            "Новинки": [],
            "Заметки": []
        }
    },

    "Культуры 12": {
        chats: {
            "Болталка": [],
            "Важно": [],
            "Новинки": []
        }
    }
};

/* ================== СОСТОЯНИЕ ================== */

let currentTT = null;
let currentChat = null;

/* ================== РЕНДЕР ================== */

function renderTT(){
    const el = document.getElementById("ttList");
    el.innerHTML = "";

    Object.keys(data).forEach(tt=>{
        const div = document.createElement("div");
        div.className = "tt";
        div.innerText = tt[0];
        div.onclick = ()=>openTT(tt);
        el.appendChild(div);
    });
}

function openTT(tt){
    currentTT = tt;
    renderChats();
}

function renderChats(){
    const el = document.getElementById("chatList");
    el.innerHTML = "";

    const chats = data[currentTT].chats;

    Object.keys(chats).forEach(chat=>{
        const div = document.createElement("div");
        div.className = "chat-item";

        const count = chats[chat].length;

        div.innerHTML = `
            <span>${chat}</span>
            <span class="badge">${count}</span>
        `;

        div.onclick = ()=>openChat(chat);
        el.appendChild(div);
    });
}

function openChat(chat){
    currentChat = chat;
    document.getElementById("header").innerText =
        currentTT + " / " + chat;

    renderMessages();
}

function renderMessages(){
    const el = document.getElementById("messages");
    el.innerHTML = "";

    const msgs = data[currentTT].chats[currentChat];

    msgs.forEach(m=>{
        const div = document.createElement("div");
        div.className = "msg";
        div.innerText = m;
        el.appendChild(div);
    });
}

/* ================== СООБЩЕНИЯ ================== */

function sendMessage(){
    const input = document.getElementById("msgInput");
    const text = input.value;

    if(!text || !currentChat) return;

    data[currentTT].chats[currentChat].push(text);

    input.value = "";
    renderMessages();
    renderChats();
}

/* ================== СТАРТ ================== */

renderTT();

</script>

</body>
</html>
