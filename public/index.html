<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1026;
color:#fff;
display:flex;
height:100vh;
overflow:hidden;
}

/* LEFT */
.sidebar{
width:80px;
background:#050a1a;
overflow-y:auto;
padding-top:10px;
}

.avatar{
width:50px;
height:50px;
margin:10px auto;
border-radius:50%;
background:linear-gradient(45deg,#9d5cff,#6a5cff);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:12px;
}

/* LIST */
.list{
flex:1;
background:#0f1a3a;
overflow-y:auto;
}

.section{
padding:10px;
font-size:12px;
opacity:0.6;
}

.item{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

.item:hover{
background:rgba(255,255,255,0.05);
}

/* MAIN */
.main{
flex:2;
display:flex;
flex-direction:column;
}

.header{
height:60px;
background:#1c2a4a;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
}

.messages{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
background:#2a356b;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.input{
display:flex;
padding:10px;
background:#1c2a4a;
}

.input input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.send{
margin-left:10px;
background:#9d5cff;
border:none;
padding:10px;
border-radius:20px;
color:#fff;
}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
left:80px;
right:0;
height:70px;
background:#0f1a3a;
display:flex;
justify-content:space-around;
align-items:center;
}

.tab{
cursor:pointer;
opacity:0.5;
}

.tab.active{
opacity:1;
color:#9d5cff;
}
</style>
</head>

<body>

<div class="sidebar" id="tt"></div>

<div class="list" id="list"></div>

<div class="main">

<div class="header">
<span id="title">Чат</span>
<span>👤</span>
</div>

<div class="messages" id="msgs"></div>

<div class="input">
<input id="input">
<button class="send" onclick="send()">➤</button>
</div>

</div>

<div class="bottom">
<div class="tab active" onclick="loadMain()">💬</div>
<div class="tab" onclick="loadTU()">⭐</div>
<div class="tab" onclick="loadTT()">⚠️</div>
<div class="tab">📊</div>
</div>

<script>

const chats=["Болталка","Важно","Новинки","Заметки"];

const TT=[
"Ворошилова 33к1",
"Товарищеский 22к1",
"Антонова Овсиенко 25к1",
"Науки 18",
"Культуры 12",
"Ольги Форш 13",
"Художников 27к1"
];

/* MAIN */
function loadMain(){
list.innerHTML=`
<div class="section">ОБЩИЙ ЧАТ</div>
<div class="item" onclick="openChat('Сёстры Питер')">Сёстры Питер</div>
`;
}

/* TU */
function loadTU(){
list.innerHTML=`
<div class="section">ТЕРРИТОРИАЛЬНЫЕ УПРАВЛЕНИЯ</div>
<div class="item" onclick="loadSub('ТУ Север')">ТУ Север</div>
<div class="item" onclick="loadSub('ТУ Юг')">ТУ Юг</div>
`;
}

/* TT */
function loadTT(){
let html=`<div class="section">ТОЧКИ</div>`;
TT.forEach(t=>{
html+=`<div class="item" onclick="loadSub('${t}')">${t}</div>`;
});
list.innerHTML=html;
}

/* под-чаты */
function loadSub(name){
let html=`<div class="section">${name}</div>`;
chats.forEach(c=>{
html+=`<div class="item" onclick="openChat('${name} / ${c}')">${c}</div>`;
});
list.innerHTML=html;
}

/* открыть чат */
function openChat(name){
title.innerText=name;
msgs.innerHTML="";
}

/* отправка */
function send(){
if(!input.value) return;
msgs.innerHTML+=`<div class="msg">${input.value}</div>`;
input.value="";
}

/* init */
loadMain();

</script>

</body>
</html>
