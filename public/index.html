<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат Сёстры</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#0b1020;
  --bg2:#1a1f3a;
  --accent:#9b5cff;
  --accent2:#6a5cff;
  --text:#ffffff;
  --muted:#8a90b5;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family: 'Montserrat', sans-serif;
  background: radial-gradient(circle at 70% 80%, #3b2db5, #0b1020);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* LAYOUT */
.app{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:90px;
  background:#070b18;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px 0;
  gap:15px;
  overflow-y:auto;
}

.tt{
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#c77dff,#6a5cff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  cursor:pointer;
  position:relative;
  transition:.2s;
}

.tt.active{
  box-shadow:0 0 20px #9b5cff;
}

.tt:hover{
  transform:scale(1.1);
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  height:60px;
  background:#1a1f3a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
  font-weight:700;
}

/* CHAT LIST */
.chat-list{
  width:100%;
  overflow-y:auto;
  border-right:1px solid rgba(255,255,255,0.05);
}

.chat-item{
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.chat-item:hover{
  background:rgba(255,255,255,0.05);
}

.counter{
  background:var(--accent);
  border-radius:20px;
  padding:3px 10px;
}

/* CHAT WINDOW */
.chat-window{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.msg{
  margin-bottom:10px;
  max-width:70%;
  padding:10px;
  border-radius:10px;
  background:#2a2f55;
  position:relative;
}

.msg.me{
  margin-left:auto;
  background:linear-gradient(135deg,#6a5cff,#9b5cff);
}

.msg .time{
  font-size:10px;
  opacity:.6;
  margin-top:5px;
}

.reactions{
  font-size:12px;
  margin-top:5px;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#1a1f3a;
}

.input input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  outline:none;
}

.input button{
  margin-left:10px;
  width:50px;
  border:none;
  border-radius:50%;
  background:var(--accent);
  color:#fff;
  cursor:pointer;
}

/* MOBILE FIX */
@media(max-width:768px){
  .sidebar{width:70px}
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="ttList"></div>

<!-- MAIN -->
<div class="main">

<div class="header" id="headerTitle">
Выберите ТТ
</div>

<div class="chat-list" id="chatList"></div>

<div class="chat-window" id="chatWindow" style="display:none">

<div class="messages" id="messages"></div>

<div class="input">
<input id="messageInput" placeholder="Сообщение...">
<button onclick="sendMessage()">➤</button>
</div>

</div>

</div>
</div>

<script>

/* ====== ДАННЫЕ ====== */

const data = {
  "ТУ Север": {
    "Болталка": [],
    "Важно": [],
    "Новинки": [],
    "Заметки": []
  },
  "ТУ Юг": {
    "Болталка": [],
    "Важно": [],
    "Новинки": [],
    "Заметки": []
  },
  "Сёстры Питер": {
    "Общий чат": []
  }
};

let currentTT = null;
let currentChat = null;

/* ====== INIT ====== */

function init(){
  const ttList = document.getElementById('ttList');

  Object.keys(data).forEach(tt=>{
    const el = document.createElement('div');
    el.className='tt';
    el.innerText=tt[0];
    el.onclick=()=>selectTT(tt, el);
    ttList.appendChild(el);
  });
}

function selectTT(tt, el){
  document.querySelectorAll('.tt').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');

  currentTT = tt;
  document.getElementById('headerTitle').innerText = tt;

  renderChats();
}

/* ====== ЧАТЫ ====== */

function renderChats(){
  const chatList = document.getElementById('chatList');
  chatList.innerHTML='';

  const chats = data[currentTT];

  Object.keys(chats).forEach(chat=>{
    const item = document.createElement('div');
    item.className='chat-item';
    item.innerHTML = `
      ${chat}
      <div class="counter">${chats[chat].length}</div>
    `;
    item.onclick=()=>openChat(chat);
    chatList.appendChild(item);
  });
}

function openChat(chat){
  currentChat = chat;

  document.getElementById('chatWindow').style.display='flex';
  document.getElementById('headerTitle').innerText = currentTT + " / " + chat;

  renderMessages();
}

/* ====== СООБЩЕНИЯ ====== */

function renderMessages(){
  const messagesEl = document.getElementById('messages');
  messagesEl.innerHTML='';

  const msgs = data[currentTT][currentChat];

  msgs.forEach((m,i)=>{
    const el = document.createElement('div');
    el.className='msg ' + (m.me ? 'me':'');

    el.innerHTML = `
      ${m.text}
      <div class="time">${m.time}</div>
      <div class="reactions" onclick="addReaction(${i})">👍 ${m.likes || 0}</div>
    `;

    messagesEl.appendChild(el);
  });

  messagesEl.scrollTop = messagesEl.scrollHeight;
}

/* ====== ОТПРАВКА ====== */

function sendMessage(){
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if(!text) return;

  const msg = {
    text,
    time:new Date().toLocaleTimeString().slice(0,5),
    me:true,
    likes:0
  };

  data[currentTT][currentChat].push(msg);

  input.value='';
  renderMessages();
  renderChats();
}

/* ====== РЕАКЦИИ ====== */

function addReaction(i){
  const msg = data[currentTT][currentChat][i];
  msg.likes = (msg.likes || 0) + 1;
  renderMessages();
}

/* ====== START ====== */

init();

</script>

</body>
</html>
