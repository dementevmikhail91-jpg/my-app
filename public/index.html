<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakery Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* SEARCH */
.search {
  margin: 10px;
  padding: 10px;
  border-radius: 20px;
  border: none;
  width: calc(100% - 40px);
  background: #1e293b;
  color: white;
}

/* TABS */
.tabs {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto;
}

.tab {
  padding: 6px 12px;
  background: #1e293b;
  border-radius: 15px;
  cursor: pointer;
}

.tab.active {
  background: #3b82f6;
}

/* CHAT LIST */
.chat {
  padding: 15px;
  border-bottom: 1px solid #1e293b;
  cursor: pointer;
}

/* CHAT SCREEN */
#chatScreen {
  display: none;
  height: 100vh;
  flex-direction: column;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.message {
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #1e293b;
  max-width: 70%;
}

.input {
  display: flex;
  padding: 10px;
}

.input input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.input button {
  margin-left: 10px;
  border-radius: 50%;
  width: 45px;
  background: #7c3aed;
  color: white;
  border: none;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #1e293b;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}
</style>
</head>

<body>

<!-- СПИСОК ЧАТОВ -->
<div id="chatListScreen">
  <div class="header">Telegram 🚗</div>

  <input class="search" placeholder="Поиск">

  <div class="tabs">
    <div class="tab active" onclick="setTab('all')">Все</div>
    <div class="tab" onclick="setTab('tt')">ТТ</div>
    <div class="tab" onclick="setTab('important')">⚠</div>
    <div class="tab" onclick="setTab('report')">📊</div>
  </div>

  <div id="chatList"></div>
</div>

<!-- ОТКРЫТЫЙ ЧАТ -->
<div id="chatScreen">
  <div class="header">
    <span onclick="back()">⬅</span>
    <span id="chatName"></span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="messageInput" placeholder="Сообщение...">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- НИЖНЕЕ МЕНЮ -->
<div class="bottom">
  <div>💬</div>
  <div>⭐</div>
  <div>⚠</div>
  <div>📊</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc,
  query, orderBy, onSnapshot, where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentTab = "all";
let currentChat = null;

/* ЧАТЫ */
const chats = [
  {id:"1", name:"Ворошилова 33к1", type:"tt"},
  {id:"2", name:"Товарищеский 22к1", type:"tt"},
  {id:"3", name:"Антонова Овсиенко 25к1", type:"tt"},
  {id:"4", name:"Науки 18", type:"tt"},
  {id:"5", name:"Культуры 12", type:"tt"},
  {id:"6", name:"Ольги Форш 13", type:"tt"},
  {id:"7", name:"Художников 27к1", type:"tt"},
  {id:"8", name:"⚠ Важно", type:"important"},
  {id:"9", name:"📊 Фин отчёт", type:"report"}
];

/* РЕНДЕР СПИСКА */
function renderChats() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats
    .filter(c => currentTab === "all" || c.type === currentTab)
    .forEach(chat => {
      const div = document.createElement("div");
      div.className = "chat";
      div.innerText = chat.name;
      div.onclick = () => openChat(chat);
      list.appendChild(div);
    });
}

/* ОТКРЫТЬ ЧАТ */
window.openChat = (chat) => {
  currentChat = chat;
  document.getElementById("chatName").innerText = chat.name;

  document.getElementById("chatListScreen").style.display = "none";
  document.getElementById("chatScreen").style.display = "flex";

  loadMessages();
};

/* НАЗАД */
window.back = () => {
  document.getElementById("chatScreen").style.display = "none";
  document.getElementById("chatListScreen").style.display = "block";
};

/* ЗАГРУЗКА СООБЩЕНИЙ */
function loadMessages() {
  const q = query(
    collection(db, "messages"),
    where("chatId", "==", currentChat.id),
    orderBy("time")
  );

  onSnapshot(q, (snapshot) => {
    const container = document.getElementById("messages");
    container.innerHTML = "";

    snapshot.forEach(doc => {
      const msg = doc.data();
      const div = document.createElement("div");
      div.className = "message";
      div.innerText = msg.text;
      container.appendChild(div);
    });

    container.scrollTop = container.scrollHeight;
  });
}

/* ОТПРАВКА */
window.sendMessage = async () => {
  const input = document.getElementById("messageInput");
  if (!input.value) return;

  await addDoc(collection(db, "messages"), {
    text: input.value,
    chatId: currentChat.id,
    time: Date.now()
  });

  input.value = "";
};

/* ТАБЫ */
window.setTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  renderChats();
};

renderChats();

</script>

</body>
</html>
