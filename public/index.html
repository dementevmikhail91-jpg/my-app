<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telegram 🚗</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.header {
  font-size:22px;
  font-weight:bold;
  padding:15px;
}

.search {
  width:90%;
  margin:10px auto;
  padding:10px;
  border-radius:20px;
  border:none;
  background:#1e293b;
  color:white;
}

.tabs {
  display:flex;
  gap:10px;
  padding:10px;
}

.tab {
  padding:8px 14px;
  border-radius:20px;
  background:#1e293b;
  cursor:pointer;
}

.tab.active {
  background:#3b82f6;
}

.chat {
  padding:12px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
}

.chat:hover {
  background:#1e293b;
}

.chatRow {
  display:flex;
  align-items:center;
}

.avatar {
  width:50px;
  height:50px;
  border-radius:50%;
  background:#334155;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:10px;
}

.bottom {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#1e293b;
  padding:10px;
}

.messages {
  height:70vh;
  overflow:auto;
  padding:10px;
}

.message {
  padding:10px;
  margin:5px;
  border-radius:10px;
  max-width:70%;
  background:#1e293b;
}

.inputBox {
  position:fixed;
  bottom:60px;
  width:100%;
  display:flex;
}

.inputBox input {
  flex:1;
  padding:10px;
  border:none;
}

.inputBox button {
  padding:10px;
  background:#3b82f6;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="header">Telegram 🚗</div>

<input class="search" placeholder="Поиск">

<div class="tabs">
  <div class="tab active" onclick="setTab('all')">Все</div>
  <div class="tab" onclick="setTab('tt')">ТТ</div>
  <div class="tab" onclick="setTab('important')">⚠</div>
  <div class="tab" onclick="setTab('report')">📊</div>
</div>

<div id="chatList"></div>

<div id="chatPage" style="display:none;">
  <div class="header" id="chatTitle"></div>

  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="messageInput" placeholder="Сообщение">
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="bottom">
  💬 ⭐ ⚠ 📊
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 ТВОЙ FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👤 ПОЛЬЗОВАТЕЛЬ
let user = {
  name: "Михаил",
  role: "admin" // admin / tu / staff
};

// 📋 ЧАТЫ
let chats = [
  {id:1, name:"Ворошилова 33к1", type:"tt"},
  {id:2, name:"Товарищеский 22к1", type:"tt"},
  {id:3, name:"Антонова Овсиенко 25к1", type:"tt"},
  {id:4, name:"Науки 18", type:"tt"},
  {id:5, name:"Культуры 12", type:"tt"},
  {id:6, name:"Ольги Форш 13", type:"tt"},
  {id:7, name:"Художников 27к1", type:"tt"},
  {id:8, name:"⚠ Важно", type:"important"},
  {id:9, name:"📊 Фин отчёт", type:"report"}
];

let currentTab = "all";
let currentChat = null;

// 🔁 ТАБЫ
window.setTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
  renderChats();
};

// 🧠 РЕНДЕР ЧАТОВ
function renderChats() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats
    .filter(c => currentTab === "all" || c.type === currentTab)
    .forEach(chat => {

      const div = document.createElement("div");
      div.className = "chat";

      div.innerHTML = `
        <div class="chatRow">
          <div class="avatar">🏪</div>

          <div style="flex:1;">
            <div style="font-weight:bold">${chat.name}</div>
            <div style="font-size:12px; color:#94a3b8" id="last-${chat.id}">
              ...
            </div>
          </div>

          <div style="font-size:12px; color:#94a3b8">
            →
          </div>
        </div>
      `;

      div.onclick = () => openChat(chat);
      list.appendChild(div);

      loadLastMessage(chat.id);
    });
}

// 🔥 ПОСЛЕДНЕЕ СООБЩЕНИЕ
function loadLastMessage(chatId) {
  const q = query(
    collection(db, "messages"),
    where("chatId", "==", chatId),
    orderBy("time", "desc")
  );

  onSnapshot(q, (snapshot) => {
    if (!snapshot.empty) {
      const msg = snapshot.docs[0].data();
      document.getElementById("last-" + chatId).innerText = msg.user + ": " + msg.text;
    }
  });
}

// 📩 ОТКРЫТЬ ЧАТ
window.openChat = (chat) => {
  currentChat = chat;

  document.getElementById("chatList").style.display = "none";
  document.getElementById("chatPage").style.display = "block";

  document.getElementById("chatTitle").innerText = chat.name;

  loadMessages();
};

// 📥 ЗАГРУЗКА СООБЩЕНИЙ
function loadMessages() {
  const container = document.getElementById("messages");

  const q = query(
    collection(db, "messages"),
    where("chatId", "==", currentChat.id),
    orderBy("time")
  );

  onSnapshot(q, (snapshot) => {
    container.innerHTML = "";

    snapshot.forEach(doc => {
      const msg = doc.data();
      const div = document.createElement("div");

      div.className = "message";

      if (msg.user === user.name) {
        div.style.background = "#3b82f6";
        div.style.marginLeft = "auto";
      }

      div.innerHTML = `
        <div style="font-size:12px; opacity:0.7">${msg.user}</div>
        ${msg.text}
      `;

      container.appendChild(div);
    });

    container.scrollTop = container.scrollHeight;
  });
}

// 📤 ОТПРАВКА
window.sendMessage = async () => {
  const input = document.getElementById("messageInput");

  if (!input.value) return;

  // 🔒 ограничения
  if (currentChat.type === "report" && user.role !== "admin") {
    alert("Только управляющий пишет сюда");
    return;
  }

  await addDoc(collection(db, "messages"), {
    text: input.value,
    chatId: currentChat.id,
    user: user.name,
    role: user.role,
    time: Date.now()
  });

  input.value = "";
};

// 🚀 СТАРТ
renderChats();

</script>

</body>
</html>
