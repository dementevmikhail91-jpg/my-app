<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WorkChat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif;}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(180deg,#0a0f2a,#0d1b3f);
  color:#fff;
}

/* ЛЕВАЯ ПАНЕЛЬ */
.sidebar{
  width:280px;
  background:#0b1333;
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  font-weight:700;
  font-size:18px;
}

.chat-list{
  flex:1;
  overflow-y:auto;
}

.chat-item{
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.chat-item:hover{
  background:#1a2455;
}

.active{
  background:#6d4aff;
}

/* ЧАТ */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header{
  padding:15px;
  background:#0d1b3f;
  display:flex;
  justify-content:space-between;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.msg{
  margin-bottom:10px;
  max-width:70%;
  padding:10px;
  border-radius:12px;
}

.me{
  background:#6d4aff;
  margin-left:auto;
}

.other{
  background:#1c2450;
}

/* ВВОД */
.input{
  display:flex;
  padding:10px;
  background:#0d1b3f;
}

.input input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

.send{
  margin-left:10px;
  padding:10px 15px;
  background:#6d4aff;
  border:none;
  color:#fff;
  border-radius:10px;
}

/* ПРОФИЛЬ */
.profile{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1c2450;
  padding:20px;
  border-radius:15px;
  display:none;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="header">Чаты</div>
  <div class="chat-list" id="chatList"></div>
</div>

<!-- CHAT -->
<div class="chat">
  <div class="chat-header">
    <div id="chatName">Выберите чат</div>
    <button onclick="openProfile()">👤</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="msgInput" placeholder="Сообщение...">
    <button class="send" onclick="send()">➤</button>
  </div>
</div>

<!-- PROFILE -->
<div class="profile" id="profile">
  <h3>Профиль</h3>
  <input id="name" placeholder="Имя"><br><br>
  <button onclick="saveProfile()">Сохранить</button>
</div>

<script>
let chats = [
  "Науки 18 - Болталка",
  "Науки 18 - Уборка",
  "Науки 18 - Важно",
  "Фото витрины",
  "Фин отчет"
];

let currentChat = null;

function renderChats(){
  let list = document.getElementById("chatList");
  list.innerHTML = "";
  chats.forEach(c=>{
    let el = document.createElement("div");
    el.className = "chat-item";
    el.innerText = c;
    el.onclick = ()=>openChat(c);
    list.appendChild(el);
  });
}

function openChat(name){
  currentChat = name;
  document.getElementById("chatName").innerText = name;
  loadMessages();
}

function send(){
  let input = document.getElementById("msgInput");
  if(!input.value) return;

  let msgs = JSON.parse(localStorage.getItem(currentChat)||"[]");

  msgs.push({
    text:input.value,
    me:true
  });

  localStorage.setItem(currentChat,JSON.stringify(msgs));

  input.value="";
  loadMessages();
}

function loadMessages(){
  let box = document.getElementById("messages");
  box.innerHTML="";

  let msgs = JSON.parse(localStorage.getItem(currentChat)||"[]");

  msgs.forEach(m=>{
    let el = document.createElement("div");
    el.className = "msg " + (m.me?"me":"other");
    el.innerText = m.text;

    /* реакции */
    el.onclick=()=>{
      let r = prompt("Реакция 👍🔥😂");
      if(r) el.innerText += " " + r;
    }

    box.appendChild(el);
  });
}

/* ПРОФИЛЬ */
function openProfile(){
  document.getElementById("profile").style.display="block";
}

function saveProfile(){
  let name = document.getElementById("name").value;
  localStorage.setItem("user",name);
  document.getElementById("profile").style.display="none";
}

renderChats();
</script>

</body>
</html>
