<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at 80% 80%, #4338ca, #020617);
  color:white;
  height:100vh;
  overflow:hidden;
}

.app{display:flex;height:100%}

/* SIDEBAR */
.sidebar{
  width:80px;
  overflow-y:auto;
  background:#020617;
}
.circle{
  width:50px;height:50px;border-radius:50%;
  margin:10px auto;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#8b5cf6,#c084fc);
  cursor:pointer;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}

.header{
  height:60px;
  display:flex;
  align-items:center;
  padding:0 16px;
  background:#1e293b;
}

/* LIST */
.list{flex:1;overflow-y:auto}
.item{
  padding:14px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}
.badge{
  background:#8b5cf6;
  padding:4px 10px;
  border-radius:20px;
}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:10px;display:none}
.msg{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  margin:8px 0;
}
.reactions span{
  margin-right:8px;
  cursor:pointer;
}

/* INPUT */
.input{display:flex;padding:10px;background:#020617}
input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#1e293b;
  color:white;
}
button{
  margin-left:6px;
  border:none;
  border-radius:50%;
  width:42px;
  background:#8b5cf6;
  color:white;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="ttList"></div>

<div class="main">

<div class="header" id="title">Выберите ТТ</div>

<div class="list" id="list"></div>

<div class="chat" id="chat"></div>

<div class="input">
<input id="msg">
<button onclick="send()">➤</button>
<button onclick="schedule()">⏰</button>
</div>

</div>
</div>

<script>

const tt=[
"Науки 18","Культуры 12","Художников 27",
"Антонова 25","Ворошилова 33","Ольги Форш 14"
];

const chats=["Болталка","Важно","Новинки","Заметки"];

let currentChat=null;

/* SIDEBAR */
tt.forEach(t=>{
 let d=document.createElement("div");
 d.className="circle";
 d.innerText=t[0];
 d.onclick=()=>openTT(t);
 ttList.appendChild(d);
});

/* STORAGE */
function getData(){
 return JSON.parse(localStorage.getItem("chatData")||"{}");
}
function saveData(d){
 localStorage.setItem("chatData",JSON.stringify(d));
}

/* OPEN TT */
function openTT(name){
 title.innerText=name;
 list.style.display="block";
 chat.style.display="none";
 list.innerHTML="";

 chats.forEach(c=>{
  let d=document.createElement("div");
  d.className="item";

  let count=getUnread(name,c);

  d.innerHTML=`${c}<span class="badge">${count}</span>`;
  d.onclick=()=>openChat(name,c);
  list.appendChild(d);
 });
}

/* UNREAD */
function getUnread(tt,chat){
 let data=getData();
 return data[tt]?.[chat]?.length || 0;
}

/* OPEN CHAT */
function openChat(tt,chatName){
 currentChat={tt,chatName};

 title.innerText=chatName;
 list.style.display="none";
 chat.style.display="block";

 renderMessages();
}

/* RENDER */
function renderMessages(){
 chat.innerHTML="";
 let data=getData();

 let msgs=data[currentChat.tt]?.[currentChat.chatName]||[];

 msgs.forEach((m,i)=>{
  let d=document.createElement("div");
  d.className="msg";
  d.innerHTML=`
    ${m.text}
    <div class="reactions">
      👍 <span onclick="react(${i},'👍')">${m.r?.['👍']||0}</span>
      ❤️ <span onclick="react(${i},'❤️')">${m.r?.['❤️']||0}</span>
    </div>
  `;
  chat.appendChild(d);
 });
}

/* SEND */
function send(){
 let text=msg.value;
 if(!text)return;

 let data=getData();

 if(!data[currentChat.tt]) data[currentChat.tt]={};
 if(!data[currentChat.tt][currentChat.chatName]) data[currentChat.tt][currentChat.chatName]=[];

 data[currentChat.tt][currentChat.chatName].push({text,r:{}});
 saveData(data);

 msg.value="";
 renderMessages();
}

/* REACTION */
function react(i,type){
 let data=getData();
 let m=data[currentChat.tt][currentChat.chatName][i];

 if(!m.r) m.r={};
 m.r[type]=(m.r[type]||0)+1;

 saveData(data);
 renderMessages();
}

/* DELAYED */
function schedule(){
 let text=msg.value;
 if(!text)return;

 setTimeout(()=>{
  msg.value=text;
  send();
 },5000);

 msg.value="";
}

</script>

</body>
</html>
