<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial;}
.header{padding:15px;font-size:20px;font-weight:bold;}
.item{padding:15px;border-bottom:1px solid #1e293b;cursor:pointer;}
.message{padding:10px;margin:5px;border-radius:10px;background:#1e293b;max-width:80%;}
.me{background:#3b82f6;margin-left:auto;}
.inputWrap{position:fixed;bottom:0;width:100%;display:flex;background:#0f172a;padding:10px;}
input{flex:1;padding:10px;border-radius:20px;border:none;background:#1e293b;color:white;}
button{background:#3b82f6;border:none;padding:10px 15px;border-radius:10px;color:white;margin-left:5px;}
.btnBig{margin:15px;background:#22c55e;width:calc(100% - 30px);padding:15px;border-radius:12px;text-align:center;}
.btnDanger{margin:15px;background:#ef4444;width:calc(100% - 30px);padding:15px;border-radius:12px;text-align:center;}
#messages{padding-bottom:80px;overflow-y:auto;height:calc(100vh - 140px);}
</style>
</head>

<body>

<div id="app">Загрузка...</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let user = null;
let clearedOnce = false;

// ================= AUTH =================
auth.signInAnonymously().then(()=>{
  user = auth.currentUser;
  loadPoints();
});

// ================= LOAD POINTS =================
async function loadPoints(){

  const snap = await db.collection("chats")
    .where("type","==","point")
    .get();

  let html = `
    <div class="header">Точки</div>
    <div class="btnBig" onclick="createStructure()">⚡ Заполнить ТТ</div>
  `;

  if(!clearedOnce){
    html += `<div class="btnDanger" onclick="clearDatabase()">🧹 Очистить базу</div>`;
  }

  snap.forEach(doc=>{
    const c = doc.data();
    html += `<div class="item" onclick="openPoint('${doc.id}','${c.name}')">${c.name}</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

// ================= CLEAR DATABASE =================
async function clearDatabase(){

  const ok = confirm("Удалить ВСЮ базу?");
  if(!ok) return;

  try {

    const chatsSnap = await db.collection("chats").get();

    for (const chat of chatsSnap.docs) {

      // удаляем сообщения батчами
      let messagesSnap = await chat.ref.collection("messages").get();

      while (!messagesSnap.empty) {

        const batch = db.batch();

        messagesSnap.docs.forEach(doc => {
          batch.delete(doc.ref);
        });

        await batch.commit();

        messagesSnap = await chat.ref.collection("messages").get();
      }

      // удаляем чат
      await chat.ref.delete();
    }

    alert("База очищена ✅");

    clearedOnce = true;
    loadPoints();

  } catch(e){
    console.error(e);
    alert("Ошибка удаления. Проверь Firestore Rules");
  }
}

// ================= CREATE STRUCTURE =================
async function createStructure(){

const points = [
"Ворошилова 33к1",
"Товарищеский 22к1",
"Антонова Овсиенко",
"Науки 18",
"Культуры 12",
"Ольги Форш 13",
"Художников 27к1"
];

for(let p of points){

  const id = p.replace(/\s+/g,"_");

  await db.collection("chats").doc(id).set({
    name:p,
    type:"point"
  });

  const subs = ["Основной чат","Смена","Поставки","Финансы"];

  for(let s of subs){

    const subId = id + "_" + s.replace(/\s+/g,"_");

    await db.collection("chats").doc(subId).set({
      name:s,
      parent:id,
      type:"sub"
    });

  }

}

alert("Готово 🚀");
loadPoints();
}

// ================= OPEN POINT =================
async function openPoint(pointId,name){

  const snap = await db.collection("chats")
    .where("parent","==",pointId)
    .get();

  let html = `<div class="header" onclick="loadPoints()">← ${name}</div>`;

  snap.forEach(doc=>{
    const c = doc.data();
    html += `<div class="item" onclick="openChat('${doc.id}','${c.name}')">${c.name}</div>`;
  });

  document.getElementById("app").innerHTML = html;
}

// ================= OPEN CHAT =================
function openChat(chatId,name){

  document.getElementById("app").innerHTML = `
    <div class="header" onclick="loadPoints()">← ${name}</div>
    <div id="messages"></div>

    <div class="inputWrap">
      <input id="msg" placeholder="Сообщение">
      <button onclick="send('${chatId}')">➤</button>
    </div>
  `;

  db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap=>{

      let html = "";

      snap.forEach(doc=>{
        const m = doc.data();

        html += `
          <div class="message ${m.uid===user.uid?'me':''}">
            ${m.text}
          </div>
        `;
      });

      const box = document.getElementById("messages");
      box.innerHTML = html;
      box.scrollTop = box.scrollHeight;
    });
}

// ================= SEND =================
async function send(chatId){

  const input = document.getElementById("msg");
  const text = input.value.trim();

  if(!text) return;

  await db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .add({
      text:text,
      uid:user.uid,
      time:Date.now()
    });

  input.value="";
}

</script>

</body>
</html>
