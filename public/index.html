<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ТВОЙ CONFIG (уже вставил)
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7",
  measurementId: "G-TRM9TP4XSL"
};

// Инициализация
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👇 ТЕКУЩИЙ ЧАТ (меняется при выборе точки)
let currentChat = "Ворошилова 33к1";

// 👉 СМЕНА ЧАТА
window.setChat = function(chatName) {
  currentChat = chatName;
  startListening();
};

// 👉 ОТПРАВКА СООБЩЕНИЯ
window.sendMessage = async function() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if (!text) return;

  await addDoc(collection(db, "chats", currentChat, "messages"), {
    text: text,
    createdAt: new Date()
  });

  input.value = "";
};

// 👉 СЛУШАЕМ СООБЩЕНИЯ
let unsubscribe;

function startListening() {
  if (unsubscribe) unsubscribe();

  const q = query(
    collection(db, "chats", currentChat, "messages"),
    orderBy("createdAt")
  );

  unsubscribe = onSnapshot(q, (snapshot) => {
    const container = document.getElementById("chat");

    container.innerHTML = "";

    snapshot.forEach(doc => {
      const msg = doc.data();

      const div = document.createElement("div");
      div.style.padding = "8px";
      div.style.marginBottom = "6px";
      div.style.background = "#1e2a44";
      div.style.borderRadius = "8px";

      div.innerText = msg.text;

      container.appendChild(div);
    });
  });
}

// запуск при загрузке
startListening();
</script>
