<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

/* === СПИСОК ЧАТОВ (МОБИЛКА) === */
.chat-list-mobile{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:#16213e;
}

.chat-item{
  padding:18px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:16px;
}

/* === ЧАТ === */
.main{
  display:none;
  flex-direction:column;
  height:100vh;
}

.header{
  padding:15px;
  background:#1e2d4d;
  display:flex;
  align-items:center;
}

.back{
  margin-right:10px;
  cursor:pointer;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  padding-bottom:140px;
}

.input{
  position:fixed;
  bottom:60px;
  left:0;
  right:0;
  display:flex;
  padding:10px;
  background:#1e2d4d;
}

.input input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
}

.send{
  width:50px;
  height:50px;
  margin-left:10px;
  border:none;
  border-radius:50%;
  background:#7c3aed;
  color:#fff;
}

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#1e2d4d;
  display:flex;
  justify-content:space-around;
  align-items:center;
}
</style>
</head>

<body>

<!-- СПИСОК -->
<div id="list" class="chat-list-mobile">

  <div class="chat-item" onclick="openChat('Ворошилова 33к1')">Ворошилова 33к1</div>
  <div class="chat-item" onclick="openChat('Товарищеский 22к1')">Товарищеский 22к1</div>
  <div class="chat-item" onclick="openChat('Антонова Овсиенко 25к1')">Антонова Овсиенко 25к1</div>
  <div class="chat-item" onclick="openChat('Науки 18')">Науки 18</div>
  <div class="chat-item" onclick="openChat('Культуры 12')">Культуры 12</div>
  <div class="chat-item" onclick="openChat('Ольги Форш 13')">Ольги Форш 13</div>
  <div class="chat-item" onclick="openChat('Художников 27к1')">Художников 27к1</div>

  <div class="chat-item" onclick="openChat('Болталка')">💬 Болталка</div>
  <div class="chat-item" onclick="openChat('Важно')">⚠ Важно</div>
  <div class="chat-item" onclick="openChat('Новинки')">⭐ Новинки</div>
  <div class="chat-item" onclick="openChat('Заметки')">📌 Заметки</div>

</div>

<!-- ЧАТ -->
<div id="chat" class="main">

  <div class="header">
    <div class="back" onclick="back()">←</div>
    <div id="title">Чат</div>
  </div>

  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="text" placeholder="Сообщение...">
    <button class="send" onclick="send()">➤</button>
  </div>

</div>

<!-- МЕНЮ -->
<div class="bottom">
  <div>💬</div>
  <div>⭐</div>
  <div>⚠</div>
  <div>📊</div>
</div>

<script>
let currentChat = "";

function openChat(name){
  currentChat = name;
  document.getElementById("title").innerText = name;

  document.getElementById("list").style.display = "none";
  document.getElementById("chat").style.display = "flex";
}

function back(){
  document.getElementById("list").style.display = "block";
  document.getElementById("chat").style.display = "none";
}

function send(){
  const input = document.getElementById("text");
  const messages = document.getElementById("messages");

  if(input.value.trim() === "") return;

  const msg = document.createElement("div");
  msg.style.margin = "10px 0";
  msg.innerText = input.value;

  messages.appendChild(msg);
  input.value = "";

  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
