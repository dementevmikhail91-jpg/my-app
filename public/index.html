<div id="app"></div>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0b1026;color:#fff}

#app{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:70px;
background:#050816;
display:flex;
flex-direction:column;
align-items:center;
padding-top:10px;
}
.tt{
width:50px;height:50px;
border-radius:50%;
margin:8px 0;
display:flex;align-items:center;justify-content:center;
background:linear-gradient(135deg,#b46cff,#6d3cff);
cursor:pointer;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}

/* HEADER */
.header{
padding:15px;
background:#1a1f4a;
display:flex;
justify-content:space-between;
}

/* LIST */
.list{flex:1;overflow:auto}
.item{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.1);
display:flex;
justify-content:space-between;
cursor:pointer;
}

/* CHAT */
.chat{
display:none;
flex-direction:column;
height:100%;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
background:#2c2f6f;
padding:10px;
border-radius:10px;
margin:5px 0;
max-width:70%;
}
.me{background:#6d3cff;margin-left:auto}

/* INPUT */
.input{
display:flex;
padding:10px;
background:#050816;
}
.input input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}
.input button{
margin-left:10px;
width:40px;height:40px;
border:none;
border-radius:50%;
background:#b46cff;
color:#fff;
}

/* FOOTER */
.footer{
display:flex;
justify-content:space-around;
padding:10px;
background:#050816;
}
</style>

<script>
const DATA={
"ТУ Север":["Болталка","Важно","Новинки","Заметки"],
"ТУ Юг":["Болталка","Важно","Новинки","Заметки"],
"Сёстры Питер":["Общий чат"]
};

let state={
tt:null,
chat:null
};

const app=document.getElementById("app");

/* РЕНДЕР ВСЕГО */
function render(){
app.innerHTML=`
<div class="sidebar">
${Object.keys(DATA).map(tt=>`
<div class="tt" onclick="openTT('${tt}')">${tt[0]}</div>
`).join("")}
</div>

<div class="main">

<div class="header">
<span>${state.tt||"Выбери ТТ"}</span>
<span onclick="profile()">👤</span>
</div>

${state.chat?renderChat():renderList()}

<div class="footer">
<div onclick="back()">💬</div>
<div>💰</div>
<div>⚠️</div>
<div>🚚</div>
</div>

</div>
`;
}

/* СПИСОК */
function renderList(){
if(!state.tt) return `<div style="padding:20px">Выбери ТТ</div>`;

return `
<div class="list">
${DATA[state.tt].map(c=>`
<div class="item" onclick="openChat('${c}')">
<span>${c}</span>
<span>${get(c).length}</span>
</div>
`).join("")}
</div>
`;
}

/* ЧАТ */
function renderChat(){
let msgs=get(state.chat);

return `
<div class="chat" style="display:flex">

<div class="messages">
${msgs.map(m=>`
<div class="msg ${m.me?'me':''}">
${m.text}
</div>
`).join("")}
</div>

<div class="input">
<input id="msgInput">
<button onclick="send()">➤</button>
</div>

</div>
`;
}

/* ЛОГИКА */
function openTT(tt){
state.tt=tt;
state.chat=null;
render();
}

function openChat(chat){
state.chat=chat;
render();
}

function back(){
state.chat=null;
render();
}

function send(){
let input=document.getElementById("msgInput");
if(!input.value)return;

let msgs=get(state.chat);
msgs.push({text:input.value,me:true});

localStorage.setItem(state.chat,JSON.stringify(msgs));

render();
}

function get(chat){
return JSON.parse(localStorage.getItem(chat)||"[]");
}

function profile(){
alert("Профиль работает");
}

/* СТАРТ */
render();
</script>
