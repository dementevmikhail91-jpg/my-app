<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сёстры Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  color: white;
}

/* --- AUTH --- */
.auth-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  padding: 16px;
}

.auth-card {
  width: 100%;
  max-width: 380px;
  background: #1e293b;
  padding: 24px;
  border-radius: 20px;
}

.auth-title {
  text-align: center;
  margin-bottom: 20px;
  font-size: 22px;
}

.input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: none;
  background: #334155;
  color: white;
}

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #facc15;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

/* --- APP --- */
.app {
  display: flex;
  height: 100vh;
}

/* Левое меню */
.sidebar {
  width: 260px;
  background: #020617;
  padding: 10px;
  overflow-y: auto;
  transition: 0.3s;
}

.sidebar.small {
  width: 80px;
}

.chat-item {
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 6px;
  background: #0f172a;
  cursor: pointer;
}

.chat-item:hover {
  background: #1e293b;
}

/* Правая часть */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat-header {
  padding: 16px;
  background: #020617;
  border-bottom: 1px solid #1e293b;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.message {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  max-width: 70%;
}

.input-area {
  display: flex;
  padding: 10px;
  background: #020617;
}

.input-msg {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #334155;
  color: white;
}

.send-btn {
  margin-left: 10px;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: #facc15;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="root"></div>

<script>

/* ---------- AUTH ---------- */

function renderAuth() {
  document.getElementById('root').innerHTML = `
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-title">Регистрация</div>

      <input id="name" class="input" placeholder="Имя">
      <input id="surname" class="input" placeholder="Фамилия">
      <input id="phone" class="input" placeholder="Телефон">

      <select id="point" class="input">
        <option>Науки 18</option>
        <option>Культуры 12</option>
        <option>Ольги Форш 13</option>
        <option>Художников 27</option>
      </select>

      <button class="btn" onclick="register()">Войти</button>

      <div class="row">
        <button class="btn" onclick="loginNorth()">Север</button>
        <button class="btn" onclick="loginSouth()">Юг</button>
      </div>
    </div>
  </div>
  `;
}

function register() {
  const user = {
    name: document.getElementById('name').value,
    point: document.getElementById('point').value
  };

  localStorage.setItem('user', JSON.stringify(user));
  renderApp();
}

function loginNorth() {
  localStorage.setItem('user', JSON.stringify({name: "Михаил", role:"north"}));
  renderApp();
}

function loginSouth() {
  localStorage.setItem('user', JSON.stringify({name: "Михаил", role:"south"}));
  renderApp();
}

/* ---------- APP ---------- */

let currentChat = "Главный чат";
let messages = {};

const chats = [
  "Науки 18",
  "Культуры 12",
  "Ольги Форш 13",
  "Художников 27",
  "Товарищеский",
  "Ворошилова",
  "Антонова"
];

function renderApp() {
  document.getElementById('root').innerHTML = `
    <div class="app">
      <div class="sidebar" id="sidebar">
        ${chats.map(c => `<div class="chat-item" onclick="openChat('${c}')">${c}</div>`).join('')}
      </div>

      <div class="chat-area">
        <div class="chat-header">${currentChat}</div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
          <input id="msg" class="input-msg" placeholder="Сообщение">
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  `;

  renderMessages();
}

function openChat(name) {
  currentChat = name;
  renderApp();
}

function sendMessage() {
  const text = document.getElementById('msg').value;
  if (!text) return;

  if (!messages[currentChat]) messages[currentChat] = [];

  messages[currentChat].push(text);

  document.getElementById('msg').value = "";
  renderMessages();
}

function renderMessages() {
  const box = document.getElementById('messages');
  box.innerHTML = "";

  (messages[currentChat] || []).forEach(m => {
    box.innerHTML += `<div class="message">${m}</div>`;
  });

  box.scrollTop = box.scrollHeight;
}

/* ---------- INIT ---------- */

if (localStorage.getItem('user')) {
  renderApp();
} else {
  renderAuth();
}

</script>

</body>
</html>
