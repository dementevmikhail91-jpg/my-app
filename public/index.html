<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1120;
  --card:#1e293b;
  --accent:#8b5cf6;
  --accent2:#a855f7;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

body{
  margin:0;
  font-family:'Inter', sans-serif;
  color:var(--text);
  background: radial-gradient(circle at 80% 80%, #312e81 0%, transparent 40%), var(--bg);
}

/* layout */
.app{
  display:flex;
  height:100vh;
}

/* sidebar */
.sidebar{
  width:90px;
  overflow-y:auto;
  background:#020617;
  border-right:1px solid rgba(255,255,255,0.05);
}

.tt{
  margin:12px 0;
  text-align:center;
  cursor:pointer;
}

.tt-circle{
  width:52px;
  height:52px;
  border-radius:50%;
  margin:auto;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
}

/* main */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* header */
.header{
  height:60px;
  padding:0 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#1e293b;
}

/* chat list */
.chat-list{
  flex:1;
  overflow-y:auto;
}

.chat{
  padding:16px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;
}

.badge{
  background:var(--accent);
  padding:4px 10px;
  border-radius:20px;
}

/* chat window */
.chat-window{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:none;
}

/* messages */
.msg{
  margin-bottom:12px;
}

.user{
  font-size:12px;
  color:var(--muted);
}

.bubble{
  background:#1e293b;
  padding:10px 14px;
  border-radius:12px;
  display:inline-block;
}

.time{
  font-size:10px;
  color:var(--muted);
}

/* input */
.input{
  display:flex;
  padding:10px;
  background:#020617;
}

.input input{
  flex:1;
  border:none;
  border-radius:20px;
  padding:10px;
  background:#1e293b;
  color:white;
}

.send{
  margin-left:10px;
  border:none;
  border-radius:50%;
  width:45px;
  background:var(--accent);
  color:white;
}

/* bottom */
.bottom{
  height:60px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:#020617;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar" id="ttList"></div>

<div class="main">

<div class="header">
  <div id="title">Чаты</div>
  <div onclick="alert('Профиль')">Профиль</div>
</div>

<div class="chat-list" id="chatList"></div>

<div class="chat-window" id="chatWindow"></div>

<div class="input">
  <input id="msgInput" placeholder="Сообщение...">
  <button class="send" onclick="sendMessage()">➤</button>
</div>

<div class="bottom">
  <div onclick="goHome()">Чаты</div>
  <div>Фин</div>
  <div>Важно</div>
  <div>Перемещение</div>
</div>

</div>
</div>

<script>

/* ВСЕ 7 ТТ */
const baseChats={
  "Списание":[],
  "Болталка":[],
  "Колобокс":[],
  "График работы":[],
  "Важная информация":[],
  "Показания счётчиков":[],
  "Инвентаризация":[],
  "Кассовые операции":[]
};

const data={
  "Науки 18": structuredClone(baseChats),
  "Культуры 12": structuredClone(baseChats),
  "Художников 27": structuredClone(baseChats),
  "Ольги Форш 14": structuredClone(baseChats),
  "Товарищеский 22": structuredClone(baseChats),
  "Ворошилова 33": structuredClone(baseChats),
  "Антонова-Овсеенко 25": structuredClone(baseChats)
};

let currentTT=null;
let currentChat=null;

/* TT */
function renderTT(){
  ttList.innerHTML="";
  Object.keys(data).forEach(tt=>{
    const d=document.createElement("div");
    d.className="tt";
    d.innerHTML=`<div class="tt-circle">${tt[0]}</div>`;
    d.onclick=()=>openTT(tt);
    ttList.appendChild(d);
  });
}

/* открыть ТТ */
function openTT(tt){
  currentTT=tt;
  title.innerText=tt;
  renderChats();
}

/* список чатов */
function renderChats(){
  chatList.style.display="block";
  chatWindow.style.display="none";

  chatList.innerHTML="";

  Object.keys(data[currentTT]).forEach(chat=>{
    const count=data[currentTT][chat].length;

    const d=document.createElement("div");
    d.className="chat";
    d.innerHTML=`
      ${chat}
      <span class="badge">${count}</span>
    `;
    d.onclick=()=>openChat(chat);
    chatList.appendChild(d);
  });
}

/* открыть чат */
function openChat(chat){
  currentChat=chat;
  title.innerText=currentTT+" / "+chat;

  chatList.style.display="none";
  chatWindow.style.display="block";

  renderMessages();
}

/* сообщения */
function renderMessages(){
  chatWindow.innerHTML="";

  data[currentTT][currentChat].forEach(m=>{
    const d=document.createElement("div");
    d.className="msg";
    d.innerHTML=`
      <div class="user">${m.user}</div>
      <div class="bubble">${m.text}</div>
      <div class="time">${m.time}</div>
    `;
    chatWindow.appendChild(d);
  });
}

/* отправка */
function sendMessage(){
  if(!currentTT || !currentChat) return;

  const text=msgInput.value.trim();
  if(!text) return;

  data[currentTT][currentChat].push({
    user:"Вы",
    text,
    time:new Date().toLocaleTimeString().slice(0,5)
  });

  msgInput.value="";
  renderMessages();
}

/* назад */
function goHome(){
  chatWindow.style.display="none";
  chatList.style.display="block";
  title.innerText="Чаты";
}

/* старт */
renderTT();

</script>

</body>
</html>
