<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

/* === СПИСОК === */
.list{
  padding-bottom:80px;
}

.section-title{
  padding:10px 15px;
  font-size:12px;
  opacity:0.6;
}

.chat-item{
  padding:16px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:16px;
}

/* === ЧАТ === */
.chat{
  display:none;
  flex-direction:column;
  height:100vh;
}

.header{
  padding:15px;
  background:#1e2d4d;
  display:flex;
  align-items:center;
}

.back{
  margin-right:10px;
  cursor:pointer;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  padding-bottom:140px;
}

.input{
  position:fixed;
  bottom:60px;
  left:0;
  right:0;
  display:flex;
  padding:10px;
  background:#1e2d4d;
}

.input input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
}

.send{
  width:50px;
  height:50px;
  margin-left:10px;
  border:none;
  border-radius:50%;
  background:#7c3aed;
  color:#fff;
}

/* === НИЖНЕЕ МЕНЮ === */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:#1e2d4d;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.bottom div{
  font-size:22px;
  opacity:0.5;
}

.active{
  opacity:1 !important;
}
</style>
</head>

<body>

<!-- СПИСОК -->
<div id="list" class="list">

  <div class="section-title">🏪 Точки</div>

  <div class="chat-item tt">Ворошилова 33к1</div>
  <div class="chat-item tt">Товарищеский 22к1</div>
  <div class="chat-item tt">Антонова Овсиенко 25к1</div>
  <div class="chat-item tt">Науки 18</div>
  <div class="chat-item tt">Культуры 12</div>
  <div class="chat-item tt">Ольги Форш 13</div>
  <div class="chat-item tt">Художников 27к1</div>

  <div class="section-title">💬 Общие</div>

  <div class="chat-item common">💬 Болталка</div>
  <div class="chat-item common">⚠ Важно</div>
  <div class="chat-item common">⭐ Новинки</div>
  <div class="chat-item common">📌 Заметки</div>

</div>

<!-- ЧАТ -->
<div id="chat" class="chat">

  <div class="header">
    <div class="back" onclick="back()">←</div>
    <div id="title">Чат</div>
  </div>

  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="text" placeholder="Сообщение...">
    <button class="send" onclick="send()">➤</button>
  </div>

</div>

<!-- МЕНЮ -->
<div class="bottom">
  <div id="btnAll" class="active" onclick="filter('all', this)">💬</div>
  <div id="btnTT" onclick="filter('tt', this)">🏪</div>
  <div id="btnImportant" onclick="filter('important', this)">⚠</div>
  <div id="btnStats">📊</div>
</div>

<script>

// === ОТКРЫТИЕ ЧАТА ===
document.querySelectorAll('.chat-item').forEach(el=>{
  el.onclick = () => {
    document.getElementById("title").innerText = el.innerText;

    document.getElementById("list").style.display="none";
    document.getElementById("chat").style.display="flex";
  }
});

function back(){
  document.getElementById("list").style.display="block";
  document.getElementById("chat").style.display="none";
}

// === СООБЩЕНИЯ ===
function send(){
  const input = document.getElementById("text");
  if(!input.value.trim()) return;

  const msg = document.createElement("div");
  msg.innerText = input.value;
  msg.style.margin="10px 0";

  document.getElementById("messages").appendChild(msg);
  input.value="";
}

// === ФИЛЬТРЫ ===
function filter(type, el){

  document.querySelectorAll('.bottom div').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  const tt = document.querySelectorAll('.tt');
  const common = document.querySelectorAll('.common');

  if(type === 'all'){
    tt.forEach(e=>e.style.display='block');
    common.forEach(e=>e.style.display='block');
  }

  if(type === 'tt'){
    tt.forEach(e=>e.style.display='block');
    common.forEach(e=>e.style.display='none');
  }

  if(type === 'important'){
    tt.forEach(e=>e.style.display='none');
    common.forEach(e=>{
      if(e.innerText.includes("Важно")){
        e.style.display='block';
      }else{
        e.style.display='none';
      }
    });
  }

}
</script>

</body>
</html>
