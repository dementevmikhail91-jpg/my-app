<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WorkChat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif;}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(180deg,#0a0f2a,#0d1b3f);
  color:#fff;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#0b1333;
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  font-size:18px;
  font-weight:700;
}

.chat-item{
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.chat-item:hover{background:#1a2455;}
.active{background:#6d4aff;}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat-header{
  padding:15px;
  background:#0d1b3f;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

/* MESSAGE */
.msg{
  margin-bottom:10px;
  max-width:75%;
  padding:10px;
  border-radius:12px;
  word-break:break-word;
}

.me{
  background:#6d4aff;
  margin-left:auto;
}

.other{
  background:#1c2450;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#0d1b3f;
}

.input input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

.send{
  margin-left:10px;
  padding:10px 15px;
  background:#6d4aff;
  border:none;
  color:#fff;
  border-radius:10px;
}

/* PROFILE */
.profile{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1c2450;
  padding:20px;
  border-radius:15px;
  display:none;
}

.profile input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="header">Чаты</div>
  <div id="chatList"></div>
</div>

<div class="chat">
  <div class="chat-header">
    <div id="chatName">Выберите чат</div>
    <button onclick="openProfile()">👤</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="msgInput" placeholder="Сообщение...">
    <button class="send" onclick="send()">➤</button>
  </div>
</div>

<div class="profile" id="profile">
  <h3>Профиль</h3>
  <input id="name" placeholder="Ваше имя">
  <button onclick="saveProfile()" style="margin-top:10px">Сохранить</button>
</div>

<script>

/* ЧАТЫ */
let chats = [
  "Науки 18 - Болталка",
  "Науки 18 - Уборка",
  "Науки 18 - Важно",
  "Фото витрины",
  "Фин отчет"
];

let currentChat = null;

/* РЕНДЕР ЧАТОВ */
function renderChats(){
  let list = document.getElementById("chatList");
  list.innerHTML="";

  chats.forEach(name=>{
    let el = document.createElement("div");
    el.className="chat-item";
    el.innerText=name;

    el.onclick=()=>{
      document.querySelectorAll(".chat-item").forEach(i=>i.classList.remove("active"));
      el.classList.add("active");
      openChat(name);
    }

    list.appendChild(el);
  });
}

/* ОТКРЫТЬ ЧАТ */
function openChat(name){
  currentChat = name;
  document.getElementById("chatName").innerText=name;
  loadMessages();
}

/* ОТПРАВКА */
function send(){
  let input = document.getElementById("msgInput");
  let text = input.value.trim();
  if(!text || !currentChat) return;

  let msgs = JSON.parse(localStorage.getItem(currentChat) || "[]");

  msgs.push({
    text: text,
    me: true,
    user: localStorage.getItem("user") || "Сотрудник"
  });

  localStorage.setItem(currentChat, JSON.stringify(msgs));

  input.value="";
  loadMessages();
}

/* ЗАГРУЗКА */
function loadMessages(){
  let box = document.getElementById("messages");
  box.innerHTML="";

  let msgs = JSON.parse(localStorage.getItem(currentChat) || "[]");

  msgs.forEach(m=>{
    if(!m.text) return; // 🔥 фикс undefined

    let el = document.createElement("div");
    el.className = "msg " + (m.me ? "me" : "other");

    el.innerHTML = `<b>${m.user || ""}</b><br>${m.text}`;

    /* реакции */
    el.onclick=()=>{
      let r = prompt("Реакция 👍🔥😂");
      if(r) el.innerHTML += " " + r;
    }

    box.appendChild(el);
  });

  box.scrollTop = box.scrollHeight;
}

/* ПРОФИЛЬ */
function openProfile(){
  document.getElementById("profile").style.display="block";
}

function saveProfile(){
  let name = document.getElementById("name").value.trim();
  if(name) localStorage.setItem("user",name);
  document.getElementById("profile").style.display="none";
}

/* INIT */
renderChats();

</script>

</body>
</html>
