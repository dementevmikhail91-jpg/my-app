<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase (compat версия для простоты) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial;}
.header{padding:15px;font-size:20px;font-weight:bold;}
.chat{padding:15px;border-bottom:1px solid #1e293b;cursor:pointer;}
.message{padding:10px;margin:5px;border-radius:10px;background:#1e293b;max-width:70%;}
.me{background:#3b82f6;margin-left:auto;}
.inputWrap{position:fixed;bottom:0;width:100%;display:flex;background:#0f172a;padding:10px;}
input{flex:1;padding:10px;border-radius:20px;border:none;background:#1e293b;color:white;}
button{background:#3b82f6;border:none;padding:10px 15px;border-radius:10px;color:white;margin-left:5px;}
#messages{padding-bottom:80px;}
</style>
</head>

<body>

<div id="app"></div>

<script>

// 🔥 ТВОЙ FIREBASE УЖЕ ВСТАВЛЕН
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768",
  storageBucket: "bakery-chat-87768.firebasestorage.app",
  messagingSenderId: "993150363222",
  appId: "1:993150363222:web:2a001da4d98e4326eabdf7",
  measurementId: "G-TRM9TP4XSL"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();

let user = null;
let currentChat = null;

// 🔹 ЛОГИН
async function login(){
  await auth.signInAnonymously();
  user = auth.currentUser;

  let name = localStorage.getItem("name");
  if(!name){
    name = prompt("Введите имя");
    localStorage.setItem("name", name);
  }

  await db.collection("users").doc(user.uid).set({
    name:name,
    role:"admin" // можешь менять
  });

  loadChats();
}

// 🔹 СПИСОК ЧАТОВ
async function loadChats(){
  const snap = await db.collection("chats").get();

  let html = "<div class='header'>Telegram 🚗</div>";

  html += `<div class="chat" onclick="createChat()">➕ Создать чат</div>`;

  snap.forEach(doc=>{
    const c = doc.data();

    html += `
      <div class="chat" onclick="openChat('${doc.id}','${c.name}')">
        ${c.name}
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
}

// 🔹 СОЗДАТЬ ЧАТ
async function createChat(){
  const name = prompt("Название чата");

  await db.collection("chats").add({
    name:name,
    created:Date.now()
  });

  loadChats();
}

// 🔹 ОТКРЫТЬ ЧАТ
function openChat(id,name){
  currentChat = id;

  document.getElementById("app").innerHTML = `
    <div class="header" onclick="loadChats()">← ${name}</div>
    <div id="messages"></div>

    <div class="inputWrap">
      <input id="msg" placeholder="Сообщение">
      <input type="file" id="file">
      <button onclick="send()">➤</button>
    </div>
  `;

  listenMessages();
}

// 🔹 СЛУШАЕМ СООБЩЕНИЯ
function listenMessages(){
  db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap=>{
      let html = "";

      snap.forEach(doc=>{
        const m = doc.data();

        html += `
          <div class="message ${m.uid === user.uid ? 'me':''}">
            <b>${m.name}</b><br>
            ${format(m.text || "")}
            ${m.file ? `<br><a href="${m.file}" target="_blank">📎 файл</a>`:""}
          </div>
        `;
      });

      document.getElementById("messages").innerHTML = html;

      // автоскролл вниз
      window.scrollTo(0, document.body.scrollHeight);
    });
}

// 🔹 ОТПРАВКА
async function send(){
  const text = document.getElementById("msg").value;
  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  let fileUrl = "";

  if(file){
    const ref = storage.ref().child("files/"+Date.now()+"_"+file.name);
    await ref.put(file);
    fileUrl = await ref.getDownloadURL();
  }

  const userData = (await db.collection("users").doc(user.uid).get()).data();

  await db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .add({
      text:text,
      file:fileUrl,
      uid:user.uid,
      name:userData.name,
      time:Date.now()
    });

  document.getElementById("msg").value = "";
  fileInput.value = "";
}

// 🔹 @УПОМИНАНИЯ
function format(text){
  return text.replace(/@(\w+)/g,"<span style='color:#60a5fa'>@$1</span>");
}

// 🚀 СТАРТ
login();

</script>

</body>
</html>
