<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bakery CRM</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:#fff;}
h2 { padding:16px; margin:0;}
.item { padding:14px; border-bottom:1px solid #1e293b; display:flex; justify-content:space-between;}
.item:hover { background:#1e293b;}
.count { background:#2563eb; padding:4px 10px; border-radius:20px;}
#messages { padding:16px; padding-bottom:90px; height:calc(100vh - 140px); overflow-y:auto;}
.msg { margin-bottom:10px;}
.bottom { position:fixed; bottom:0; left:0; right:0; display:flex; padding:10px; background:#0f172a; border-top:1px solid #1e293b;}
.bottom input { flex:1; padding:12px; border-radius:10px; border:none;}
.bottom button { margin-left:10px; padding:12px; background:#2563eb; color:#fff; border:none; border-radius:10px;}
</style>
</head>

<body>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCp4wC8s9JiNWHZWh97VmoOFi-0VBeLAR8",
  authDomain: "bakery-chat-87768.firebaseapp.com",
  projectId: "bakery-chat-87768"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user = {
  uid: null,
  name: localStorage.getItem("name") || "",
  role: localStorage.getItem("role") || "",
  pointId: localStorage.getItem("pointId") || ""
};

// AUTH
firebase.auth().signInAnonymously();
firebase.auth().onAuthStateChanged(u => {
  if (!u) return;
  user.uid = u.uid;

  if (!user.name) setupUser();
  else init();
});

// ===== РЕГИСТРАЦИЯ =====
function setupUser() {
  document.getElementById("app").innerHTML = `
    <h2>Регистрация</h2>
    <div style="padding:16px;">
      <input id="name" placeholder="Имя"><br><br>

      <select id="role">
        <option value="staff">Сотрудник</option>
        <option value="admin">Управляющий</option>
      </select><br><br>

      <select id="point">
        <option>Антонова Овсиенко</option>
        <option>Культуры 12</option>
        <option>Науки 18</option>
        <option>Ольги Форш 13</option>
        <option>Художников 27к1</option>
        <option>Товарищеский 22к1</option>
        <option>Ворошилова 33к1</option>
      </select><br><br>

      <button onclick="saveUser()">OK</button>
    </div>
  `;
}

function saveUser() {
  user.name = document.getElementById("name").value;
  user.role = document.getElementById("role").value;
  user.pointId = document.getElementById("point").value.replace(/\s/g,"_");

  localStorage.setItem("name", user.name);
  localStorage.setItem("role", user.role);
  localStorage.setItem("pointId", user.pointId);

  db.collection("users").doc(user.uid).set(user);

  init();
}

// ===== INIT =====
const points = [
"Антонова Овсиенко",
"Культуры 12",
"Науки 18",
"Ольги Форш 13",
"Художников 27к1",
"Товарищеский 22к1",
"Ворошилова 33к1"
];

async function init() {
  for (let p of points) {
    let id = p.replace(/\s/g,"_");
    let ref = db.collection("chats").doc(id);

    let doc = await ref.get();
    if (!doc.exists) {
      await ref.set({
        name:p,
        pointId:id,
        updatedAt:Date.now(),
        unreadCount:0
      });
    }
  }

  showMenu();
}

// ===== МЕНЮ =====
function showMenu() {
  document.getElementById("app").innerHTML = `
    <h2>Меню</h2>
    <div class="item" onclick="loadChats()">💬 Чаты</div>
    <div class="item" onclick="loadSupplies()">📦 Поставки</div>
    <div class="item" onclick="loadReports()">📊 Отчёты</div>
  `;
}

// ===== ЧАТЫ =====
function loadChats() {
  let ref = db.collection("chats");

  if (user.role === "staff") {
    ref = ref.where("pointId","==",user.pointId);
  }

  ref.orderBy("updatedAt","desc").onSnapshot(snap=>{
    let html = `<h2 onclick="showMenu()">← Чаты</h2>`;

    snap.forEach(doc=>{
      let c = doc.data();
      html += `
        <div class="item" onclick="openChat('${doc.id}','${c.name}')">
          ${c.name}
          <span class="count">${c.unreadCount||0}</span>
        </div>
      `;
    });

    document.getElementById("app").innerHTML = html;
  });
}

// ===== ЧАТ =====
let unsub;

function openChat(id,name){
  if (unsub) unsub();

  db.collection("chats").doc(id).update({unreadCount:0});

  document.getElementById("app").innerHTML = `
    <h2 onclick="loadChats()">← ${name}</h2>
    <div id="messages"></div>
    <div class="bottom">
      <input id="msg" placeholder="Сообщение">
      <button onclick="send('${id}')">➤</button>
    </div>
  `;

  unsub = db.collection("chats").doc(id).collection("messages")
    .orderBy("createdAt")
    .onSnapshot(snap=>{
      let box = document.getElementById("messages");
      box.innerHTML="";
      snap.forEach(d=>{
        let m = d.data();
        box.innerHTML += `<div class="msg"><b>${m.name}</b>: ${m.text}</div>`;
      });
      box.scrollTop = box.scrollHeight;
    });
}

function send(id){
  let text = document.getElementById("msg").value;
  if (!text) return;

  db.collection("chats").doc(id).collection("messages").add({
    text,
    name:user.name,
    userId:user.uid,
    createdAt:Date.now()
  });

  if (user.role === "staff") {
    db.collection("chats").doc(id).update({
      updatedAt:Date.now(),
      unreadCount:firebase.firestore.FieldValue.increment(1)
    });
  } else {
    db.collection("chats").doc(id).update({
      updatedAt:Date.now()
    });
  }

  document.getElementById("msg").value="";
}

// ===== ПОСТАВКИ =====
function loadSupplies(){
  let ref = db.collection("supplies");

  if (user.role === "staff") {
    ref = ref.where("pointId","==",user.pointId);
  }

  ref.orderBy("createdAt","desc").onSnapshot(snap=>{
    let html = `<h2 onclick="showMenu()">← Поставки</h2>`;
    html += `<div class="item" onclick="createSupply()">➕ Новая</div>`;

    snap.forEach(d=>{
      let s = d.data();

      html += `
        <div class="item">
          <div>
            <b>${s.items}</b><br>
            <small>${s.pointId}</small>
          </div>
          <span>${s.status}</span>
        </div>
      `;
    });

    document.getElementById("app").innerHTML = html;
  });
}

function createSupply(){
  let items = prompt("Что нужно?");
  if (!items) return;

  db.collection("supplies").add({
    pointId:user.pointId,
    items,
    status:"new",
    createdAt:Date.now()
  });
}

// ===== ОТЧЁТЫ =====
function loadReports(){
  db.collection("reports")
    .where("pointId","==",user.pointId)
    .orderBy("createdAt","desc")
    .onSnapshot(snap=>{
      let html = `<h2 onclick="showMenu()">← Отчёты</h2>`;
      html += `<div class="item" onclick="createReport()">➕ Новый</div>`;

      snap.forEach(d=>{
        let r = d.data();
        html += `<div class="item">${r.revenue} ₽</div>`;
      });

      document.getElementById("app").innerHTML = html;
    });
}

function createReport(){
  let revenue = prompt("Выручка?");
  if (!revenue) return;

  db.collection("reports").add({
    pointId:user.pointId,
    revenue,
    createdAt:Date.now()
  });
}
</script>

</body>
</html>
