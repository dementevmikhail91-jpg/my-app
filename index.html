<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Sisters Control</title>

<style>
body {
  margin:0;
  font-family:Arial;
  display:flex;
  height:100vh;
  background:#0f0f14;

}

.sidebar {
  width:300px;
  background:#1a1a22;
  overflow:auto;
}

.section {

}

.room {
  padding:10px;

}

.chat {

  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:10px;
  overflow:auto;
}

.message {
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  max-width:70%;
}

.me {background:#6C2BD9; align-self:flex-end;}
.other {background:#2a2a35;}

.input {
  display:flex;
}

input {
  flex:1;
  padding:10px;
}

button {
  padding:10px;
  background:#6C2BD9;
  color:white;
  border:none;
}
</style>
</head>

<body>
