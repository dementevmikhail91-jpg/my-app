<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }
    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }
    #input {
      display: flex;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #1e293b;
    }
    input {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
      background: #1e293b;
      color: white;
    }
    button {
      padding: 15px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
    }
    .msg {
      margin: 5px 0;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="input">
  <input id="message" placeholder="Введите сообщение..." />
  <button onclick="sendMessage()">Отправить</button>
</div>

<script>
  const ws = new WebSocket(`wss://${location.host}`);

  const chat = document.getElementById('chat');

  ws.onmessage = (event) => {
    const div = document.createElement('div');
    div.className = 'msg';
    div.textContent = event.data;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  };

  function sendMessage() {
    const input = document.getElementById('message');
    if (input.value.trim() !== '') {
      ws.send(input.value);
      input.value = '';
    }
  }
</script>

</body>
</html>
