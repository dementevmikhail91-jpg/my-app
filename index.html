<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>
</head>
<body>

<h2>Чат работает 🚀</h2>

<script>
const ws = new WebSocket(`wss://${location.host}`);

ws.onmessage = (event) => {
  const div = document.createElement('div');
  div.textContent = event.data;
  document.body.appendChild(div);
};

setInterval(() => {
  ws.send("ping");
}, 5000);
</script>

</body>
</html>
